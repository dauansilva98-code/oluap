<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLUAP Admin - Hub de Soluções</title>
  <link rel="icon" href="/icone.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #05121b; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    @media print {
      @page { margin: 1cm; size: auto; }
      body { background-color: white !important; color: black !important; font-size: 11px !important; }
      .print-hidden { display: none !important; }
      .print-show { display: flex !important; }
      .break-avoid { break-inside: avoid; page-break-inside: avoid; }
      .shadow-xl, .shadow-sm { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
      .bg-slate-50 { background-color: #f8fafc !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .max-w-5xl { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/pages/admin/main.jsx"></script>
</body>
</html>
