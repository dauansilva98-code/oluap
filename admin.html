<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLUAP Admin - Gestão de Diagnósticos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#f8fafc] text-[#05121b]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, Users, LogOut, ShieldCheck, 
          FileText, Building2, ArrowLeft, BarChart2, Mail, Phone, User, CheckCircle, ChevronRight, ChevronLeft,
          Search, Calendar, Filter, Copy, Save, Eye, Lock, Sparkles, Landmark, Target, Wallet, Clock, StickyNote,
          X, Printer, MessageCircle, Send, Download, RefreshCw
        } from 'lucide-react';

        // --- CONEXÃO SUPABASE OLUAP ---
        const SUPABASE_URL = 'https://haxonnnbycypirigxsvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheG9ubm5ieWN5cGlyaWd4c3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTYwMzEsImV4cCI6MjA4OTYzMjAzMX0.keYNqjbu7DxBYV9f4_HW1MTaP1_TJZ_bNDTRIvSeSYw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- COMPONENTES DE FORMULÁRIO MODO LEITURA ---
        const ReadOnlyInput = ({ label, value, subLabel, icon: Icon }) => (
            <div className="space-y-1.5 w-full text-left">
                <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400">{label}</label>
                {subLabel && <p className="text-[9px] text-slate-400 mb-1">{subLabel}</p>}
                <div className="relative">
                    {Icon && <Icon size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />}
                    <input type="text" value={value || ""} readOnly className={`w-full bg-slate-50 border border-slate-100 ${Icon ? 'pl-10' : 'px-4'} pr-4 py-3 rounded-xl font-bold text-slate-500 text-xs outline-none cursor-default`} />
                </div>
            </div>
        );

        const ReadOnlyTextArea = ({ label, value, subLabel }) => (
            <div className="space-y-1.5 w-full text-left">
                <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400">{label}</label>
                {subLabel && <p className="text-[9px] text-slate-400 mb-1">{subLabel}</p>}
                <textarea value={value || ""} readOnly className="w-full bg-slate-50 border border-slate-100 px-4 py-3 rounded-xl font-bold text-slate-500 text-xs outline-none cursor-default resize-none h-24"></textarea>
            </div>
        );

        const ReadOnlySectionHeading = ({ icon: Icon, title }) => (
            <div className="flex items-center gap-2 pt-8 pb-4 border-b border-slate-100 mb-6 mt-4">
                <Icon size={18} className="text-[#ff7b00]" />
                <h3 className="text-sm font-black uppercase tracking-wide text-[#05121b]">{title}</h3>
            </div>
        );

        const App = () => {
          const [view, setView] = useState('dashboard');
          const [isSidebarOpen, setIsSidebarOpen] = useState(true);
          
          // Dados Brutos
          const [diagnostics, setDiagnostics] = useState([]); // Fila (pending)
          const [derivedClients, setDerivedClients] = useState([]); // Base (completed)
          
          // Dados Filtrados
          const [filteredDiagnostics, setFilteredDiagnostics] = useState([]);
          const [filteredClients, setFilteredClients] = useState([]);
          const [selectedClient, setSelectedClient] = useState(null);

          // Paginação de Clientes
          const [currentPage, setCurrentPage] = useState(1);
          const clientsPerPage = 10;

          const [selectedSubmission, setSelectedSubmission] = useState(null);
          const [clientFormData, setClientFormData] = useState({});
          
          // Estados de Filtro (Fila de Espera)
          const [filterSearch, setFilterSearch] = useState("");
          const [filterDateFrom, setFilterDateFrom] = useState("");
          const [filterDateTo, setFilterDateTo] = useState("");

          // Estados de Filtro (Base de Clientes)
          const [clientSearchTerm, setClientSearchTerm] = useState("");
          const [clientStatusFilter, setClientStatusFilter] = useState("todos"); // 'todos', 'healthy', 'warning', 'critical'
          const [clientTypeFilter, setClientTypeFilter] = useState("todos"); // 'todos', 'Estruturado', 'Guiado'
          const [clientDateFrom, setClientDateFrom] = useState("");
          const [clientDateTo, setClientDateTo] = useState("");

          // Estados de Edição da Análise
          const [adminAnalysis, setAdminAnalysis] = useState("");
          const [chartDataInput, setChartDataInput] = useState("");
          const [internalAnalysisNotes, setInternalAnalysisNotes] = useState("");
          const [healthStatus, setHealthStatus] = useState("");
          const [saveStatus, setSaveStatus] = useState("");
          const [whatsAppNum, setWhatsAppNum] = useState("");

          // Estado de Edição das Notas Gerais do Cliente
          const [generalClientNotes, setGeneralClientNotes] = useState("");
          const [clientNotesSaveStatus, setClientNotesSaveStatus] = useState("");

          useEffect(() => {
            fetchData();
          }, []);

          // Aplica os filtros na Fila de Espera (Apenas 'pending')
          useEffect(() => {
              let filtered = diagnostics; // 'diagnostics' já vem filtrado com pending da função fetchData

              if (filterSearch.trim() !== "") {
                  const lower = filterSearch.toLowerCase();
                  filtered = filtered.filter(d => 
                      (d.razao_social && d.razao_social.toLowerCase().includes(lower)) || 
                      (d.client_name && d.client_name.toLowerCase().includes(lower)) || 
                      (d.cnpj && d.cnpj.includes(lower)) ||
                      (d.email && d.email.toLowerCase().includes(lower)) ||
                      (d.telefone && d.telefone.includes(lower))
                  );
              }

              if (filterDateFrom) {
                  filtered = filtered.filter(d => new Date(d.created_at) >= new Date(filterDateFrom));
              }

              if (filterDateTo) {
                  const toDate = new Date(filterDateTo);
                  toDate.setHours(23, 59, 59, 999);
                  filtered = filtered.filter(d => new Date(d.created_at) <= toDate);
              }

              setFilteredDiagnostics(filtered);
          }, [filterSearch, filterDateFrom, filterDateTo, diagnostics]);

          // Aplica filtros na Base de Clientes (Apenas 'completed')
          useEffect(() => {
              let filtered = derivedClients;

              if (clientSearchTerm.trim() !== "") {
                  const lower = clientSearchTerm.toLowerCase();
                  filtered = filtered.filter(c => 
                      (c.razao && c.razao.toLowerCase().includes(lower)) || 
                      (c.name && c.name.toLowerCase().includes(lower)) || 
                      (c.cnpj && c.cnpj.includes(lower)) ||
                      (c.email && c.email.toLowerCase().includes(lower)) ||
                      (c.phone && c.phone.includes(lower))
                  );
              }

              if (clientStatusFilter !== "todos") {
                  // Filtra pelo status do diagnóstico mais recente
                  filtered = filtered.filter(c => c.latestSubmission && c.latestSubmission.health_status === clientStatusFilter);
              }

              if (clientTypeFilter !== "todos") {
                   // Filtra pelo tipo do diagnóstico mais recente
                  filtered = filtered.filter(c => c.latestSubmission && c.latestSubmission.form_type === clientTypeFilter);
              }

              if (clientDateFrom) {
                  filtered = filtered.filter(c => new Date(c.firstDate) >= new Date(clientDateFrom));
              }

              if (clientDateTo) {
                  const toDate = new Date(clientDateTo);
                  toDate.setHours(23, 59, 59, 999);
                  filtered = filtered.filter(c => new Date(c.firstDate) <= toDate);
              }

              setFilteredClients(filtered);
              setCurrentPage(1); // Volta para a primeira página
          }, [clientSearchTerm, clientStatusFilter, clientTypeFilter, clientDateFrom, clientDateTo, derivedClients]);

          const clearFilters = () => {
              setFilterSearch("");
              setFilterDateFrom("");
              setFilterDateTo("");
          };

          const clearClientFilters = () => {
              setClientSearchTerm("");
              setClientStatusFilter("todos");
              setClientTypeFilter("todos");
              setClientDateFrom("");
              setClientDateTo("");
          };

          const fetchData = async () => {
            const { data: diags, error } = await supabase.from('diagnosticos').select('*').order('created_at', { ascending: false });
            if (diags) {
                // Fila de Espera = Apenas Pending
                const pendingDiags = diags.filter(d => d.internal_status === 'pending');
                setDiagnostics(pendingDiags);
                
                // Base de Clientes = Apenas quem tem histórico Completed
                const clientsMap = {};
                diags.forEach(d => {
                    const cnpj = d.cnpj || "N/A";
                    if (!clientsMap[cnpj]) {
                        clientsMap[cnpj] = { 
                            name: d.client_name, 
                            razao: d.razao_social || d.client_name, 
                            email: d.email || "", 
                            phone: d.telefone || "", 
                            cnpj: d.cnpj, 
                            submissionCount: 0, 
                            firstDate: d.created_at,
                            generalNotes: d.client_general_notes || "",
                            history: [],
                            latestSubmission: null
                        };
                    }
                    
                    // Adiciona na Base de Clientes apenas se for concluído
                    if (d.internal_status === 'completed') {
                        clientsMap[cnpj].submissionCount++;
                        clientsMap[cnpj].history.push(d);
                        
                        // Atualiza latestSubmission para ajudar no filtro
                        if (!clientsMap[cnpj].latestSubmission || new Date(d.created_at) > new Date(clientsMap[cnpj].latestSubmission.created_at)) {
                            clientsMap[cnpj].latestSubmission = d;
                        }
                    }

                    if (new Date(d.created_at) < new Date(clientsMap[cnpj].firstDate)) {
                        clientsMap[cnpj].firstDate = d.created_at;
                    }
                    if (d.client_general_notes) {
                         clientsMap[cnpj].generalNotes = d.client_general_notes;
                    }
                });

                // Remove clientes que não tem nenhuma análise concluída da Base de Clientes
                const clientsArray = Object.values(clientsMap).filter(c => c.submissionCount > 0);
                setDerivedClients(clientsArray);

                if (selectedClient) {
                    const updatedClient = clientsMap[selectedClient.cnpj];
                    if (updatedClient) setSelectedClient(updatedClient);
                }
            }
          };

          // Lógica de Paginação
          const indexOfLastClient = currentPage * clientsPerPage;
          const indexOfFirstClient = indexOfLastClient - clientsPerPage;
          const currentClients = filteredClients.slice(indexOfFirstClient, indexOfLastClient);
          const totalPages = Math.ceil(filteredClients.length / clientsPerPage);

          const paginate = (pageNumber) => setCurrentPage(pageNumber);

          const goDashboard = () => { setView('dashboard'); setSelectedClient(null); setSelectedSubmission(null); };
          const goClients = () => { setView('clients'); setSelectedClient(null); setSelectedSubmission(null); };
          const openClientProfile = (client) => { 
              setSelectedClient(client); 
              setGeneralClientNotes(client.generalNotes);
              setView('client_profile'); 
              window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleAdminAnalyze = (submission) => {
            setSelectedSubmission(submission);
            setClientFormData(submission.data || {}); 
            setAdminAnalysis(submission.analysis || "");
            setChartDataInput(submission.chart_data_input || "");
            setInternalAnalysisNotes(submission.internal_analysis_notes || "");
            setHealthStatus(submission.health_status || "");
            setWhatsAppNum(submission.telefone || "");

            setView('review');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleSaveAnalysis = async () => {
            if(!healthStatus) {
                alert("Por favor, selecione a Classificação de Saúde Financeira antes de salvar.");
                return;
            }

            setSaveStatus("Salvando...");
            const { error } = await supabase.from('diagnosticos').update({
                analysis: adminAnalysis,
                chart_data_input: chartDataInput,
                internal_analysis_notes: internalAnalysisNotes,
                health_status: healthStatus,
                status: "✅ Concluído",
                internal_status: "completed"
            }).eq('id', selectedSubmission.id);

            if (!error) {
                setSaveStatus("Salvo com sucesso!");
                await fetchData();
                // Redireciona para Base de Clientes após salvar
                setTimeout(() => {
                    setSaveStatus("");
                    goClients();
                }, 1500);
            } else {
                setSaveStatus("Erro ao salvar.");
            }
          };

          const handleSaveClientNotes = async () => {
              setClientNotesSaveStatus("Salvando...");
              const { error } = await supabase.from('diagnosticos')
                  .update({ client_general_notes: generalClientNotes })
                  .eq('cnpj', selectedClient.cnpj);

              if (!error) {
                  setClientNotesSaveStatus("Observação Salva!");
                  await fetchData();
                  setTimeout(() => setClientNotesSaveStatus(""), 3000);
              } else {
                  setClientNotesSaveStatus("Erro ao salvar.");
              }
          };

          const handleCopyDataForAI = () => {
              if (!selectedSubmission || !selectedSubmission.data) return;
              let textToCopy = `DADOS DO DIAGNÓSTICO FINANCEIRO - TIPO: ${selectedSubmission.form_type}\n\n`;
              for (const [key, value] of Object.entries(selectedSubmission.data)) {
                  if (value && value.trim() !== "") {
                      let cleanKey = key.replace('v1_', '').replace('g_', '').replace(/([A-Z])/g, ' $1').trim();
                      cleanKey = cleanKey.charAt(0).toUpperCase() + cleanKey.slice(1);
                      textToCopy += `${cleanKey}: ${value}\n`;
                  }
              }
              navigator.clipboard.writeText(textToCopy);
              setSaveStatus("Copiado para Área de Transferência!");
              setTimeout(() => setSaveStatus(""), 3000);
          };

          const handleSendWhatsApp = (phoneStr) => {
              const numToUse = phoneStr || whatsAppNum;
              const cleanPhone = numToUse.replace(/\D/g, '');
              if (!cleanPhone) {
                  alert("Por favor, insira um número de celular válido.");
                  return;
              }
              const message = encodeURIComponent(`Olá! Seu diagnóstico financeiro da OLUAP já está disponível. Acesse o painel para visualizar seus resultados detalhados.`);
              window.open(`https://wa.me/55${cleanPhone}?text=${message}`, '_blank');
          };

          const handleSendEmail = () => {
              const email = selectedSubmission?.email || "";
              const subject = encodeURIComponent("Seu Diagnóstico OLUAP está pronto!");
              const body = encodeURIComponent("Olá,\n\nAnalisamos as informações da sua empresa e seu diagnóstico financeiro OLUAP já foi concluído e está disponível em seu painel.\n\nAcesse a plataforma para visualizar os detalhes, indicadores e nossas recomendações de ajuste.\n\nAbraço,\nEquipe OLUAP");
              window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
          };

          const handlePrintPDF = () => {
              window.print();
          };

          const downloadCSV = () => {
              if (filteredClients.length === 0) return;
              
              const headers = ["Razao Social", "CNPJ", "Nome", "Email", "Telefone", "Data de Cadastro", "Total de Diagnosticos"];
              
              const csvRows = filteredClients.map(c => [
                  `"${c.razao || ''}"`,
                  `"${c.cnpj || ''}"`,
                  `"${c.name || ''}"`,
                  `"${c.email || ''}"`,
                  `"${c.phone || ''}"`,
                  `"${new Date(c.firstDate).toLocaleDateString()}"`,
                  `"${c.submissionCount}"`
              ].join(","));

              const csvContent = [headers.join(","), ...csvRows].join("\n");
              
              const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
              const link = document.createElement("a");
              const url = URL.createObjectURL(blob);
              link.setAttribute("href", url);
              link.setAttribute("download", `oluap_clientes_${new Date().toISOString().slice(0,10)}.csv`);
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
          };

          // --- BADGES DA TABELA ---
          const getDiagnosticoBadge = (health_status) => {
              switch(health_status) {
                  case 'healthy': return <span className="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-emerald-100">Saudável</span>;
                  case 'warning': return <span className="bg-amber-50 text-amber-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-amber-100">Ajustar</span>;
                  case 'critical': return <span className="bg-red-50 text-red-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-red-100">Atenção</span>;
                  default: return <span className="text-slate-300 font-bold text-xs">-</span>;
              }
          };

          // Renderização do Formulário (Leitura)
          const renderClientForm = () => {
              const isV1 = selectedSubmission?.form_type === 'Estruturado';
              const fd = clientFormData;

              if (isV1) {
                  return (
                      <div className="space-y-6">
                          <ReadOnlySectionHeading icon={Building2} title="1. Identificação da Empresa" />
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                              <ReadOnlyInput label="Razão Social da Empresa" value={fd.v1_razao} />
                              <ReadOnlyInput label="CNPJ" value={fd.v1_cnpj} />
                              <div className="md:col-span-2"><ReadOnlyInput label="Nome do Responsável" value={fd.v1_responsavel} /></div>
                              <ReadOnlyInput label="Email de Contato" value={fd.v1_email} icon={Mail} />
                              <ReadOnlyInput label="Celular / WhatsApp" value={fd.v1_phone} icon={Phone} />
                          </div>
                          <div className="p-4 bg-slate-50 border border-slate-100 rounded-xl text-center">
                              <p className="text-xs font-bold text-slate-400">... (Restante das Respostas do Formulário) ...</p>
                          </div>
                      </div>
                  );
              } else {
                  return (
                      <div className="space-y-6">
                          <ReadOnlySectionHeading icon={Building2} title="1. Identificação da Empresa" />
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                              <ReadOnlyInput label="Razão Social da Empresa" value={fd.g_razao} />
                              <ReadOnlyInput label="CNPJ" value={fd.g_cnpj} />
                              <div className="md:col-span-2"><ReadOnlyInput label="Nome do Responsável" value={fd.g_responsavel} /></div>
                              <ReadOnlyInput label="Email de Contato" value={fd.g_email} icon={Mail} />
                              <ReadOnlyInput label="Celular / WhatsApp" value={fd.g_phone} icon={Phone} />
                          </div>
                          <div className="p-4 bg-slate-50 border border-slate-100 rounded-xl text-center">
                              <p className="text-xs font-bold text-slate-400">... (Restante das Respostas do Formulário) ...</p>
                          </div>
                      </div>
                  );
              }
          };

          return (
            <div className="min-h-screen flex text-[#05121b] font-sans">
              
              {/* SIDEBAR */}
              <aside className={`bg-white border-r border-slate-200 h-screen sticky top-0 transition-all ${isSidebarOpen ? 'w-64 p-6' : 'w-20 p-4'} flex flex-col z-10 print:hidden`}>
                <div className="flex items-center gap-3 mb-10 overflow-hidden cursor-pointer" onClick={() => setIsSidebarOpen(!isSidebarOpen)}>
                    <div className="w-8 h-8 bg-[#ff7b00] rounded-lg shrink-0 flex items-center justify-center text-white shadow-md"><ShieldCheck size={20}/></div>
                    {isSidebarOpen && <span className="font-black italic text-xl tracking-tighter">OLUAP</span>}
                </div>
                
                <nav className="flex-1 space-y-3">
                    <button onClick={goDashboard} className={`w-full flex items-center gap-3 p-3.5 rounded-xl font-bold text-xs uppercase tracking-wider transition-all ${view==='dashboard'?'bg-[#05121b] text-white shadow-lg':'text-slate-400 hover:bg-slate-50 hover:text-[#05121b]'}`}>
                        <LayoutDashboard size={18}/> {isSidebarOpen && "Fila de Espera"}
                    </button>
                    <button onClick={goClients} className={`w-full flex items-center gap-3 p-3.5 rounded-xl font-bold text-xs uppercase tracking-wider transition-all ${view==='clients'||view==='client_profile'?'bg-[#05121b] text-white shadow-lg':'text-slate-400 hover:bg-slate-50 hover:text-[#05121b]'}`}>
                        <Users size={18}/> {isSidebarOpen && "Base de Clientes"}
                    </button>
                </nav>

                <button onClick={() => window.location.href='index.html'} className="flex items-center gap-3 p-3 text-slate-400 font-bold text-xs uppercase hover:text-red-500 transition-colors">
                    <LogOut size={18}/> {isSidebarOpen && "Sair do Admin"}
                </button>
              </aside>

              {/* CONTEÚDO PRINCIPAL */}
              <main className="flex-1 p-6 md:p-10 overflow-y-auto bg-slate-50/40">
                
                {/* ---------- TELA 1: FILA DE ESPERA (SÓ PENDING) ---------- */}
                {view === 'dashboard' && (
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-8">
                            <h1 className="text-3xl font-black italic uppercase text-[#05121b] tracking-tighter">Fila de Espera</h1>
                            <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Diagnósticos pendentes de análise</p>
                        </header>

                        {/* Barra de Filtros Fila */}
                        <div className="flex flex-col md:flex-row gap-4 items-end bg-white p-4 rounded-2xl border border-slate-100 shadow-sm mb-8">
                            <div className="flex-1 w-full space-y-1.5">
                                <label className="text-[9px] font-bold uppercase tracking-wider text-slate-400 ml-1">Buscar (Nome, E-mail ou Fone)</label>
                                <div className="relative">
                                    <Search size={14} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="Digite para buscar..." value={filterSearch} onChange={(e) => setFilterSearch(e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-600 outline-none focus:border-[#137789] focus:ring-1 focus:ring-[#137789] focus:bg-white transition-all"/>
                                </div>
                            </div>
                            <div className="w-full md:w-40 space-y-1.5">
                                <label className="text-[9px] font-bold uppercase tracking-wider text-slate-400 ml-1">Data Envio (De)</label>
                                <input type="date" value={filterDateFrom} onChange={(e) => setFilterDateFrom(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-600 outline-none focus:border-[#137789] focus:ring-1 focus:ring-[#137789] focus:bg-white transition-all"/>
                            </div>
                            <div className="w-full md:w-40 space-y-1.5">
                                <label className="text-[9px] font-bold uppercase tracking-wider text-slate-400 ml-1">Data Envio (Até)</label>
                                <input type="date" value={filterDateTo} onChange={(e) => setFilterDateTo(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-600 outline-none focus:border-[#137789] focus:ring-1 focus:ring-[#137789] focus:bg-white transition-all"/>
                            </div>
                            <button onClick={clearFilters} title="Limpar Filtros" className="h-[42px] w-[42px] shrink-0 bg-slate-50 hover:bg-slate-200 border border-slate-200 rounded-xl flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors">
                                <X size={16} />
                            </button>
                        </div>
                        
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-slate-50 border-b border-slate-100">
                                    <tr>

                            <div className="border-t-2 border-dashed border-slate-200 pt-10 mt-10 print:hidden bg-slate-50 -mx-8 md:-mx-12 -mb-8 md:-mb-12 p-8 md:p-12 rounded-b-[2rem]">
                                <h3 className="text-sm font-black uppercase text-[#05121b] tracking-wider mb-6 flex items-center gap-2"><Send size={18} className="text-[#ff7b00]"/> Compartilhar / Exportar Resultado</h3>
                                
                                <div className="flex flex-col xl:flex-row gap-5 items-stretch xl:items-center">
                                    
                                    {/* Whatsapp Block */}
                                    <div className="flex-1 flex flex-col md:flex-row bg-white border border-slate-200 rounded-2xl overflow-hidden focus-within:border-[#25D366] focus-within:ring-1 focus-within:ring-[#25D366] shadow-sm">
                                        <div className="px-5 py-4 bg-slate-100 border-r border-slate-200 text-slate-500 flex items-center justify-center shrink-0">
                                            <MessageCircle size={20} className="text-[#25D366]" />
                                        </div>
                                        <input 
                                            type="text" 
                                            value={whatsAppNum} 
                                            onChange={(e) => setWhatsAppNum(e.target.value)} 
                                            placeholder="Celular do Cliente" 
                                            className="px-5 py-4 bg-transparent outline-none text-sm font-bold text-[#05121b] w-full" 
                                        />
                                        <button onClick={() => handleSendWhatsApp(whatsAppNum)} className="px-8 py-4 bg-[#25D366] text-white font-black text-[10px] uppercase tracking-widest hover:bg-[#1da851] transition-colors shrink-0 whitespace-nowrap">
                                            Enviar Whats
                                        </button>
                                    </div>

                                    {/* Botões Email e PDF */}
                                    <div className="flex flex-col sm:flex-row gap-4 shrink-0">
                                        <button onClick={handleSendEmail} className="flex-1 xl:w-auto flex items-center justify-center gap-2 px-8 py-4 bg-blue-500 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-600 transition-colors shadow-sm whitespace-nowrap">
                                            <Mail size={16} /> Enviar E-mail
                                        </button>

                                        <button onClick={handlePrintPDF} className="flex-1 xl:w-auto flex items-center justify-center gap-2 px-8 py-4 bg-[#05121b] text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-800 transition-colors shadow-sm whitespace-nowrap">
                                            <Printer size={16} /> Gerar PDF
                                        </button>
                                    </div>

                                </div>
                            </div>

                        </div>
                    </div>
                )}
              </main>
            </div>
          );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
