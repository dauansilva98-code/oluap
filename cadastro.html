<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLUAP - Criar Conta</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Suavizando a barra de rolagem geral da página caso a tela seja pequena */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="m-0 p-0 font-sans min-h-screen relative flex items-center justify-center overflow-x-hidden bg-gradient-to-br from-[#f15a00] to-[#137789]">
    
    <div id="root" class="w-full relative z-10 px-4 py-10 md:py-16"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Loader2, AlertTriangle, Eye, EyeOff, CheckCircle } from 'lucide-react';

        // --- CONEXÃO SUPABASE OLUAP (CHAVES SALVAS) ---
        const SUPABASE_URL = 'https://haxonnbycypirigxsvjq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheG9ubm5ieWN5cGlyaWd4c3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTYwMzEsImV4cCI6MjA4OTYzMjAzMX0.keYNqjbu7DxBYV9f4_HW1MTaP1_TJZ_bNDTRIvSeSYw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Funções de Máscara
        const maskCNPJ = (value) => value.replace(/\D/g, '').replace(/^(\d{2})(\d)/, '$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3').replace(/\.(\d{3})(\d)/, '.$1/$2').replace(/(\d{4})(\d)/, '$1-$2').replace(/(-\d{2})\d+?$/, '$1');
        const maskPhone = (value) => value.replace(/\D/g, '').replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d)(\d{4})$/, '$1-$2').substring(0, 15);

        const Cadastro = () => {
            const [name, setName] = useState("");
            const [email, setEmail] = useState("");
            const [phone, setPhone] = useState("");
            const [cnpj, setCnpj] = useState("");
            const [password, setPassword] = useState("");
            
            const [showPassword, setShowPassword] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            const [success, setSuccess] = useState(false);

            const handleSignup = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError("");

                if (password.length < 6) {
                    setError("A senha deve ter pelo menos 6 caracteres.");
                    setLoading(false);
                    return;
                }

                // Salva os dados extras dentro do "user_metadata"
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: name,
                            phone: phone,
                            cnpj: cnpj
                        }
                    }
                });

                if (error) {
                    setError(error.message);
                } else {
                    setSuccess(true);
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                }
                setLoading(false);
            };

            return (
                <div className="w-full max-w-xl mx-auto flex flex-col items-center">
                    
                    {/* LOGO (Fora do Cartão, no topo) */}
                    <div className="mb-8 flex items-center justify-center">
                        <img src="logo.png" alt="Oluap" className="h-10 object-contain" onError={(e) => {
                            e.target.style.display = 'none';
                            e.target.nextSibling.style.display = 'flex';
                        }}/>
                        <div className="hidden text-white font-black text-4xl tracking-tighter flex items-center drop-shadow-md">
                            olua<span className="text-[#05121b] rotate-45 ml-[-4px]">P</span>
                        </div>
                    </div>

                    {/* CARTÃO BRANCO CENTRAL */}
                    <div className="w-full bg-white rounded-[2rem] shadow-2xl p-8 md:p-12 relative">
                        
                        <div className="text-center mb-10 md:mt-4">
                            <h2 className="text-3xl font-black italic uppercase text-[#05121b] tracking-tighter mb-2">Criar Conta</h2>
                            <p className="text-slate-500 text-sm font-medium">Preencha seus dados para iniciar o diagnóstico.</p>
                        </div>

                        {error && (
                            <div className="mb-8 p-4 bg-red-50 border border-red-100 rounded-xl flex items-center gap-3 text-red-600 shadow-sm">
                                <AlertTriangle size={16} className="shrink-0" />
                                <span className="text-xs font-bold uppercase tracking-wider leading-tight">{error}</span>
                            </div>
                        )}

                        {success ? (
                            <div className="text-center space-y-4 py-12 bg-slate-50 rounded-3xl border border-slate-100">
                                <CheckCircle size={64} className="text-[#137789] mx-auto" />
                                <h3 className="text-2xl font-black italic uppercase text-[#05121b] tracking-tighter">Tudo Certo!</h3>
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Preparando seu painel de diagnóstico...</p>
                                <Loader2 size={24} className="animate-spin text-[#f15a00] mx-auto mt-6" />
                            </div>
                        ) : (
                            <form onSubmit={handleSignup} className="space-y-6">
                                
                                {/* Nome Completo */}
                                <div className="w-full">
                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2 mb-2 block">Nome Completo</label>
                                    <input 
                                        type="text" 
                                        required 
                                        value={name} 
                                        onChange={(e) => setName(e.target.value)} 
                                        placeholder="Ex: João Silva" 
                                        className="w-full bg-slate-50 border border-slate-200 text-[#05121b] px-5 py-4 rounded-xl text-sm outline-none focus:ring-2 focus:ring-[#f15a00] focus:border-transparent placeholder-slate-400 transition-all font-medium" 
                                    />
                                </div>

                                {/* Email */}
                                <div className="w-full">
                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2 mb-2 block">E-mail Profissional</label>
                                    <input 
                                        type="email" 
                                        required 
                                        value={email} 
                                        onChange={(e) => setEmail(e.target.value)} 
                                        placeholder="seu@email.com.br" 
                                        className="w-full bg-slate-50 border border-slate-200 text-[#05121b] px-5 py-4 rounded-xl text-sm outline-none focus:ring-2 focus:ring-[#f15a00] focus:border-transparent placeholder-slate-400 transition-all font-medium" 
                                    />
                                </div>

                                {/* Celular */}
                                <div className="w-full">
                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2 mb-2 block">Celular / WhatsApp</label>
                                    <input 
                                        type="text" 
                                        required 
                                        value={phone} 
                                        onChange={(e) => setPhone(maskPhone(e.target.value))} 
                                        placeholder="(00) 00000-0000" 
                                        maxLength="15" 
                                        className="w-full bg-slate-50 border border-slate-200 text-[#05121b] px-5 py-4 rounded-xl text-sm outline-none focus:ring-2 focus:ring-[#f15a00] focus:border-transparent placeholder-slate-400 transition-all font-medium" 
                                    />
                                </div>

                                {/* CNPJ */}
                                <div className="w-full">
                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2 mb-2 block">CNPJ da Empresa</label>
                                    <input 
                                        type="text" 
                                        required 
                                        value={cnpj} 
                                        onChange={(e) => setCnpj(maskCNPJ(e.target.value))} 
                                        placeholder="00.000.000/0000-00" 
                                        maxLength="18" 
                                        className="w-full bg-slate-50 border border-slate-200 text-[#05121b] px-5 py-4 rounded-xl text-sm outline-none focus:ring-2 focus:ring-[#f15a00] focus:border-transparent placeholder-slate-400 transition-all font-medium" 
                                    />
                                </div>

                                {/* Senha com Olhinho */}
                                <div className="w-full">
                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2 mb-2 block">Crie uma Senha Segura</label>
                                    <div className="relative">
                                        <input 
                                            type={showPassword ? "text" : "password"} 
                                            required 
                                            value={password} 
                                            onChange={(e) => setPassword(e.target.value)} 
                                            placeholder="Mínimo 6 caracteres" 
                                            className="w-full bg-slate-50 border border-slate-200 text-[#05121b] pl-5 pr-12 py-4 rounded-xl text-sm outline-none focus:ring-2 focus:ring-[#f15a00] focus:border-transparent placeholder-slate-400 transition-all font-medium" 
                                        />
                                        <button 
                                            type="button" 
                                            onClick={() => setShowPassword(!showPassword)}
                                            className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-[#f15a00] transition-colors"
                                        >
                                            {showPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                                        </button>
                                    </div>
                                </div>

                                {/* Botão Cadastrar */}
                                <div className="pt-6 w-full">
                                    <button 
                                        type="submit" 
                                        disabled={loading} 
                                        className="bg-[#f15a00] text-white w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg hover:bg-[#d44e00] hover:shadow-xl hover:scale-[1.01] transition-all flex items-center justify-center disabled:opacity-70"
                                    >
                                        {loading ? <Loader2 size={18} className="animate-spin" /> : "Finalizar Cadastro"}
                                    </button>
                                </div>
                            </form>
                        )}

                        {/* Link de Login */}
                        {!success && (
                            <div className="mt-8 text-center border-t border-slate-100 pt-6 w-full">
                                <p className="text-xs font-bold text-slate-500">
                                    Já possui uma conta? <a href="login.html" className="text-[#137789] hover:text-[#f15a00] transition-colors uppercase tracking-wider ml-1">Entrar agora</a>
                                </p>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<Cadastro />);
    </script>
</body>
</html>
