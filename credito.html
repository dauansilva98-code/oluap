<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crédito Inteligente · OLUAP</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05121b; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="text-white min-h-screen">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            User, LogOut, Loader2, CheckCircle, Clock, XCircle,
            AlertTriangle, ArrowRight, ExternalLink, Shield,
            ChevronRight, FileCheck, Search, Rocket, Mail
        } from 'lucide-react';

        const SUPABASE_URL = 'https://haxonnnbycypirigxsvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheG9ubm5ieWN5cGlyaWd4c3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTYwMzEsImV4cCI6MjA4OTYzMjAzMX0.keYNqjbu7DxBYV9f4_HW1MTaP1_TJZ_bNDTRIvSeSYw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Altere para o link real do parceiro
        const PARCEIRO_URL = 'https://seulink.parceiro.com.br';

        const maskCNPJ = (v) => {
            if (!v) return '';
            return v.replace(/\D/g,'').replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d)/,'$1-$2').replace(/(-\d{2})\d+?$/,'$1');
        };
        const maskPhone = (v) => {
            if (!v) return '';
            return v.replace(/\D/g,'').replace(/^(\d{2})(\d)/g,'($1) $2').replace(/(\d)(\d{4})$/,'$1-$2').substring(0,15);
        };

        const CNPJ_STATUS_MAP = {
            aguardando: {
                label: 'Aguardando Análise',
                color: 'text-slate-400',
                bg: 'bg-slate-700/30',
                border: 'border-slate-600/40',
                desc: 'Seus dados foram recebidos. Em breve nosso parceiro iniciará a análise do seu CNPJ.'
            },
            em_analise: {
                label: 'Em Análise',
                color: 'text-amber-400',
                bg: 'bg-amber-500/10',
                border: 'border-amber-500/30',
                desc: 'Nosso parceiro financeiro está analisando seu CNPJ. Isso pode levar até 24 horas úteis.'
            },
            aprovado: {
                label: 'Aprovado',
                color: 'text-emerald-400',
                bg: 'bg-emerald-500/10',
                border: 'border-emerald-500/30',
                desc: 'Parabéns! Seu CNPJ foi aprovado. Você já pode anexar suas notas fiscais e iniciar a antecipação.'
            },
            reprovado: {
                label: 'Não Aprovado',
                color: 'text-red-400',
                bg: 'bg-red-500/10',
                border: 'border-red-500/30',
                desc: 'Infelizmente seu CNPJ não foi aprovado nesta análise. Entre em contato com nossa equipe para entender os próximos passos.'
            }
        };

        const OPERACAO_STEPS = [
            { id: 'preenchimento', label: 'Preenchimento de Dados',  desc: 'Dados e notas fiscais enviados ao parceiro financeiro.' },
            { id: 'aprovado',      label: 'Aprovado',                desc: 'Operação aprovada pelo parceiro financeiro.' },
            { id: 'criada',        label: 'Operação Criada',         desc: 'Operação formalizada e em processamento.' },
            { id: 'paga',          label: 'Operação Paga',           desc: 'Valor creditado diretamente na sua conta bancária.' },
        ];

        const MENU_ITEMS = [
            { id: 'analises', label: 'Análises',  Icon: Search },
            { id: 'operacao', label: 'Operação',  Icon: Rocket },
            { id: 'perfil',   label: 'Perfil',    Icon: User   },
        ];

        const App = () => {
            const [loading, setLoading]               = useState(true);
            const [user, setUser]                     = useState(null);
            const [profile, setProfile]               = useState(null);
            const [activeMenu, setActiveMenu]         = useState('analises');
            const [sidebarOpen, setSidebarOpen]       = useState(false);
            const [profileData, setProfileData]       = useState({ full_name: '', email: '', phone: '', cnpj: '', razao_social: '' });
            const [savingProfile, setSavingProfile]   = useState(false);
            const [profileSuccess, setProfileSuccess] = useState('');

            useEffect(() => { init(); }, []);

            const init = async () => {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) { window.location.href = 'login.html'; return; }

                setUser(session.user);
                const meta = session.user.user_metadata || {};
                setProfileData({
                    full_name:   meta.full_name    || '',
                    email:       session.user.email || '',
                    phone:       meta.phone         || '',
                    cnpj:        meta.cnpj          || '',
                    razao_social: meta.razao_social || ''
                });

                const { data: prof } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', session.user.id)
                    .single();

                setProfile(prof || {});
                setLoading(false);
            };

            const saveProfile = async (e) => {
                e.preventDefault();
                setSavingProfile(true);
                setProfileSuccess('');
                const { error } = await supabase.auth.updateUser({
                    data: {
                        full_name:    profileData.full_name,
                        phone:        profileData.phone,
                        cnpj:         profileData.cnpj,
                        razao_social: profileData.razao_social
                    }
                });
                setSavingProfile(false);
                if (!error) {
                    setProfileSuccess('Dados salvos com sucesso!');
                    setTimeout(() => setProfileSuccess(''), 3000);
                }
            };

            const logout = async () => {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-[#05121b]">
                    <Loader2 className="animate-spin text-emerald-400" size={40} />
                </div>
            );

            const firstName    = (profileData.full_name || 'Cliente').split(' ')[0];
            const cnpjStatus   = profile?.credito_cnpj_status || 'aguardando';
            const opStatus     = profile?.credito_operacao_status || null;
            const statusInfo   = CNPJ_STATUS_MAP[cnpjStatus] || CNPJ_STATUS_MAP.aguardando;
            const currentStep  = opStatus ? OPERACAO_STEPS.findIndex(s => s.id === opStatus) : -1;
            const isCanceled   = opStatus === 'cancelada';

            return (
                <div className="flex min-h-screen">

                    {/* Mobile overlay */}
                    {sidebarOpen && (
                        <div className="fixed inset-0 bg-black/60 z-20 lg:hidden" onClick={() => setSidebarOpen(false)} />
                    )}

                    {/* ── SIDEBAR ── */}
                    <aside className={`fixed lg:sticky top-0 h-screen w-60 bg-[#030a0f] border-r border-white/5 flex flex-col z-30 transition-transform duration-300
                        ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>

                        {/* Logo + produto */}
                        <div className="px-5 py-6 border-b border-white/5">
                            <a href="hub_cliente.html" className="flex items-center gap-2 mb-3">
                                <img src="logo2.png" alt="OLUAP" className="h-6 object-contain"
                                    onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                                <div className="hidden items-center">
                                    <span className="font-black italic text-base tracking-tighter text-white">OLUAP</span>
                                </div>
                            </a>
                            <div className="flex items-center gap-2">
                                <div className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                                <span className="text-[9px] font-black text-emerald-400 uppercase tracking-widest">Crédito Inteligente</span>
                            </div>
                        </div>

                        {/* User info */}
                        <div className="px-5 py-4 border-b border-white/5">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center shrink-0">
                                    <User size={14} className="text-emerald-400" />
                                </div>
                                <div className="min-w-0">
                                    <p className="text-xs font-black text-white truncate">{firstName}</p>
                                    <p className="text-[10px] text-slate-500 truncate">{profileData.email}</p>
                                </div>
                            </div>
                        </div>

                        {/* Nav items */}
                        <nav className="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                            {MENU_ITEMS.map(({ id, label, Icon }) => {
                                const active = activeMenu === id;
                                return (
                                    <button key={id}
                                        onClick={() => { setActiveMenu(id); setSidebarOpen(false); }}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-black transition-all text-left
                                            ${active
                                                ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20'
                                                : 'text-slate-400 hover:bg-white/5 hover:text-white border border-transparent'
                                            }`}>
                                        <Icon size={15} />
                                        {label}
                                        {active && <ChevronRight size={13} className="ml-auto" />}
                                    </button>
                                );
                            })}
                        </nav>

                        {/* Bottom links */}
                        <div className="px-3 py-4 border-t border-white/5 space-y-1">
                            <a href="hub_cliente.html"
                                className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-black text-slate-500 hover:bg-white/5 hover:text-slate-300 transition-all">
                                <ArrowRight size={15} className="rotate-180" /> Voltar ao Hub
                            </a>
                            <button onClick={logout}
                                className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-black text-slate-500 hover:bg-red-500/10 hover:text-red-400 transition-all">
                                <LogOut size={15} /> Sair
                            </button>
                        </div>
                    </aside>

                    {/* ── MAIN ── */}
                    <div className="flex-1 flex flex-col min-h-screen">

                        {/* Mobile top bar */}
                        <header className="lg:hidden sticky top-0 z-10 bg-[#030a0f]/90 backdrop-blur border-b border-white/5 px-4 py-3 flex items-center justify-between">
                            <button onClick={() => setSidebarOpen(true)} className="p-2 space-y-1">
                                <div className="w-5 h-0.5 bg-white rounded"></div>
                                <div className="w-5 h-0.5 bg-white rounded"></div>
                                <div className="w-5 h-0.5 bg-white rounded"></div>
                            </button>
                            <span className="text-sm font-black text-white">
                                {MENU_ITEMS.find(m => m.id === activeMenu)?.label}
                            </span>
                            <div className="w-9" />
                        </header>

                        <main className="flex-1 px-6 py-10 max-w-2xl mx-auto w-full">

                            {/* ══════════ ANÁLISES ══════════ */}
                            {activeMenu === 'analises' && (
                                <div>
                                    <div className="mb-8">
                                        <h1 className="text-2xl font-black text-white tracking-tight mb-1">Análise do CNPJ</h1>
                                        <p className="text-slate-400 text-sm">Acompanhe o status da análise junto ao nosso parceiro financeiro.</p>
                                    </div>

                                    {/* Status card */}
                                    <div className={`${statusInfo.bg} border ${statusInfo.border} rounded-2xl p-7 mb-6`}>
                                        <div className="flex items-start gap-5">
                                            <div className={`w-13 h-13 w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 ${statusInfo.bg} border ${statusInfo.border}`}>
                                                {cnpjStatus === 'aguardando'  && <Clock    size={24} className={statusInfo.color} />}
                                                {cnpjStatus === 'em_analise'  && <Search   size={24} className={`${statusInfo.color} animate-pulse`} />}
                                                {cnpjStatus === 'aprovado'    && <CheckCircle size={24} className={statusInfo.color} />}
                                                {cnpjStatus === 'reprovado'   && <XCircle  size={24} className={statusInfo.color} />}
                                            </div>
                                            <div className="flex-1">
                                                <span className={`inline-block text-[9px] font-black px-3 py-1 rounded-full border uppercase tracking-widest mb-2 ${statusInfo.bg} ${statusInfo.border} ${statusInfo.color}`}>
                                                    {statusInfo.label}
                                                </span>
                                                <p className="text-sm text-slate-300 leading-relaxed">{statusInfo.desc}</p>
                                                {profileData.cnpj && (
                                                    <p className="text-[11px] text-slate-500 mt-2">
                                                        CNPJ: <span className="text-slate-400 font-bold">{profileData.cnpj}</span>
                                                    </p>
                                                )}
                                            </div>
                                        </div>

                                        {/* Aprovado → botão parceiro */}
                                        {cnpjStatus === 'aprovado' && (
                                            <div className="mt-6 pt-6 border-t border-emerald-500/20">
                                                <div className="bg-[#05121b]/70 border border-amber-500/20 rounded-xl p-4 mb-5 flex items-start gap-3">
                                                    <AlertTriangle size={14} className="text-amber-400 shrink-0 mt-0.5" />
                                                    <p className="text-[11px] text-slate-400 leading-relaxed">
                                                        Você será redirecionado para o sistema do nosso <strong className="text-white">parceiro financeiro</strong> para anexar suas notas fiscais. É um ambiente seguro e totalmente parceiro da OLUAP.
                                                    </p>
                                                </div>
                                                <a href={PARCEIRO_URL} target="_blank" rel="noopener noreferrer"
                                                    className="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all hover:scale-[1.02] shadow-lg shadow-emerald-600/20">
                                                    Anexar Notas Fiscais <ExternalLink size={14} />
                                                </a>
                                            </div>
                                        )}

                                        {/* Reprovado → contato */}
                                        {cnpjStatus === 'reprovado' && (
                                            <div className="mt-6 pt-6 border-t border-red-500/20">
                                                <p className="text-xs text-slate-400 mb-3">Fale com nossa equipe para entender os próximos passos:</p>
                                                <a href="mailto:contato@oluap.com.br"
                                                    className="inline-flex items-center gap-2 text-xs font-black text-red-400 hover:text-red-300 transition-colors">
                                                    <Mail size={13} /> contato@oluap.com.br
                                                </a>
                                            </div>
                                        )}
                                    </div>

                                    {/* Info trio */}
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        <div className="bg-white/5 border border-white/8 rounded-xl p-5">
                                            <FileCheck size={17} className="text-emerald-400 mb-3" />
                                            <p className="text-xs font-black text-white mb-1">Nota Fiscal</p>
                                            <p className="text-[11px] text-slate-400 leading-relaxed">Tenha a nota fiscal de produto ou serviço com valor a receber.</p>
                                        </div>
                                        <div className="bg-white/5 border border-white/8 rounded-xl p-5">
                                            <Clock size={17} className="text-[#22d3ee] mb-3" />
                                            <p className="text-xs font-black text-white mb-1">Prazo</p>
                                            <p className="text-[11px] text-slate-400 leading-relaxed">Análise feita em até 24 horas pelo parceiro financeiro.</p>
                                        </div>
                                        <div className="bg-white/5 border border-white/8 rounded-xl p-5">
                                            <Shield size={17} className="text-blue-400 mb-3" />
                                            <p className="text-xs font-black text-white mb-1">Segurança</p>
                                            <p className="text-[11px] text-slate-400 leading-relaxed">Dados compartilhados apenas com o parceiro autorizado.</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ══════════ OPERAÇÃO ══════════ */}
                            {activeMenu === 'operacao' && (
                                <div>
                                    <div className="mb-8">
                                        <h1 className="text-2xl font-black text-white tracking-tight mb-1">Acompanhar Operação</h1>
                                        <p className="text-slate-400 text-sm">Linha do tempo da sua operação de antecipação de recebíveis.</p>
                                    </div>

                                    {!opStatus ? (
                                        <div className="bg-white/5 border border-white/8 rounded-2xl p-12 text-center">
                                            <Rocket size={38} className="text-slate-600 mx-auto mb-4" />
                                            <p className="text-base font-black text-slate-400 mb-2">Nenhuma operação iniciada</p>
                                            <p className="text-xs text-slate-500 max-w-xs mx-auto leading-relaxed">
                                                Após a aprovação do CNPJ e o envio das notas fiscais, sua operação aparecerá aqui.
                                            </p>
                                            <button onClick={() => setActiveMenu('analises')}
                                                className="mt-6 inline-flex items-center gap-2 text-xs font-black text-emerald-400 hover:text-emerald-300 transition-colors">
                                                Verificar análise do CNPJ <ArrowRight size={13} />
                                            </button>
                                        </div>
                                    ) : isCanceled ? (
                                        <div className="bg-red-500/10 border border-red-500/20 rounded-2xl p-7 flex items-start gap-4">
                                            <XCircle size={24} className="text-red-400 shrink-0 mt-0.5" />
                                            <div>
                                                <p className="text-sm font-black text-red-400 mb-1">Operação Cancelada</p>
                                                <p className="text-xs text-slate-400 leading-relaxed">
                                                    Esta operação foi cancelada. Entre em contato com nossa equipe para mais informações.
                                                </p>
                                                <a href="mailto:contato@oluap.com.br"
                                                    className="inline-flex items-center gap-2 mt-3 text-xs font-black text-red-400 hover:text-red-300 transition-colors">
                                                    <Mail size={13} /> contato@oluap.com.br
                                                </a>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="bg-[#030a0f] border border-white/8 rounded-2xl p-8">
                                            <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-8">Linha do tempo</p>
                                            <div>
                                                {OPERACAO_STEPS.map((step, idx) => {
                                                    const done    = idx < currentStep;
                                                    const current = idx === currentStep;
                                                    const pending = idx > currentStep;
                                                    const last    = idx === OPERACAO_STEPS.length - 1;

                                                    return (
                                                        <div key={step.id} className="flex items-start gap-5">
                                                            {/* Dot + line */}
                                                            <div className="flex flex-col items-center">
                                                                <div className={`w-9 h-9 rounded-full border-2 flex items-center justify-center shrink-0 transition-all
                                                                    ${done    ? 'bg-emerald-500 border-emerald-500'
                                                                    : current ? 'bg-[#030a0f] border-emerald-400'
                                                                    :           'bg-[#030a0f] border-slate-700'}`}>
                                                                    {done    && <CheckCircle size={17} className="text-white" />}
                                                                    {current && <div className="w-3 h-3 rounded-full bg-emerald-400 animate-pulse" />}
                                                                    {pending && <div className="w-2.5 h-2.5 rounded-full bg-slate-700" />}
                                                                </div>
                                                                {!last && (
                                                                    <div className={`w-0.5 h-12 mt-1 ${done ? 'bg-emerald-500/40' : 'bg-slate-800'}`} />
                                                                )}
                                                            </div>
                                                            {/* Text */}
                                                            <div className={`flex-1 ${last ? 'pb-0' : 'pb-2'}`}>
                                                                <p className={`text-sm font-black mb-0.5 flex items-center gap-2
                                                                    ${done ? 'text-emerald-400' : current ? 'text-white' : 'text-slate-600'}`}>
                                                                    {step.label}
                                                                    {current && (
                                                                        <span className="text-[8px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded-full uppercase tracking-widest">
                                                                            Atual
                                                                        </span>
                                                                    )}
                                                                </p>
                                                                <p className={`text-xs leading-relaxed ${pending ? 'text-slate-700' : 'text-slate-400'}`}>
                                                                    {step.desc}
                                                                </p>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* ══════════ PERFIL ══════════ */}
                            {activeMenu === 'perfil' && (
                                <div>
                                    <div className="mb-8">
                                        <h1 className="text-2xl font-black text-white tracking-tight mb-1">Meu Perfil</h1>
                                        <p className="text-slate-400 text-sm">Informações sincronizadas com o Hub OLUAP.</p>
                                    </div>

                                    <div className="bg-[#030a0f] border border-white/8 rounded-2xl p-7">
                                        <form onSubmit={saveProfile} className="space-y-5">
                                            <div>
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1.5 block">Nome Completo</label>
                                                <input type="text" value={profileData.full_name}
                                                    onChange={e => setProfileData({...profileData, full_name: e.target.value})}
                                                    className="w-full bg-white/5 border border-white/10 px-4 py-3 rounded-xl text-sm font-medium text-white outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/20 transition-all" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1.5 block">E-mail</label>
                                                <input type="email" value={profileData.email} readOnly
                                                    className="w-full bg-white/3 border border-white/5 px-4 py-3 rounded-xl text-sm text-slate-500 cursor-not-allowed outline-none" />
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                                <div>
                                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1.5 block">Celular / WhatsApp</label>
                                                    <input type="text" value={profileData.phone} maxLength={15} placeholder="(00) 00000-0000"
                                                        onChange={e => setProfileData({...profileData, phone: maskPhone(e.target.value)})}
                                                        className="w-full bg-white/5 border border-white/10 px-4 py-3 rounded-xl text-sm font-medium text-white outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/20 transition-all placeholder-slate-600" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1.5 block">CNPJ</label>
                                                    <input type="text" value={profileData.cnpj} maxLength={18} placeholder="00.000.000/0000-00"
                                                        onChange={e => setProfileData({...profileData, cnpj: maskCNPJ(e.target.value)})}
                                                        className="w-full bg-white/5 border border-white/10 px-4 py-3 rounded-xl text-sm font-medium text-white outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/20 transition-all placeholder-slate-600" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1.5 block">Razão Social</label>
                                                <input type="text" value={profileData.razao_social} placeholder="Nome da empresa"
                                                    onChange={e => setProfileData({...profileData, razao_social: e.target.value})}
                                                    className="w-full bg-white/5 border border-white/10 px-4 py-3 rounded-xl text-sm font-medium text-white outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/20 transition-all placeholder-slate-600" />
                                            </div>
                                            <div className="pt-2 flex items-center justify-between">
                                                <span className="text-xs font-bold text-emerald-400">{profileSuccess}</span>
                                                <button type="submit" disabled={savingProfile}
                                                    className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 disabled:opacity-60">
                                                    {savingProfile ? <Loader2 size={13} className="animate-spin" /> : 'Salvar Dados'}
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            )}

                        </main>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
