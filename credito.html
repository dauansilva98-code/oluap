<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crédito Inteligente · OLUAP</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #137789; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .slide-down { animation: slideDown 0.4s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

        /* Dark mode */
        .dk { background-color: #0d1117 !important; color: #ffffff !important; }
        .dk aside.bg-white { background-color: #161b22 !important; border-color: #30363d !important; }
        .dk .bg-white { background-color: #1c2333 !important; }
        .dk .bg-slate-50 { background-color: #161b22 !important; }
        .dk .bg-slate-100 { background-color: #21262d !important; }
        .dk .bg-slate-200 { background-color: #2d333b !important; }
        .dk .bg-\[#f5f5f0\] { background-color: #0d1117 !important; }
        .dk .bg-\[#05121b\] { background-color: #101827 !important; }
        .dk .border-slate-100 { border-color: #30363d !important; }
        .dk .border-slate-200 { border-color: #374151 !important; }
        .dk .border-slate-300 { border-color: #484f58 !important; }
        .dk .text-\[#05121b\] { color: #ffffff !important; }
        .dk .text-slate-700 { color: #ffffff !important; }
        .dk .text-slate-600 { color: #c9d1d9 !important; }
        .dk .text-slate-500 { color: #8b949e !important; }
        .dk .text-slate-400 { color: #6e7681 !important; }
        .dk input, .dk textarea, .dk select { background-color: #161b22 !important; border-color: #30363d !important; color: #c9d1d9 !important; }
        .dk input::placeholder, .dk textarea::placeholder { color: #6e7681 !important; }
        .dk .shadow-sm { box-shadow: 0 1px 4px rgba(0,0,0,.6) !important; }
        .dk .hover\:bg-slate-50:hover { background-color: #1c2333 !important; }
        .dk .divide-y > * + * { border-color: #30363d !important; }
        .dk .bg-white\/95 { background-color: rgba(22,27,34,0.95) !important; }
        /* Verde - Receita */
        .dk .bg-emerald-50 { background-color: #0b2318 !important; }
        .dk .bg-emerald-100 { background-color: #0f2d1e !important; }
        .dk .border-emerald-100, .dk .border-emerald-200 { border-color: #1a4228 !important; }
        .dk .text-emerald-800 { color: #56d364 !important; }
        .dk .text-emerald-700 { color: #56d364 !important; }
        .dk .text-emerald-600 { color: #3fb950 !important; }
        .dk .text-emerald-500 { color: #3fb950 !important; }
        /* Vermelho - Despesa / Reprovado */
        .dk .bg-red-50 { background-color: #2d1014 !important; }
        .dk .bg-red-100 { background-color: #3d1217 !important; }
        .dk .border-red-100, .dk .border-red-200 { border-color: #6e1a1a !important; }
        .dk .text-red-700 { color: #f85149 !important; }
        .dk .text-red-600 { color: #f85149 !important; }
        .dk .text-red-500 { color: #ff7b7b !important; }
        .dk .text-red-400 { color: #ff7b7b !important; }
        /* Âmbar - Alerta / Aguardando */
        .dk .bg-amber-50 { background-color: #2b1d0e !important; }
        .dk .bg-amber-100 { background-color: #332210 !important; }
        .dk .border-amber-100, .dk .border-amber-200 { border-color: #5a3c10 !important; }
        .dk .text-amber-800 { color: #e3b341 !important; }
        .dk .text-amber-700 { color: #e3b341 !important; }
        .dk .text-amber-600 { color: #d29922 !important; }
        .dk .text-amber-500 { color: #d29922 !important; }
        /* Azul - Info */
        .dk .bg-blue-50 { background-color: #0d1f2b !important; }
        .dk .bg-blue-100 { background-color: #0f2335 !important; }
        .dk .border-blue-100 { border-color: #1a3a4e !important; }
        .dk .text-blue-700 { color: #58a6ff !important; }
        .dk .text-blue-600 { color: #58a6ff !important; }
        .dk .text-blue-500 { color: #79c0ff !important; }

<body class="bg-[#f5f5f0] min-h-screen">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            User, LogOut, Loader2, CheckCircle, Clock, XCircle,
            AlertTriangle, ArrowRight, ExternalLink, Shield,
            ChevronRight, ChevronLeft, FileCheck, Search, Rocket, Mail,
            Send, Sun, Moon, TrendingUp, Zap, Camera, Menu
        } from 'lucide-react';

        const SUPABASE_URL = 'https://haxonnnbycypirigxsvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheG9ubm5ieWN5cGlyaWd4c3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTYwMzEsImV4cCI6MjA4OTYzMjAzMX0.keYNqjbu7DxBYV9f4_HW1MTaP1_TJZ_bNDTRIvSeSYw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const PARCEIRO_URL = 'https://parceiro.flipdigital.com.br/in/oluap';

        const maskCNPJ = (v) => {
            if (!v) return '';
            return v.replace(/\D/g,'').replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d)/,'$1-$2').replace(/(-\d{2})\d+?$/,'$1');
        };
        const maskPhone = (v) => {
            if (!v) return '';
            return v.replace(/\D/g,'').replace(/^(\d{2})(\d)/g,'($1) $2').replace(/(\d)(\d{4})$/,'$1-$2').substring(0,15);
        };

        const CNPJ_STATUS_MAP = {
            aguardando: {
                label: 'Aguardando Solicitação',
                color: 'text-slate-500',
                bg: 'bg-slate-50',
                border: 'border-slate-200',
                dot: 'bg-slate-400',
                desc: 'Clique em "Solicitar Análise" para enviar seus dados ao nosso parceiro financeiro.'
            },
            em_analise: {
                label: 'Em Análise',
                color: 'text-amber-600',
                bg: 'bg-amber-50',
                border: 'border-amber-200',
                dot: 'bg-amber-500',
                desc: 'Nosso time está analisando seu CNPJ. Isso pode levar até 24 horas úteis.'
            },
            aprovado: {
                label: 'Aprovado',
                color: 'text-emerald-700',
                bg: 'bg-emerald-50',
                border: 'border-emerald-200',
                dot: 'bg-emerald-500',
                desc: 'Parabéns! Seu CNPJ foi aprovado. Você pode simular uma operação de até R$ 50.000 agora mesmo.'
            },
            reprovado: {
                label: 'Não Aprovado',
                color: 'text-red-600',
                bg: 'bg-red-50',
                border: 'border-red-200',
                dot: 'bg-red-500',
                desc: 'Infelizmente seu CNPJ não foi aprovado nesta análise. Entre em contato com nossa equipe.'
            }
        };


        const MENU_ITEMS = [
            { id: 'analises', label: 'Análise',   Icon: Search },
            { id: 'operacao', label: 'Operação',  Icon: Rocket },
            { id: 'perfil',   label: 'Perfil',    Icon: User   },
        ];

        const App = () => {
            const [loading, setLoading]               = useState(true);
            const [user, setUser]                     = useState(null);
            const [profile, setProfile]               = useState(null);
            const [activeMenu, setActiveMenu]         = useState('analises');
            const [sidebarOpen, setSidebarOpen]       = useState(true);
            const [mobileOpen, setMobileOpen]         = useState(false);
            const [profileData, setProfileData]       = useState({ full_name: '', email: '', phone: '', cnpj: '', razao_social: '' });
            const [savingProfile, setSavingProfile]   = useState(false);
            const [profileSuccess, setProfileSuccess] = useState('');
            const [sendingAnalise, setSendingAnalise] = useState(false);
            const [analiseEnviada, setAnaliseEnviada] = useState(false);
            const [isDark, setIsDark]                 = useState(() => { try { return localStorage.getItem('oluap_credito_theme') === 'dark'; } catch { return false; } });
            const [profileDropdown, setProfileDropdown] = useState(false);
            const [avatarUrl, setAvatarUrl]             = useState('');

            useEffect(() => {
                try { localStorage.setItem('oluap_credito_theme', isDark ? 'dark' : 'light'); } catch {}
                document.body.className = `min-h-screen ${isDark ? 'bg-[#0d1117]' : 'bg-[#f5f5f0]'}`;
            }, [isDark]);

            useEffect(() => { init(); }, []);

            const init = async () => {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) { window.location.href = 'login.html'; return; }

                setUser(session.user);
                const meta = session.user.user_metadata || {};
                setProfileData({
                    full_name:    meta.full_name    || '',
                    email:        session.user.email || '',
                    phone:        meta.phone         || '',
                    cnpj:         meta.cnpj          || '',
                    razao_social: meta.razao_social  || ''
                });
                setAvatarUrl(meta.avatar_url || '');

                const { data: prof } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', session.user.id)
                    .single();

                setProfile(prof || {});
                setLoading(false);
            };

            const saveProfile = async (e) => {
                e.preventDefault();
                setSavingProfile(true);
                setProfileSuccess('');
                const { error } = await supabase.auth.updateUser({
                    data: {
                        full_name:    profileData.full_name,
                        phone:        profileData.phone,
                        cnpj:         profileData.cnpj,
                        razao_social: profileData.razao_social
                    }
                });
                setSavingProfile(false);
                if (!error) {
                    setProfileSuccess('Dados salvos com sucesso!');
                    setTimeout(() => setProfileSuccess(''), 3000);
                }
            };

            const handleAvatarUpload = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const size = 160;
                        canvas.width = size; canvas.height = size;
                        const ctx = canvas.getContext('2d');
                        const min = Math.min(img.width, img.height);
                        const sx = (img.width - min) / 2;
                        const sy = (img.height - min) / 2;
                        ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                        setAvatarUrl(dataUrl);
                        await supabase.auth.updateUser({ data: { avatar_url: dataUrl } });
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const solicitarAnalise = async () => {
                setSendingAnalise(true);
                try {
                    await supabase.from('profiles').update({
                        credito_cnpj_status: 'em_analise'
                    }).eq('id', user.id);
                    setProfile(prev => ({ ...prev, credito_cnpj_status: 'em_analise' }));
                    setAnaliseEnviada(true);
                    setTimeout(() => setAnaliseEnviada(false), 8000);
                } catch {}
                setSendingAnalise(false);
            };

            const logout = async () => {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            };

            const navTo = (id) => { setActiveMenu(id); setMobileOpen(false); };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-[#f5f5f0]">
                    <Loader2 className="animate-spin text-[#137789]" size={36} />
                </div>
            );

            const firstName   = (profileData.full_name || 'Cliente').split(' ')[0];
            const cnpjStatus  = profile?.credito_cnpj_status || 'aguardando';
            const opStatus    = profile?.credito_operacao_status || null;
            const statusInfo  = CNPJ_STATUS_MAP[cnpjStatus] || CNPJ_STATUS_MAP.aguardando;
            const isCanceled  = opStatus === 'cancelada';

            const timelineSteps = [
                { id: 'preenchimento', label: 'Preenchimento de Dados',
                  desc: 'Dados enviados para análise junto ao nosso parceiro financeiro.' },
                { id: 'analise',
                  label: cnpjStatus === 'reprovado' ? 'Não Aprovado' : 'Aprovado',
                  desc:  cnpjStatus === 'reprovado'
                            ? 'Seu CNPJ não foi aprovado nesta análise. Em 90 dias realizamos uma nova avaliação.'
                         : cnpjStatus === 'em_analise'
                            ? 'Aguardando o resultado da análise. Isso pode levar até 24 horas úteis.'
                            : 'CNPJ aprovado! Anexe suas notas fiscais e simule sua operação.' },
                { id: 'criada', label: 'Operação Criada',  desc: 'Operação formalizada e em processamento.' },
                { id: 'paga',   label: 'Operação Paga',    desc: 'Valor creditado diretamente na sua conta bancária.' },
            ];
            const getStepState = (stepId) => {
                if (stepId === 'preenchimento') return cnpjStatus !== 'aguardando' ? 'done' : 'pending';
                if (stepId === 'analise') {
                    if (cnpjStatus === 'em_analise') return 'current';
                    if (cnpjStatus === 'aprovado')   return 'done';
                    if (cnpjStatus === 'reprovado')  return 'reprovado';
                    return 'pending';
                }
                if (cnpjStatus === 'reprovado') return 'hidden';
                if (stepId === 'criada') {
                    if (opStatus === 'paga')   return 'done';
                    if (opStatus === 'criada') return 'current';
                    return 'pending';
                }
                if (stepId === 'paga') return opStatus === 'paga' ? 'done' : 'pending';
                return 'pending';
            };

            return (
                <div className={`min-h-screen bg-[#f5f5f0] flex text-[#05121b] overflow-x-hidden${isDark ? ' dk' : ''}`}>

                    {/* Mobile overlay */}
                    {mobileOpen && (
                        <div className="fixed inset-0 bg-black/40 z-20 lg:hidden" onClick={() => setMobileOpen(false)} />
                    )}

                    {/* ── SIDEBAR ── */}
                    <aside className={`bg-white h-screen border-r border-slate-100 py-5 flex flex-col fixed left-0 top-0 z-40 shadow-sm transition-all duration-300
                        ${sidebarOpen ? 'w-56 px-4' : 'w-16 px-2'}
                        ${mobileOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>

                        {/* Toggle collapse button */}
                        <button onClick={() => setSidebarOpen(!sidebarOpen)}
                            className="hidden lg:flex absolute -right-3 top-8 bg-white border border-slate-200 p-1.5 rounded-full shadow-sm text-slate-400 hover:text-[#ff7b00] z-50 items-center justify-center transition-all hover:scale-110">
                            <ChevronLeft size={13} style={{ transform: sidebarOpen ? 'rotate(0deg)' : 'rotate(180deg)', transition: 'transform 0.3s' }} />
                        </button>

                        {/* Logo */}
                        <div className={`flex items-center ${sidebarOpen ? 'justify-start px-1' : 'justify-center'} mb-6 mt-1`}>
                            {sidebarOpen
                                ? <img src="logo2.png" alt="OLUAP" className="h-7 object-contain" onError={e => { e.target.style.display='none'; }} />
                                : <img src="icone.png" alt="OLUAP" className="w-7 h-7 object-contain" onError={e => { e.target.style.display='none'; }} />
                            }
                        </div>

                        {/* Product badge */}
                        {sidebarOpen && (
                            <div className="px-1 mb-4">
                                <div className="flex items-center gap-2">
                                    <div className="w-1.5 h-1.5 rounded-full bg-[#137789] animate-pulse"></div>
                                    <span className="text-[9px] font-black text-[#137789] uppercase tracking-widest">Crédito Inteligente</span>
                                </div>
                            </div>
                        )}


                        {/* Nav items */}
                        <nav className="flex-1 space-y-1 mt-1">
                            {MENU_ITEMS.map(({ id, label, Icon }) => {
                                const active = activeMenu === id;
                                return (
                                    <button key={id} onClick={() => navTo(id)} title={!sidebarOpen ? label : ''}
                                        className={`w-full flex items-center ${sidebarOpen ? 'justify-start gap-3 px-3' : 'justify-center px-0'} py-2.5 rounded-xl font-bold text-[11px] transition-all
                                            ${active ? 'bg-[#05121b] text-white shadow-md' : 'text-slate-400 hover:bg-slate-50 hover:text-[#05121b]'}`}>
                                        <Icon size={sidebarOpen ? 15 : 20} className="shrink-0" />
                                        {sidebarOpen && <span className="truncate">{label}</span>}
                                    </button>
                                );
                            })}
                        </nav>

                        {/* Bottom links */}
                        <div className="flex flex-col gap-1 mt-3 pt-3 border-t border-slate-100">
                            <button onClick={() => window.location.href = 'hub_cliente.html'}
                                title={!sidebarOpen ? 'Hub' : ''}
                                className={`w-full flex items-center ${sidebarOpen ? 'justify-start gap-3 px-3' : 'justify-center px-0'} py-2.5 text-slate-400 font-bold text-[11px] hover:text-[#137789] hover:bg-slate-50 rounded-xl transition-colors`}>
                                <ArrowRight size={sidebarOpen ? 15 : 20} className="shrink-0 rotate-180" />
                                {sidebarOpen && <span>Voltar ao Hub</span>}
                            </button>
                            <button onClick={logout}
                                title={!sidebarOpen ? 'Sair' : ''}
                                className={`w-full flex items-center ${sidebarOpen ? 'justify-start gap-3 px-3' : 'justify-center px-0'} py-2.5 text-slate-400 font-bold text-[11px] hover:text-red-500 hover:bg-slate-50 rounded-xl transition-colors`}>
                                <LogOut size={sidebarOpen ? 15 : 20} className="shrink-0" />
                                {sidebarOpen && <span>Sair</span>}
                            </button>
                        </div>
                    </aside>

                    {/* ── MAIN ── */}
                    <div className={`flex-1 transition-all duration-300 ${sidebarOpen ? 'lg:ml-56' : 'lg:ml-16'} min-h-screen flex flex-col`}>

                        {/* Top bar (mobile hamburger + profile widget) */}
                        <header className="sticky top-0 z-10 bg-white/95 backdrop-blur border-b border-slate-100 px-4 py-2.5 flex items-center justify-between shadow-sm">
                            {/* Mobile hamburger */}
                            <button onClick={() => setMobileOpen(true)} className="lg:hidden p-2 -ml-1 rounded-lg hover:bg-slate-50 transition-colors">
                                <Menu size={20} className="text-[#05121b]" />
                            </button>
                            {/* Page title on mobile */}
                            <span className="lg:hidden text-sm font-black text-[#05121b]">
                                {MENU_ITEMS.find(m => m.id === activeMenu)?.label}
                            </span>
                            {/* Spacer on desktop */}
                            <div className="hidden lg:block flex-1" />
                            {/* Profile widget */}
                            <div className="relative">
                                <button onClick={() => setProfileDropdown(v => !v)}
                                    className="flex items-center gap-2.5 bg-white border border-slate-200 rounded-full pl-1 pr-3 py-1 shadow-sm hover:shadow-md transition-all">
                                    <div className="w-8 h-8 rounded-full overflow-hidden bg-[#137789]/10 border border-[#137789]/20 flex items-center justify-center shrink-0">
                                        {avatarUrl
                                            ? <img src={avatarUrl} className="w-full h-full object-cover" alt="avatar" />
                                            : <span className="text-xs font-black text-[#137789]">{firstName[0]}</span>
                                        }
                                    </div>
                                    <div className="text-left hidden sm:block">
                                        <p className="text-xs font-black text-[#05121b] leading-tight">{firstName}</p>
                                        <p className="text-[10px] text-slate-400 leading-none">{profileData.email}</p>
                                    </div>
                                </button>
                                {profileDropdown && (
                                    <>
                                        <div className="fixed inset-0 z-40" onClick={() => setProfileDropdown(false)} />
                                        <div className="absolute right-0 top-full mt-2 w-48 bg-white border border-slate-200 rounded-2xl shadow-xl z-50 overflow-hidden">
                                            <button onClick={() => { navTo('perfil'); setProfileDropdown(false); }}
                                                className="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-50 text-xs font-bold text-[#05121b] transition-colors">
                                                <User size={14} /> Meu Perfil
                                            </button>
                                            <div className="border-t border-slate-100" />
                                            <button onClick={logout}
                                                className="w-full flex items-center gap-3 px-4 py-3 hover:bg-red-50 text-xs font-bold text-red-500 transition-colors">
                                                <LogOut size={14} /> Sair
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </header>

                        <main className="flex-1 p-6 md:p-8">

                            {/* ══════════ ANÁLISE ══════════ */}
                            {activeMenu === 'analises' && (
                                <div className="max-w-2xl mx-auto fade-in">
                                    <header className="mb-8">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Crédito Inteligente</p>
                                        <h1 className="text-2xl font-black text-[#05121b] italic">Análise do CNPJ</h1>
                                    </header>

                                    {/* Aviso de análise enviada */}
                                    {analiseEnviada && (
                                        <div className="slide-down mb-6 bg-emerald-50 border border-emerald-200 rounded-2xl p-4 flex items-start gap-3">
                                            <div className="w-8 h-8 bg-emerald-500 rounded-xl flex items-center justify-center shrink-0">
                                                <CheckCircle size={16} className="text-white" />
                                            </div>
                                            <div>
                                                <p className="font-black text-emerald-800 text-sm">Análise enviada com sucesso!</p>
                                                <p className="text-[11px] text-emerald-600 mt-0.5">Nossa equipe vai retornar em alguns minutos com o resultado.</p>
                                            </div>
                                        </div>
                                    )}

                                    {/* Status card */}
                                    <div className={`${statusInfo.bg} border ${statusInfo.border} rounded-2xl p-7 mb-6 shadow-sm`}>
                                        <div className="flex items-start gap-4">
                                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 ${statusInfo.bg} border ${statusInfo.border}`}>
                                                {cnpjStatus === 'aguardando'  && <Clock    size={22} className={statusInfo.color} />}
                                                {cnpjStatus === 'em_analise'  && <Search   size={22} className={`${statusInfo.color} animate-pulse`} />}
                                                {cnpjStatus === 'aprovado'    && <CheckCircle size={22} className={statusInfo.color} />}
                                                {cnpjStatus === 'reprovado'   && <XCircle  size={22} className={statusInfo.color} />}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <div className={`w-2 h-2 rounded-full ${statusInfo.dot} ${cnpjStatus === 'em_analise' ? 'animate-pulse' : ''}`}></div>
                                                    <span className={`text-[10px] font-black uppercase tracking-widest ${statusInfo.color}`}>{statusInfo.label}</span>
                                                </div>
                                                <p className="text-sm text-slate-600 leading-relaxed">{statusInfo.desc}</p>
                                                {profileData.cnpj && (
                                                    <p className="text-[11px] text-slate-400 mt-2">
                                                        CNPJ: <span className="text-[#05121b] font-bold">{profileData.cnpj}</span>
                                                    </p>
                                                )}
                                            </div>
                                        </div>

                                        {/* Aguardando → Solicitar Análise */}
                                        {cnpjStatus === 'aguardando' && (
                                            <div className="mt-6 pt-6 border-t border-slate-200">
                                                <button onClick={solicitarAnalise} disabled={sendingAnalise}
                                                    className="inline-flex items-center gap-2.5 bg-[#05121b] hover:bg-[#137789] text-white px-7 py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all hover:scale-[1.02] shadow-md disabled:opacity-60">
                                                    {sendingAnalise
                                                        ? <><Loader2 size={14} className="animate-spin" /> Enviando...</>
                                                        : <><Send size={14} /> Solicitar Análise</>
                                                    }
                                                </button>
                                            </div>
                                        )}

                                        {/* Aprovado → Simular Operação ou Operação Concluída */}
                                        {cnpjStatus === 'aprovado' && (
                                            <div className="mt-6 pt-6 border-t border-emerald-200">
                                                {opStatus === 'paga' ? (
                                                    <div className="bg-white border border-emerald-100 rounded-xl p-5 flex items-start gap-3">
                                                        <div className="w-8 h-8 bg-emerald-500 rounded-xl flex items-center justify-center shrink-0">
                                                            <CheckCircle size={15} className="text-white" />
                                                        </div>
                                                        <div className="flex-1">
                                                            <p className="text-sm font-black text-emerald-700 mb-1">Primeira operação concluída!</p>
                                                            <p className="text-[11px] text-slate-500 leading-relaxed mb-3">
                                                                Para realizar novas operações, acesse a plataforma do nosso parceiro e anexe os documentos da próxima nota fiscal.
                                                            </p>
                                                            <a href={PARCEIRO_URL} target="_blank" rel="noopener noreferrer"
                                                                className="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all hover:scale-[1.02] shadow-md">
                                                                <ExternalLink size={13} /> Acessar Plataforma do Parceiro
                                                            </a>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <div className="bg-white border border-emerald-100 rounded-xl p-4 mb-5 flex items-start gap-3">
                                                            <Zap size={14} className="text-[#ff7b00] shrink-0 mt-0.5" />
                                                            <p className="text-[11px] text-slate-600 leading-relaxed">
                                                                Seu CNPJ está aprovado! Simule uma operação de antecipação de recebíveis <strong className="text-[#05121b]">sem cadastro</strong>, até <strong className="text-[#05121b]">R$ 50.000</strong>.
                                                            </p>
                                                        </div>
                                                        <a href={PARCEIRO_URL} target="_blank" rel="noopener noreferrer"
                                                            className="inline-flex items-center gap-2.5 bg-emerald-600 hover:bg-emerald-700 text-white px-7 py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all hover:scale-[1.02] shadow-lg shadow-emerald-600/20">
                                                            <TrendingUp size={14} /> Simular Operação até R$ 50k <ExternalLink size={13} />
                                                        </a>
                                                    </>
                                                )}
                                            </div>
                                        )}

                                        {/* Reprovado → contato */}
                                        {cnpjStatus === 'reprovado' && (
                                            <div className="mt-6 pt-6 border-t border-red-200">
                                                <p className="text-xs text-slate-500 mb-3">Fale com nossa equipe para entender os próximos passos:</p>
                                                <a href="mailto:contato@oluap.com.br"
                                                    className="inline-flex items-center gap-2 text-sm font-black text-red-600 hover:text-red-700 transition-colors">
                                                    <Mail size={14} /> contato@oluap.com.br
                                                </a>
                                            </div>
                                        )}
                                    </div>

                                    {/* Info trio */}
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
                                            <FileCheck size={17} className="text-[#137789] mb-3" />
                                            <p className="text-xs font-black text-[#05121b] mb-1">Nota Fiscal</p>
                                            <p className="text-[11px] text-slate-500 leading-relaxed">Tenha a nota fiscal de produto ou serviço com valor a receber.</p>
                                        </div>
                                        <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
                                            <Clock size={17} className="text-[#137789] mb-3" />
                                            <p className="text-xs font-black text-[#05121b] mb-1">Prazo</p>
                                            <p className="text-[11px] text-slate-500 leading-relaxed">Análise feita em até 24 horas pelo nosso time.</p>
                                        </div>
                                        <div className="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
                                            <Shield size={17} className="text-[#137789] mb-3" />
                                            <p className="text-xs font-black text-[#05121b] mb-1">Segurança</p>
                                            <p className="text-[11px] text-slate-500 leading-relaxed">Dados compartilhados apenas com parceiro autorizado.</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ══════════ OPERAÇÃO ══════════ */}
                            {activeMenu === 'operacao' && (
                                <div className="max-w-2xl mx-auto fade-in">
                                    <header className="mb-8">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Crédito Inteligente</p>
                                        <h1 className="text-2xl font-black text-[#05121b] italic">Acompanhar Operação</h1>
                                    </header>

                                    {cnpjStatus === 'aguardando' ? (
                                        <div className="bg-white border border-slate-100 rounded-2xl p-12 text-center shadow-sm">
                                            <Rocket size={36} className="text-slate-300 mx-auto mb-4" />
                                            <p className="text-base font-black text-slate-500 mb-2">Nenhuma operação iniciada</p>
                                            <p className="text-xs text-slate-400 max-w-xs mx-auto leading-relaxed">
                                                Após a aprovação do CNPJ e o envio das notas fiscais, sua operação aparecerá aqui.
                                            </p>
                                            <button onClick={() => setActiveMenu('analises')}
                                                className="mt-6 inline-flex items-center gap-2 text-xs font-black text-[#137789] hover:text-[#05121b] transition-colors">
                                                Verificar análise do CNPJ <ChevronRight size={13} />
                                            </button>
                                        </div>
                                    ) : isCanceled ? (
                                        <div className="bg-red-50 border border-red-200 rounded-2xl p-7 flex items-start gap-4 shadow-sm">
                                            <XCircle size={22} className="text-red-500 shrink-0 mt-0.5" />
                                            <div>
                                                <p className="text-sm font-black text-red-700 mb-1">Operação Cancelada</p>
                                                <p className="text-xs text-slate-500 leading-relaxed">
                                                    Esta operação foi cancelada. Entre em contato para mais informações.
                                                </p>
                                                <a href="mailto:contato@oluap.com.br"
                                                    className="inline-flex items-center gap-2 mt-3 text-xs font-black text-red-600 hover:text-red-700 transition-colors">
                                                    <Mail size={13} /> contato@oluap.com.br
                                                </a>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="bg-white border border-slate-100 rounded-2xl p-8 shadow-sm">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-8">Linha do tempo</p>
                                            <div>
                                                {(() => {
                                                    const visibleSteps = cnpjStatus === 'reprovado'
                                                        ? timelineSteps.slice(0, 2)
                                                        : timelineSteps;
                                                    return visibleSteps.map((step, idx) => {
                                                        const state       = getStepState(step.id);
                                                        const last        = idx === visibleSteps.length - 1;
                                                        const done        = state === 'done';
                                                        const current     = state === 'current';
                                                        const isReprovado = state === 'reprovado';
                                                        const pending     = state === 'pending';
                                                        const lineColor   = done ? '#137789' : isReprovado ? '#fca5a5' : '#e2e8f0';
                                                        return (
                                                            <div key={step.id} className="flex items-start gap-5">
                                                                <div className="flex flex-col items-center">
                                                                    <div className={`w-9 h-9 rounded-full border-2 flex items-center justify-center shrink-0 transition-all
                                                                        ${done        ? 'bg-[#137789] border-[#137789]'
                                                                        : current     ? 'bg-white border-[#137789]'
                                                                        : isReprovado ? 'bg-red-500 border-red-500'
                                                                        :               'bg-white border-slate-200'}`}>
                                                                        {done        && <CheckCircle size={17} className="text-white" />}
                                                                        {current     && <div className="w-3 h-3 rounded-full bg-[#137789] animate-pulse" />}
                                                                        {isReprovado && <XCircle size={17} className="text-white" />}
                                                                        {pending     && <div className="w-2.5 h-2.5 rounded-full bg-slate-200" />}
                                                                    </div>
                                                                    {!last && (
                                                                        <div className="w-0.5 h-12 mt-1" style={{ backgroundColor: lineColor }} />
                                                                    )}
                                                                </div>
                                                                <div className={`flex-1 ${last ? 'pb-0' : 'pb-2'}`}>
                                                                    <p className={`text-sm font-black mb-0.5 flex items-center gap-2
                                                                        ${done ? 'text-[#137789]' : current ? 'text-[#05121b]' : isReprovado ? 'text-red-600' : 'text-slate-300'}`}>
                                                                        {step.label}
                                                                        {current && (
                                                                            <span className="text-[8px] bg-[#137789]/10 text-[#137789] border border-[#137789]/20 px-2 py-0.5 rounded-full uppercase tracking-widest">
                                                                                Atual
                                                                            </span>
                                                                        )}
                                                                    </p>
                                                                    <p className={`text-xs leading-relaxed ${isReprovado ? 'text-red-400' : pending ? 'text-slate-300' : 'text-slate-500'}`}>
                                                                        {step.desc}
                                                                    </p>
                                                                    {/* Aviso discreto quando aprovado, antes de criar operação */}
                                                                    {step.id === 'analise' && done && !opStatus && (
                                                                        <div className="mt-3 flex items-start gap-2 bg-amber-50 border border-amber-100 rounded-xl p-3">
                                                                            <Zap size={13} className="text-[#ff7b00] shrink-0 mt-0.5" />
                                                                            <p className="text-[11px] text-slate-600 leading-relaxed">
                                                                                Anexe suas notas fiscais e simule uma operação na plataforma do parceiro para dar início ao processo.{' '}
                                                                                <a href={PARCEIRO_URL} target="_blank" rel="noopener noreferrer"
                                                                                    className="font-black text-[#137789] hover:underline inline-flex items-center gap-0.5">
                                                                                    Acessar <ExternalLink size={10} />
                                                                                </a>
                                                                            </p>
                                                                        </div>
                                                                    )}
                                                                    {/* Info 90 dias quando reprovado */}
                                                                    {step.id === 'analise' && isReprovado && (
                                                                        <p className="mt-1.5 text-[11px] text-red-400 font-bold">
                                                                            Nova análise disponível em 90 dias.
                                                                        </p>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        );
                                                    });
                                                })()}
                                            </div>

                                            {/* Banner de conclusão */}
                                            {opStatus === 'paga' && (
                                                <div className="mt-7 pt-6 border-t border-slate-100">
                                                    <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-5 flex items-start gap-4">
                                                        <div className="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shrink-0">
                                                            <CheckCircle size={20} className="text-white" />
                                                        </div>
                                                        <div className="flex-1">
                                                            <p className="text-sm font-black text-emerald-700 mb-1">Operação Concluída!</p>
                                                            <p className="text-[11px] text-slate-600 leading-relaxed mb-4">
                                                                O valor foi creditado na sua conta. Para realizar novas operações, acesse a plataforma do nosso parceiro e anexe os documentos da próxima nota fiscal.
                                                            </p>
                                                            <a href={PARCEIRO_URL} target="_blank" rel="noopener noreferrer"
                                                                className="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all hover:scale-[1.02] shadow-md shadow-emerald-600/20">
                                                                <ExternalLink size={13} /> Acessar Plataforma do Parceiro
                                                            </a>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* ══════════ PERFIL ══════════ */}
                            {activeMenu === 'perfil' && (
                                <div className="max-w-2xl mx-auto fade-in">
                                    <header className="mb-8">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Configurações</p>
                                        <h1 className="text-2xl font-black text-[#05121b] italic">Meu Perfil</h1>
                                    </header>

                                    {/* Avatar upload */}
                                    <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm mb-5 flex flex-col items-center gap-3">
                                        <div className="relative">
                                            <div className="w-20 h-20 rounded-full overflow-hidden bg-[#137789]/10 border-2 border-[#137789]/20 flex items-center justify-center">
                                                {avatarUrl
                                                    ? <img src={avatarUrl} className="w-full h-full object-cover" alt="avatar" />
                                                    : <span className="text-2xl font-black text-[#137789]">{firstName[0]}</span>
                                                }
                                            </div>
                                            <label className="absolute -bottom-1 -right-1 w-7 h-7 bg-[#137789] hover:bg-[#05121b] rounded-full flex items-center justify-center cursor-pointer shadow-md transition-colors">
                                                <Camera size={13} className="text-white" />
                                                <input type="file" accept="image/*" className="hidden" onChange={handleAvatarUpload} />
                                            </label>
                                        </div>
                                        <p className="text-[10px] text-slate-400">Clique no ícone para alterar a foto</p>
                                    </div>

                                    <div className="bg-white border border-slate-100 rounded-2xl p-7 shadow-sm mb-5">
                                        <form onSubmit={saveProfile} className="space-y-5">
                                            <div>
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5 block">Nome Completo</label>
                                                <input type="text" value={profileData.full_name}
                                                    onChange={e => setProfileData({...profileData, full_name: e.target.value})}
                                                    className="w-full bg-white border border-slate-200 px-4 py-3 rounded-xl text-sm font-medium text-[#05121b] outline-none focus:border-[#137789] focus:ring-1 focus:ring-[#137789]/20 transition-all" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5 block">E-mail</label>
                                                <input type="email" value={profileData.email} readOnly
                                                    className="w-full bg-slate-50 border border-slate-100 px-4 py-3 rounded-xl text-sm text-slate-400 cursor-not-allowed outline-none" />
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                                <div>
                                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5 block">Celular / WhatsApp</label>
                                                    <input type="text" value={profileData.phone} maxLength={15} placeholder="(00) 00000-0000"
                                                        onChange={e => setProfileData({...profileData, phone: maskPhone(e.target.value)})}
                                                        className="w-full bg-white border border-slate-200 px-4 py-3 rounded-xl text-sm font-medium text-[#05121b] outline-none focus:border-[#137789] focus:ring-1 focus:ring-[#137789]/20 transition-all placeholder-slate-300" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5 block">CNPJ</label>
                                                    <input type="text" value={profileData.cnpj} maxLength={18} placeholder="00.000.000/0000-00"
                                                        onChange={e => setProfileData({...profileData, cnpj: maskCNPJ(e.target.value)})}
                                                        className="w-full bg-white border border-slate-200 px-4 py-3 rounded-xl text-sm font-medium text-[#05121b] outline-none focus:border-[#137789] focus:ring-1 focus:ring-[#137789]/20 transition-all placeholder-slate-300" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5 block">Razão Social</label>
                                                <input type="text" value={profileData.razao_social} placeholder="Nome da empresa"
                                                    onChange={e => setProfileData({...profileData, razao_social: e.target.value})}
                                                    className="w-full bg-white border border-slate-200 px-4 py-3 rounded-xl text-sm font-medium text-[#05121b] outline-none focus:border-[#137789] focus:ring-1 focus:ring-[#137789]/20 transition-all placeholder-slate-300" />
                                            </div>
                                            <div className="pt-2 flex items-center justify-between">
                                                <span className="text-xs font-bold text-emerald-600">{profileSuccess}</span>
                                                <button type="submit" disabled={savingProfile}
                                                    className="bg-[#137789] hover:bg-[#05121b] text-white px-7 py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 disabled:opacity-60 shadow-sm">
                                                    {savingProfile ? <Loader2 size={13} className="animate-spin" /> : 'Salvar Dados'}
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                    {/* Theme toggle */}
                                    <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
                                        <h3 className="font-black text-[#05121b] text-sm uppercase tracking-wide mb-5 flex items-center gap-2">
                                            <span className="text-base">{isDark ? '🌙' : '☀️'}</span> Aparência
                                        </h3>
                                        <div className="flex items-center justify-between gap-4">
                                            <div>
                                                <p className="font-bold text-[#05121b] text-sm">{isDark ? 'Modo Escuro' : 'Modo Claro'}</p>
                                                <p className="text-[10px] text-slate-400 mt-0.5">Alterna entre tema claro e escuro na plataforma.</p>
                                            </div>
                                            <button onClick={() => setIsDark(v => !v)}
                                                className={`relative w-14 h-7 rounded-full transition-all duration-300 focus:outline-none ${isDark ? 'bg-[#137789]' : 'bg-slate-200'}`}>
                                                <span className={`absolute top-0.5 left-0.5 w-6 h-6 rounded-full bg-white shadow-sm transition-all duration-300 flex items-center justify-center text-[10px] ${isDark ? 'translate-x-7' : 'translate-x-0'}`}>
                                                    {isDark ? '🌙' : '☀️'}
                                                </span>
                                            </button>
                                        </div>
                                    </div>

                                </div>
                            )}

                        </main>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
