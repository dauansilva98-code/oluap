<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLUAP - Painel do Cliente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
          "recharts": "https://esm.sh/recharts@2.12.2?external=react,react-dom"
        }
      }
    </script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }

        /* Animação suave para o banner de sucesso */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-down { animation: slideDown 0.3s ease forwards; }

        /* Destaque pulsante para campo com erro */
        @keyframes errorPulse {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
            70% { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }
        .error-pulse { animation: errorPulse 0.6s ease; }
    </style>
</head>
<body class="bg-[#05121b]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, LogOut, ShieldCheck, AlertTriangle, Plus, 
          FileText, Sparkles, Clock, Building2, Landmark, Wallet, Target, ChevronRight, 
          Upload, Info, ArrowLeft, CheckCircle, Printer, MessageCircle, Mail, Phone, 
          FileSearch, User, ChevronLeft, Menu, Loader2, BarChart2, Bell, Lightbulb,
          PartyPopper, AlertCircle, Save
        } from 'lucide-react';
        
        import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } from 'recharts';

        const SUPABASE_URL = 'https://haxonnnbycypirigxsvj.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheG9ubm5ieWN5cGlyaWd4c3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTYwMzEsImV4cCI6MjA4OTYzMjAzMX0.keYNqjbu7DxBYV9f4_HW1MTaP1_TJZ_bNDTRIvSeSYw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Chave para rascunho no localStorage
        const DRAFT_KEY = 'oluap_form_draft';

        const CHART_COLORS = ['#137789', '#ff7b00', '#05121b', '#fbbf24', '#34d399', '#f87171', '#a78bfa', '#60a5fa'];
        const formatBRL = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
        const formatPercent = (val) => `${val}%`;

        const parseChartData = (text) => {
            if (!text) return null;
            const lines = text.split('\n').map(l => l.trim());
            const data = { estruturaResultado: [], despesasOperacionais: [], estruturaFinanceira: [], indicadores: [] };
            let currentSection = "";
            lines.forEach(line => {
                if (line.includes("Estrutura de Resultado")) currentSection = "estruturaResultado";
                else if (line.includes("Despesas Operacionais")) currentSection = "despesasOperacionais";
                else if (line.includes("Estrutura Financeira")) currentSection = "estruturaFinanceira";
                else if (line.includes("Indicadores")) currentSection = "indicadores";
                else if (line.includes(":") && currentSection) {
                    const [key, valStr] = line.split(":");
                    if (key && valStr) {
                        let rawNum = valStr.replace(/R\$/g, '').replace(/%/g, '').trim();
                        let cleanNum = rawNum.replace(/\./g, '').replace(',', '.');
                        const value = parseFloat(cleanNum);
                        if (!isNaN(value)) data[currentSection].push({ name: key.trim(), value: value });
                    }
                }
            });
            return data;
        };

        const formatCurrency = (value) => {
          if (!value) return "";
          const numericValue = value.replace(/\D/g, "");
          if (numericValue === "") return "";
          const options = { minimumFractionDigits: 2 };
          const result = new Intl.NumberFormat('pt-BR', options).format(parseFloat(numericValue) / 100);
          return `R$ ${result}`;
        };

        const maskCNPJ = (value) => {
          if (!value) return "";
          return value.replace(/\D/g, '').replace(/^(\d{2})(\d)/, '$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3').replace(/\.(\d{3})(\d)/, '.$1/$2').replace(/(\d{4})(\d)/, '$1-$2').replace(/(-\d{2})\d+?$/, '$1');
        };

        const maskPhone = (value) => {
          if (!value) return "";
          return value.replace(/\D/g, '').replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d)(\d{4})$/, '$1-$2').substring(0, 15);
        };

        const isValidEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        const isValidCNPJ = (cnpj) => cnpj.replace(/\D/g, '').length === 14;

        // --- COMPONENTES DE FORMULÁRIO ---
        const InputField = ({ label, value, onChange, placeholder, maskType = "text", error, optional = false, subLabel, readOnly = false, type = "text", icon: Icon, fieldId }) => {
          const handleChange = (e) => {
            let rawValue = e.target.value;
            if (maskType === 'currency') onChange(formatCurrency(rawValue));
            else if (maskType === 'cnpj') onChange(maskCNPJ(rawValue));
            else if (maskType === 'phone') onChange(maskPhone(rawValue));
            else onChange(rawValue);
          };
          return (
            <div className="space-y-1.5 w-full text-left relative min-w-0" id={fieldId ? `field-${fieldId}` : undefined}>
              <div className="flex justify-between items-baseline px-1">
                <label className={`text-[10px] font-bold uppercase tracking-wider ${error ? 'text-red-500' : 'text-[#05121b]/50'}`}>
                  {label} {optional && <span className="lowercase font-normal italic opacity-60">(opcional)</span>}
                </label>
              </div>
              {subLabel && <p className="text-[10px] text-slate-400 px-1 mb-1 leading-relaxed">{subLabel}</p>}
              <div className="relative">
                {Icon && <Icon size={16} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-300" />}
                <input 
                    type={type} value={value || ""} onChange={handleChange} readOnly={readOnly}
                    placeholder={placeholder || (maskType === 'currency' ? "R$ 0,00" : maskType === 'cnpj' ? "00.000.000/0000-00" : maskType === 'phone' ? "(00) 00000-0000" : "")}
                    maxLength={maskType === 'cnpj' ? 18 : maskType === 'phone' ? 15 : undefined}
                    className={`w-full bg-white border ${Icon ? 'pl-10' : 'px-4'} pr-4 py-2.5 rounded-xl font-medium text-[#05121b] transition-all outline-none text-xs min-w-0 ${error ? 'border-red-500 ring-2 ring-red-500/20 error-pulse' : readOnly ? 'border-slate-100 bg-slate-50 text-slate-500 cursor-not-allowed' : 'border-slate-200 focus:ring-1 focus:ring-[#ff7b00] focus:border-[#ff7b00]'}`} 
                />
              </div>
              {/* Mensagem de erro inline por campo */}
              {error && <p className="text-[10px] text-red-500 font-bold px-1 flex items-center gap-1"><AlertCircle size={10}/> Campo obrigatório</p>}
            </div>
          );
        };

        const RadioGroup = ({ label, value, options, onChange, error, subLabel, readOnly = false, fieldId }) => (
          <div className="space-y-2 text-left" id={fieldId ? `field-${fieldId}` : undefined}>
            <label className={`text-[10px] font-bold uppercase tracking-wider px-1 ${error ? 'text-red-500' : 'text-[#05121b]/50'}`}>{label}</label>
            {subLabel && <p className="text-[10px] text-slate-400 px-1 leading-relaxed">{subLabel}</p>}
            <div className="flex flex-wrap gap-2">
              {options.map(opt => (
                <button key={opt} onClick={() => !readOnly && onChange(opt)} disabled={readOnly} className={`px-4 py-2 rounded-xl font-bold text-[10px] border transition-all ${value === opt ? 'bg-[#ff7b00] text-white border-[#ff7b00] shadow-md shadow-[#ff7b00]/20' : readOnly ? 'bg-slate-50 text-slate-400 border-slate-100' : 'bg-white text-[#05121b]/60 border-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}>
                  {opt}
                </button>
              ))}
            </div>
            {error && <p className="text-[10px] text-red-500 font-bold px-1 flex items-center gap-1"><AlertCircle size={10}/> Selecione uma opção</p>}
          </div>
        );

        const TextAreaField = ({ label, value, onChange, placeholder, error, subLabel, readOnly = false, optional = false, fieldId }) => (
          <div className="space-y-1.5 w-full text-left" id={fieldId ? `field-${fieldId}` : undefined}>
            <div className="flex justify-between items-baseline px-1">
                <label className={`text-[10px] font-bold uppercase tracking-wider ${error ? 'text-red-500' : 'text-[#05121b]/50'}`}>
                    {label} {optional && <span className="lowercase font-normal italic opacity-60">(opcional)</span>}
                </label>
            </div>
            {subLabel && <p className="text-[10px] text-slate-400 px-1 leading-relaxed">{subLabel}</p>}
            <textarea value={value || ""} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} readOnly={readOnly} className={`w-full bg-white border px-4 py-3 rounded-xl font-medium text-[#05121b] transition-all outline-none resize-none text-xs h-24 ${error ? 'border-red-500 ring-2 ring-red-500/20 error-pulse' : readOnly ? 'border-slate-100 bg-slate-50 text-slate-500 cursor-not-allowed' : 'border-slate-200 focus:ring-1 focus:ring-[#ff7b00] focus:border-[#ff7b00]'}`}></textarea>
            {error && <p className="text-[10px] text-red-500 font-bold px-1 flex items-center gap-1"><AlertCircle size={10}/> Campo obrigatório</p>}
          </div>
        );

        const FileUploadField = ({ onFilesSelected, readOnly }) => {
            const [selectedFiles, setSelectedFiles] = useState([]);
            const handleFileChange = (e) => {
                const newFiles = Array.from(e.target.files).map(f => f.name);
                setSelectedFiles([...selectedFiles, ...newFiles]);
                if(onFilesSelected) onFilesSelected([...selectedFiles, ...newFiles].join(', '));
            };
            if (readOnly) return null;
            return (
                <div className="space-y-2 w-full">
                    <label className="text-[10px] font-bold uppercase tracking-wider text-[#05121b]/50 px-1">Anexar Arquivos do Computador (Opcional)</label>
                    <label className="border-2 border-dashed border-slate-200 rounded-2xl p-6 flex flex-col items-center justify-center hover:bg-slate-50 transition-colors cursor-pointer group relative overflow-hidden">
                        <input type="file" multiple onChange={handleFileChange} disabled={readOnly} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                        <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                            <Upload size={18} className="text-slate-400 group-hover:text-[#137789]" />
                        </div>
                        <p className="text-xs font-bold text-[#05121b] mb-1 uppercase tracking-wide">Clique para selecionar arquivos</p>
                        <p className="text-[10px] text-slate-400">PDF, Excel, Word, Imagens</p>
                    </label>
                    {selectedFiles.length > 0 && (
                        <div className="mt-3 space-y-2">
                            {selectedFiles.map((file, idx) => (
                                <div key={idx} className="flex items-center gap-3 bg-emerald-50 border border-emerald-100 p-3 rounded-xl text-emerald-700">
                                    <CheckCircle size={14} className="shrink-0" />
                                    <span className="text-[10px] font-bold truncate">{file}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const SectionHeading = ({ icon: Icon, title, color = "text-[#137789]" }) => (
          <div className="flex items-center gap-2 pt-8 pb-3 border-b border-slate-100 mb-6 mt-8 first:mt-0 break-inside-avoid">
            <Icon size={18} className={color} />
            <h3 className="text-xs font-black uppercase tracking-[0.15em] text-[#05121b]">{title}</h3>
          </div>
        );

        const StepBar = ({ steps, currentStep, isV1 }) => {
            const accentColor = isV1 ? '#137789' : '#ff7b00';
            return (
                <div className="mb-8">
                    <div className="flex items-center gap-0 mb-4">
                        {steps.map((s, i) => {
                            const done = i < currentStep;
                            const active = i === currentStep;
                            return (
                                <div key={i} className="flex items-center flex-1">
                                    <div className="flex flex-col items-center gap-1.5 flex-shrink-0">
                                        <div style={{ background: done || active ? accentColor : '#e2e8f0', color: done || active ? '#fff' : '#94a3b8', boxShadow: active ? `0 0 0 4px ${accentColor}22` : 'none' }} className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-black transition-all duration-300">
                                            {done ? '✓' : i + 1}
                                        </div>
                                        <span style={{ color: done || active ? accentColor : '#94a3b8' }} className="text-[8px] font-bold uppercase tracking-wide whitespace-nowrap hidden sm:block">{s.label}</span>
                                    </div>
                                    {i < steps.length - 1 && <div style={{ background: done ? accentColor : '#e2e8f0' }} className="flex-1 h-0.5 mx-1 mb-3 transition-all duration-300" />}
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex items-center justify-between">
                        <div>
                            <p style={{ color: accentColor }} className="text-[10px] font-black uppercase tracking-widest">Etapa {currentStep + 1} de {steps.length}</p>
                            <h2 className="text-lg font-black text-[#05121b] mt-0.5">{steps[currentStep].label}</h2>
                        </div>
                        <span className="text-[10px] font-bold text-slate-400 bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-full">{Math.round(((currentStep) / steps.length) * 100)}% completo</span>
                    </div>
                </div>
            );
        };

        const STEPS_V1 = [{ label: 'Identificação' }, { label: 'Vendas' }, { label: 'Custos' }, { label: 'Caixa e Dívidas' }, { label: 'Visão e Docs' }];

        const FormStepV1 = ({ step, formData, setFormData, fieldErrors }) => {
            const fd = formData;
            const set = (k, v) => setFormData({ ...fd, [k]: v });

            if (step === 0) return (
                <div className="space-y-5">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <InputField label="Razão Social da Empresa" value={fd.v1_razao} onChange={v => set('v1_razao', v)} error={fieldErrors.v1_razao} fieldId="v1_razao" />
                        <InputField label="CNPJ" value={fd.v1_cnpj} onChange={v => set('v1_cnpj', v)} error={fieldErrors.v1_cnpj} maskType="cnpj" fieldId="v1_cnpj" />
                        <div className="md:col-span-2"><InputField label="Nome do Responsável" value={fd.v1_responsavel} onChange={v => set('v1_responsavel', v)} error={fieldErrors.v1_responsavel} fieldId="v1_responsavel" /></div>
                        <InputField label="Email de Contato" value={fd.v1_email} onChange={v => set('v1_email', v)} error={fieldErrors.v1_email} icon={Mail} fieldId="v1_email" />
                        <InputField label="Celular / WhatsApp" value={fd.v1_phone} onChange={v => set('v1_phone', v)} error={fieldErrors.v1_phone} icon={Phone} maskType="phone" fieldId="v1_phone" />
                        <div className="md:col-span-2"><InputField label="Segmento de Atuação" placeholder="Ex: Comércio de Roupas, Consultoria IT..." value={fd.v1_segmento} onChange={v => set('v1_segmento', v)} error={fieldErrors.v1_segmento} fieldId="v1_segmento" /></div>
                        <InputField label="Tempo de Operação (Anos/Meses)" placeholder="Ex: 5 anos" value={fd.v1_tempoOperacao} onChange={v => set('v1_tempoOperacao', v)} error={fieldErrors.v1_tempoOperacao} fieldId="v1_tempoOperacao" />
                        <InputField label="Número de Funcionários" placeholder="Ex: 12 funcionários" value={fd.v1_numFuncionarios} onChange={v => set('v1_numFuncionarios', v)} error={fieldErrors.v1_numFuncionarios} fieldId="v1_numFuncionarios" />
                        <div className="md:col-span-2"><RadioGroup label="Como a empresa controla as finanças atualmente?" value={fd.v1_controleFinanceiro} options={["Planilha", "Sistema / ERP", "Contabilidade", "Não possui controle estruturado"]} onChange={v => set('v1_controleFinanceiro', v)} error={fieldErrors.v1_controleFinanceiro} fieldId="v1_controleFinanceiro" /></div>
                    </div>
                </div>
            );

            if (step === 1) return (
                <div className="space-y-5">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <InputField label="Faturamento Médio (6 meses)" value={fd.v1_fatMedio} onChange={v => set('v1_fatMedio', v)} maskType="currency" error={fieldErrors.v1_fatMedio} fieldId="v1_fatMedio" />
                        <InputField label="Faturamento Total (12 meses)" value={fd.v1_fat12} onChange={v => set('v1_fat12', v)} maskType="currency" error={fieldErrors.v1_fat12} fieldId="v1_fat12" />
                        <div className="md:col-span-2"><InputField label="A receita vem de Produtos, Serviços ou Ambos?" subLabel="Se for ambos, qual a proporção aproximada?" placeholder="Ex: 60% produto / 40% serviço..." value={fd.v1_mixFaturamento} onChange={v => set('v1_mixFaturamento', v)} error={fieldErrors.v1_mixFaturamento} fieldId="v1_mixFaturamento" /></div>
                        <div className="md:col-span-2"><InputField label="Número médio de vendas ou contratos por mês" placeholder="Ex: 120 vendas/mês" value={fd.v1_numVendas} onChange={v => set('v1_numVendas', v)} error={fieldErrors.v1_numVendas} fieldId="v1_numVendas" /></div>
                        <div className="md:col-span-2"><RadioGroup label="Hoje a empresa gera lucro?" value={fd.v1_lucra} options={["Sim", "Não", "Não sei"]} onChange={v => set('v1_lucra', v)} error={fieldErrors.v1_lucra} fieldId="v1_lucra" /></div>
                        <div className="md:col-span-2"><InputField label="Lucro médio mensal aproximado?" optional={true} value={fd.v1_lucroMensal} onChange={v => set('v1_lucroMensal', v)} maskType="currency" /></div>
                        <div className="md:col-span-2"><TextAreaField label="Meios de Recebimento" subLabel="Ex: 50% Pix, 30% Cartão de Crédito, 20% Boleto" value={fd.v1_meios} onChange={v => set('v1_meios', v)} error={fieldErrors.v1_meios} fieldId="v1_meios" /></div>
                        <InputField label="Impostos sobre Vendas" optional={true} subLabel="(Ex: Simples Nacional 6%, ISS 2%)" value={fd.v1_impostos} onChange={v => set('v1_impostos', v)} placeholder="R$ ou %" />
                        <InputField label="Taxa de Inadimplência" subLabel="Média de valores em atraso/não recebidos (R$ ou %)" value={fd.v1_inadimplencia} onChange={v => set('v1_inadimplencia', v)} error={fieldErrors.v1_inadimplencia} fieldId="v1_inadimplencia" />
                    </div>
                </div>
            );

            if (step === 2) return (
                <div className="space-y-5">
                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pb-2 border-b border-slate-100">Custos Diretos</p>
                    <InputField label="Custo com Mercadorias ou Prestação dos Serviços" subLabel="Valor médio mensal. Para produtos: custo de compra. Para serviços: repasses a parceiros ou insumos diretos." value={fd.v1_custosDiretos} onChange={v => set('v1_custosDiretos', v)} maskType="currency" error={fieldErrors.v1_custosDiretos} fieldId="v1_custosDiretos" />
                    <InputField label="Taxas de Recebimento" subLabel="Custos com maquininhas, gateways, taxas de boleto." value={fd.v1_taxaRecebimento} onChange={v => set('v1_taxaRecebimento', v)} maskType="currency" error={fieldErrors.v1_taxaRecebimento} fieldId="v1_taxaRecebimento" />
                    <InputField label="Comissões" optional={true} subLabel="Média paga a vendedores ou parceiros." value={fd.v1_comissoes} onChange={v => set('v1_comissoes', v)} maskType="currency" />
                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pb-2 border-b border-slate-100 pt-4">Despesas Fixas Operacionais</p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <InputField label="Folha de Pagamento" subLabel="Salários, benefícios e encargos" value={fd.v1_folha} onChange={v => set('v1_folha', v)} maskType="currency" error={fieldErrors.v1_folha} fieldId="v1_folha" />
                        <InputField label="Pró-labore dos Sócios" subLabel="Retirada mensal fixa dos donos" value={fd.v1_prolabore} onChange={v => set('v1_prolabore', v)} maskType="currency" error={fieldErrors.v1_prolabore} fieldId="v1_prolabore" />
                        <InputField label="Marketing e Anúncios" value={fd.v1_mkt} onChange={v => set('v1_mkt', v)} maskType="currency" error={fieldErrors.v1_mkt} fieldId="v1_mkt" />
                        <InputField label="Estrutura e Consumo" subLabel="Aluguel, Luz, Internet, Software" value={fd.v1_estrutura} onChange={v => set('v1_estrutura', v)} maskType="currency" error={fieldErrors.v1_estrutura} fieldId="v1_estrutura" />
                        <div className="md:col-span-2"><InputField label="Outras Despesas Fixas" value={fd.v1_outrasFixas} onChange={v => set('v1_outrasFixas', v)} maskType="currency" /></div>
                    </div>
                </div>
            );

            if (step === 3) return (
                <div className="space-y-5">
                    <TextAreaField label="A empresa possui dívidas ou empréstimos atuais?" subLabel="Descreva os credores e prazos. Se não possuir, escreva 'Não'." value={fd.v1_descricaoDividas} onChange={v => set('v1_descricaoDividas', v)} error={fieldErrors.v1_descricaoDividas} fieldId="v1_descricaoDividas" />
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <InputField label="Valor total das dívidas" optional={true} value={fd.v1_valorTotalDividas} onChange={v => set('v1_valorTotalDividas', v)} maskType="currency" />
                        <InputField label="Peso da Dívida (Parcelas Mensais)" optional={true} value={fd.v1_pesoDivida} onChange={v => set('v1_pesoDivida', v)} maskType="currency" />
                        <InputField label="Prazo Médio de Recebimento (dias)" optional={true} placeholder="Ex: 30 dias" value={fd.v1_prazoRec} onChange={v => set('v1_prazoRec', v)} />

        const STEPS_G = [{ label: 'Identificação' }, { label: 'Negócio e Vendas' }, { label: 'Gastos' }, { label: 'Dívidas e Caixa' }, { label: 'Futuro e Docs' }];

                    {/* Documentos movidos para bloco visual separado e destacado */}
                    <div className="pt-4 space-y-5 bg-slate-50/50 p-6 rounded-2xl border border-dashed border-slate-200 mt-6">

                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Documentos e Anexos</p>

        // ─── Estado inicial do formData ───────────────────────────────────────
        const EMPTY_FORM = {

        };

        // ─── Badge de status com visual enriquecido ───────────────────────────
        const StatusBadge = ({ status, internalStatus }) => {
            if (internalStatus === 'completed') {
                return (
                    <div className="flex items-center gap-2 px-4 py-1.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200">
                        <CheckCircle size={12} className="shrink-0" />

                );
            }
            // pending — mostra progresso com etapas visuais
            return (
                <div className="flex flex-col gap-1.5">
                    <div className="flex items-center gap-2 px-4 py-1.5 rounded-full bg-orange-50 text-orange-600 border border-orange-200 w-fit">
                        <Clock size={12} className="shrink-0 animate-pulse" />
                        <span className="text-[9px] font-black uppercase tracking-widest">Em análise</span>
                    </div>
                    <div className="flex items-center gap-1 ml-1">
                        <div className="w-2 h-2 rounded-full bg-emerald-400" title="Recebido"></div>

                        <div className="w-2 h-2 rounded-full bg-orange-400 animate-pulse" title="Analisando"></div>

        };

        const App = () => {
          const [view, setView] = useState('dashboard'); 
          const [isSidebarOpen, setIsSidebarOpen] = useState(true);
          const [formMode, setFormMode] = useState(null); 
          const [formStep, setFormStep] = useState(0); 
          
          const [user, setUser] = useState(null);
          const [authChecking, setAuthChecking] = useState(true);

          const [profileData, setProfileData] = useState({ full_name: '', email: '', phone: '', cnpj: '', razao_social: '' });
          const [isUpdatingProfile, setIsUpdatingProfile] = useState(false);
          const [profileSuccess, setProfileSuccess] = useState("");

          const [diagnostics, setDiagnostics] = useState([]);
          const [formError, setFormError] = useState("");
          const [fieldErrors, setFieldErrors] = useState({});
          const [selectedSubmission, setSelectedSubmission] = useState(null);
          const [isSubmitting, setIsSubmitting] = useState(false);

          // NOVO: controla se tem rascunho salvo para mostrar aviso
          const [hasDraft, setHasDraft] = useState(false);
          // NOVO: controla se há diagnóstico novo concluído não visto
          const [newlyCompleted, setNewlyCompleted] = useState(null);
          // NOVO: flag se perfil preencheu o formulário
          const [profileFilledForm, setProfileFilledForm] = useState(false);

          const [formData, setFormData] = useState({ ...EMPTY_FORM });

          // ── Auto-save de rascunho no localStorage ───────────────────────────
          // Salva sempre que formData ou formMode muda (enquanto no formulário)
          useEffect(() => {
              if (formMode && view === 'form') {
                  try {
                      localStorage.setItem(DRAFT_KEY, JSON.stringify({ formData, formMode, formStep }));
                  } catch(e) {}
              }
          }, [formData, formMode, formStep, view]);

          // ── Aviso ao fechar/recarregar com formulário aberto ────────────────
          useEffect(() => {
              const handleBeforeUnload = (e) => {
                  if (view === 'form' && formMode) {
                      e.preventDefault();
                      e.returnValue = 'Você tem um formulário em andamento. Seu progresso foi salvo e pode ser retomado depois.';
                  }
              };
              window.addEventListener('beforeunload', handleBeforeUnload);
              return () => window.removeEventListener('beforeunload', handleBeforeUnload);
          }, [view, formMode]);

          useEffect(() => {
            const checkSession = async () => {
                const { data: { session } } = await supabase.auth.getSession();
                if (session && session.user && session.user.email) {
                    const currentUser = session.user;
                    setUser(currentUser);
                    fetchDiagnostics(currentUser.id);

                    // Checa se existe rascunho salvo
                    try {
                        const saved = localStorage.getItem(DRAFT_KEY);
                        if (saved) setHasDraft(true);
                    } catch(e) {}
                    
                    if (currentUser.user_metadata) {
                        const meta = currentUser.user_metadata;
                        setProfileData({
                            full_name: meta.full_name || '', email: currentUser.email || '', phone: meta.phone || '', cnpj: meta.cnpj || '', razao_social: meta.razao_social || ''
                        });

                        // Preenche formulário com dados do perfil e marca flag de aviso
                        const hasProfileData = !!(meta.full_name || meta.cnpj || meta.razao_social);
                        setProfileFilledForm(hasProfileData);

                        setFormData(prev => ({
                            ...prev,
                            v1_responsavel: meta.full_name || prev.v1_responsavel, v1_email: currentUser.email || prev.v1_email, v1_phone: meta.phone || prev.v1_phone, v1_cnpj: meta.cnpj || prev.v1_cnpj, v1_razao: meta.razao_social || prev.v1_razao,
                            g_responsavel: meta.full_name || prev.g_responsavel, g_email: currentUser.email || prev.g_email, g_phone: meta.phone || prev.g_phone, g_cnpj: meta.cnpj || prev.g_cnpj, g_razao: meta.razao_social || prev.g_razao,
                        }));
                    }
                    setAuthChecking(false);
                } else {
                    await supabase.auth.signOut();
                    window.location.href = 'login.html';
                }
            };
            checkSession();
          }, []);

          const fetchDiagnostics = async (userId) => {
              const { data, error } = await supabase.from('diagnosticos').select('*').eq('user_id', userId).order('created_at', { ascending: false });
              if (data) {
                  const mapped = data.map(d => ({...d, submittedAt: d.created_at}));
                  setDiagnostics(mapped);
                  // NOVO: verifica se há algum completado que o usuário ainda não viu
                  const seenKey = 'oluap_seen_completed';
                  let seen = [];
                  try { seen = JSON.parse(localStorage.getItem(seenKey) || '[]'); } catch(e) {}
                  const fresh = mapped.find(d => d.internal_status === 'completed' && !seen.includes(d.id));
                  if (fresh) setNewlyCompleted(fresh);
              }
          };

          // Marca diagnóstico como "visto"
          const markAsSeen = (id) => {
              try {
                  const seenKey = 'oluap_seen_completed';
                  let seen = JSON.parse(localStorage.getItem(seenKey) || '[]');
                  if (!seen.includes(id)) { seen.push(id); localStorage.setItem(seenKey, JSON.stringify(seen)); }
              } catch(e) {}
              setNewlyCompleted(null);
          };

          const handleUpdateProfile = async (e) => {
              e.preventDefault();
              setIsUpdatingProfile(true);
              setProfileSuccess("");
              const { data, error } = await supabase.auth.updateUser({ data: { full_name: profileData.full_name, phone: profileData.phone, cnpj: profileData.cnpj, razao_social: profileData.razao_social } });
              setIsUpdatingProfile(false);
              if (!error) {
                  setProfileSuccess("Perfil atualizado! Esses dados serão usados automaticamente no próximo formulário.");
                  setFormData(prev => ({ ...prev, v1_responsavel: profileData.full_name, v1_phone: profileData.phone, v1_cnpj: profileData.cnpj, v1_razao: profileData.razao_social, g_responsavel: profileData.full_name, g_phone: profileData.phone, g_cnpj: profileData.cnpj, g_razao: profileData.razao_social }));
                  setProfileFilledForm(true);
                  setTimeout(() => setProfileSuccess(""), 5000);
              }
          };

          const handleLogout = async () => { await supabase.auth.signOut(); window.location.href = 'login.html'; };

          // NOVO: retomar rascunho
          const handleResumeDraft = () => {
              try {
                  const saved = JSON.parse(localStorage.getItem(DRAFT_KEY));
                  if (saved) {
                      setFormData(saved.formData);
                      setFormMode(saved.formMode);
                      setFormStep(saved.formStep || 0);
                      setView('form');
                      setHasDraft(false);
                  }
              } catch(e) {}
          };

          // NOVO: descartar rascunho
          const handleDiscardDraft = () => {
              try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}
              setHasDraft(false);
          };

          const getStepRequiredFields = (isV1, step) => {
            if (isV1) {
                const stepFields = [
                    ["v1_razao", "v1_cnpj", "v1_responsavel", "v1_email", "v1_phone", "v1_segmento", "v1_tempoOperacao", "v1_numFuncionarios", "v1_controleFinanceiro"],
                    ["v1_fatMedio", "v1_fat12", "v1_mixFaturamento", "v1_numVendas", "v1_lucra", "v1_meios", "v1_inadimplencia"],
                    ["v1_custosDiretos", "v1_taxaRecebimento", "v1_folha", "v1_prolabore", "v1_mkt", "v1_estrutura"],
                    ["v1_descricaoDividas", "v1_saldo", "v1_reserva", "v1_detalhesCredito"],
                    ["v1_desafio", "v1_objetivo"],
                ];
                return stepFields[step] || [];
            } else {
                const stepFields = [
                    ["g_razao", "g_cnpj", "g_responsavel", "g_email", "g_phone"],
                    ["g_oqueVende", "g_tempoExistencia", "g_pessoas", "g_faturamento", "g_mixFaturamento", "g_meioVenda", "g_frequencia", "g_sobrePreco", "g_produtoLucrativo"],
                    ["g_aluguel", "g_gastoFunc", "g_prolabore", "g_custosDiretos", "g_taxaMaquininha", "g_outrosFixos", "g_raloDinheiro"],
                    ["g_descricaoDividas", "g_contasEmDia", "g_misturaContas", "g_folegoCaixa"],
                    ["g_desafio", "g_futuro"],
                ];
                return stepFields[step] || [];
            }
          };

          const validateStep = () => {
            const isV1 = formMode === 'standard';
            const required = getStepRequiredFields(isV1, formStep);
            const errs = {};
            let hasErr = false;
            let errorMessage = "Preencha todos os campos obrigatórios antes de continuar.";
            let missingCount = 0;

            required.forEach(f => {
                if (!formData[f] || formData[f].toString().trim() === "") { errs[f] = true; hasErr = true; missingCount++; }
            });

            if (formStep === 0) {
                const email = isV1 ? formData.v1_email : formData.g_email;
                const cnpj = isV1 ? formData.v1_cnpj : formData.g_cnpj;
                if (email && !isValidEmail(email)) { errs[isV1 ? 'v1_email' : 'g_email'] = true; hasErr = true; errorMessage = "O e-mail informado é inválido."; }
                if (cnpj && !isValidCNPJ(cnpj)) { errs[isV1 ? 'v1_cnpj' : 'g_cnpj'] = true; hasErr = true; errorMessage = "O CNPJ deve conter 14 dígitos válidos."; }
            }

            if (hasErr) {
                setFieldErrors(errs);
                // Mensagem específica com contagem
                if (missingCount > 0) errorMessage = `${missingCount} campo${missingCount > 1 ? 's obrigatórios não preenchidos' : ' obrigatório não preenchido'}. Verifique os campos em vermelho abaixo.`;
                setFormError(errorMessage);

                // NOVO: scroll automático até o primeiro campo com erro
                setTimeout(() => {
                    const firstErr = Object.keys(errs)[0];
                    const el = document.getElementById(`field-${firstErr}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);

                return false;
            }
            setFieldErrors({});
            setFormError("");
            return true;
          };

          const handleNextStep = () => {
            if (!validateStep()) return;
            const totalSteps = formMode === 'standard' ? STEPS_V1.length : STEPS_G.length;
            if (formStep < totalSteps - 1) { setFormStep(s => s + 1); window.scrollTo({ top: 0, behavior: 'smooth' }); }
          };

          const handlePrevStep = () => {
            if (formStep > 0) { setFormStep(s => s - 1); setFormError(""); setFieldErrors({}); window.scrollTo({ top: 0, behavior: 'smooth' }); }
          };

          const validateAndSubmit = async () => {
            if (!validateStep()) return;
            setIsSubmitting(true);
            setFormError("");
            try {
                let currentUser = user;
                if (!currentUser) throw new Error("Sessão expirada. Por favor, faça login novamente.");
                setFormError("Salvando formulário no banco de dados...");
                const isV1 = formMode === 'standard';
                const payload = {
                    user_id: currentUser.id,
                    client_name: isV1 ? formData.v1_responsavel : formData.g_responsavel,
                    razao_social: isV1 ? formData.v1_razao : formData.g_razao,
                    cnpj: maskCNPJ(isV1 ? formData.v1_cnpj : formData.g_cnpj),
                    email: isV1 ? formData.v1_email : formData.g_email,
                    telefone: isV1 ? formData.v1_phone : formData.g_phone,
                    status: "⏳ Em análise",
                    internal_status: "pending",
                    form_type: isV1 ? 'Estruturado' : 'Guiado',
                    data: formData
                };
                const { error } = await supabase.from('diagnosticos').insert([payload]);
                if (error) throw new Error("Erro no Supabase: " + error.message);

                // Limpa rascunho salvo
                try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}

                setFormData({ ...EMPTY_FORM });
                await fetchDiagnostics(currentUser.id);
                setFormMode(null);
                setFormStep(0);
                setHasDraft(false);

                // NOVO: vai para tela de confirmação ao invés do dashboard direto
                setView('success');
            } catch (err) {
                console.error("Erro no envio:", err);
                if (err.message !== "Validação falhou.") setFormError("ERRO AO SALVAR: " + err.message);
            } finally {
                setIsSubmitting(false);
            }
          };

          const handleViewResult = (submission) => {
              markAsSeen(submission.id);
              setFormData(submission.data);
              setFormMode(submission.form_type === 'Estruturado' ? 'standard' : 'guided');
              setSelectedSubmission(submission);
              setView('result');
              window.scrollTo({ top: 0, behavior: 'smooth' });
          };
          const handleViewSubmissionData = (submission) => { setFormData(submission.data); setFormMode(submission.form_type === 'Estruturado' ? 'standard' : 'guided'); setSelectedSubmission(submission); setView('view_data'); window.scrollTo({ top: 0, behavior: 'smooth' }); };
          const handleDownloadAdminPDF = () => { if (selectedSubmission && selectedSubmission.admin_result_pdf) window.open(selectedSubmission.admin_result_pdf, '_blank'); else alert("O arquivo PDF do seu diagnóstico ainda não está disponível para download. Por favor, tente novamente mais tarde ou contate nosso suporte."); };
          const handleContactExpert = () => { window.open("https://wa.me/5511999999999?text=Olá, gostaria de falar com um especialista sobre meu diagnóstico OLUAP.", "_blank"); };

          if (authChecking) return <div className="min-h-screen bg-[#05121b] flex items-center justify-center"><Loader2 className="animate-spin text-[#ff7b00]" size={32}/></div>;

          const parsedCharts = selectedSubmission?.chart_data_input ? parseChartData(selectedSubmission.chart_data_input) : null;
          const hasCharts = parsedCharts && (parsedCharts.estruturaResultado.length > 0 || parsedCharts.despesasOperacionais.length > 0 || parsedCharts.estruturaFinanceira.length > 0 || parsedCharts.indicadores.length > 0);

          const isV1 = formMode === 'standard';
          const currentSteps = isV1 ? STEPS_V1 : STEPS_G;
          const isLastStep = formStep === currentSteps.length - 1;

          return (
            <div className="min-h-screen bg-[#ffffff] flex text-[#05121b] overflow-x-hidden relative">
              {/* SIDEBAR — sem alteração */}
              <aside className={`bg-white h-screen border-r border-slate-100 py-6 flex flex-col fixed left-0 top-0 z-40 print:hidden transition-all duration-300 ease-in-out ${isSidebarOpen ? 'w-56 px-5' : 'w-16 px-2'}`}>
                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="absolute -right-3 top-8 bg-white border border-slate-200 p-1.5 rounded-full shadow-sm text-slate-400 hover:text-[#ff7b00] z-50 flex items-center justify-center transition-colors hover:scale-110"><ChevronLeft size={14} /></button>
                <div className={`flex items-center ${isSidebarOpen ? 'justify-start px-2' : 'justify-center'} mb-8 mt-2`}>
                  {isSidebarOpen ? <img src="logo2.png" alt="OLUAP" className="h-8 object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}/> : <img src="icone.png" alt="Ícone OLUAP" className="w-7 h-7 object-contain shrink-0" />}
                  <div className="hidden"><div className="w-6 h-6 shrink-0 bg-[#ff7b00] rounded flex items-center justify-center shadow-sm"><ShieldCheck className="text-white" size={14} /></div><span className="text-lg font-black text-[#05121b] tracking-tighter italic whitespace-nowrap ml-2">OLUAP</span></div>
                </div>
                <nav className="flex-1 space-y-2 mt-4">
                  <button onClick={() => setView('dashboard')} className={`w-full flex items-center ${isSidebarOpen ? 'justify-start gap-3 px-4' : 'justify-center px-0'} py-3 rounded-xl font-bold text-[10px] uppercase tracking-wider transition-all ${view === 'dashboard' || view === 'result' || view === 'view_data' || view === 'success' ? 'bg-[#05121b] text-white shadow-md' : 'text-slate-400 hover:bg-slate-50 hover:text-[#05121b]'}`}>
                    <LayoutDashboard size={isSidebarOpen ? 14 : 16}/>
                    {isSidebarOpen && <span>Dashboard</span>}
                    {/* Bolinha de notificação se há resultado novo */}
                    {isSidebarOpen && newlyCompleted && <span className="ml-auto w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>}
                  </button>
                  <button onClick={() => {setFormMode(null); setFormStep(0); setView('form');}} className={`w-full flex items-center ${isSidebarOpen ? 'justify-start gap-3 px-4' : 'justify-center px-0'} py-3 rounded-xl font-bold text-[10px] uppercase tracking-wider transition-all ${view === 'form' ? 'bg-[#05121b] text-white shadow-md' : 'text-slate-400 hover:bg-slate-50 hover:text-[#05121b]'}`}><Plus size={isSidebarOpen ? 14 : 16}/> {isSidebarOpen && <span>Nova Análise</span>}</button>
                  <button onClick={() => setView('profile')} className={`w-full flex items-center ${isSidebarOpen ? 'justify-start gap-3 px-4' : 'justify-center px-0'} py-3 rounded-xl font-bold text-[10px] uppercase tracking-wider transition-all ${view === 'profile' ? 'bg-[#05121b] text-white shadow-md' : 'text-slate-400 hover:bg-slate-50 hover:text-[#05121b]'}`}><User size={isSidebarOpen ? 14 : 16}/> {isSidebarOpen && <span>Meu Perfil</span>}</button>

              </aside>

              <main className={`flex-1 transition-all duration-300 ${isSidebarOpen ? 'ml-56' : 'ml-16'} p-6 md:p-8 lg:p-10 overflow-y-auto bg-slate-50/40 min-h-screen min-w-0 w-full`}>

                {/* ── DASHBOARD ────────────────────────────────────────────── */}

                    <header className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">

                      <button onClick={() => {setFormMode(null); setFormStep(0); setView('form');}} className="bg-[#ff7b00] text-white px-6 py-3.5 rounded-xl font-black text-[10px] uppercase tracking-[0.15em] shadow-md shadow-orange-500/20 hover:scale-[1.02] transition-transform self-start sm:self-auto">Solicitar Nova Análise</button>
                    </header>

                    {/* NOVO: Banner de resultado novo disponível */}

                                    <h4 className="font-black text-emerald-800 text-sm">Seu diagnóstico foi concluído! 🎉</h4>
                                    <p className="text-[10px] text-emerald-600 font-medium mt-0.5">A análise de <strong>{newlyCompleted.client_name}</strong> já está disponível para visualização.</p>
                                </div>
                            </div>
                            <button onClick={() => handleViewResult(newlyCompleted)} className="shrink-0 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest transition-colors flex items-center gap-2">
                                Ver Resultado <ChevronRight size={12} />
                            </button>
                        </div>
                    )}

                    {/* NOVO: Banner de rascunho salvo */}
                    {hasDraft && (
                        <div className="slide-down mb-6 bg-amber-50 border border-amber-200 rounded-2xl p-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-amber-400 rounded-xl flex items-center justify-center shrink-0"><Save size={16} className="text-white" /></div>
                                <div>
                                    <h4 className="font-black text-amber-800 text-sm">Você tem um formulário salvo</h4>
                                    <p className="text-[10px] text-amber-600 font-medium mt-0.5">Seu progresso foi salvo automaticamente. Deseja continuar de onde parou?</p>
                                </div>
                            </div>
                            <div className="flex gap-2 shrink-0">
                                <button onClick={handleDiscardDraft} className="text-[10px] font-bold text-amber-600 hover:text-amber-800 px-3 py-2 rounded-lg hover:bg-amber-100 transition-colors">Descartar</button>
                                <button onClick={handleResumeDraft} className="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest transition-colors flex items-center gap-2">
                                    Continuar <ChevronRight size={12} />
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="grid gap-4">
                      {diagnostics.length > 0 ? (
                        diagnostics.map(d => (
                          <div key={d.id} className={`bg-white p-5 md:p-6 rounded-2xl flex flex-col md:flex-row md:justify-between md:items-center gap-4 border shadow-sm hover:shadow transition-shadow ${d.internal_status === 'completed' && newlyCompleted?.id === d.id ? 'border-emerald-200 ring-1 ring-emerald-200' : 'border-slate-100'}`}>
                            <div className="flex items-center gap-4 md:gap-5">
                              <div className="w-10 h-10 shrink-0 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400"><FileText size={18} /></div>
                              <div>
                                <h3 className="font-black text-[#05121b] uppercase text-xs tracking-tight mb-0.5">{d.client_name}</h3>
                                <div className="flex items-center flex-wrap gap-2 mt-1">
                                  <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">{d.form_type}</span>
                                  <span className="w-1 h-1 bg-slate-200 rounded-full"></span>
                                  <span className="text-[9px] font-bold text-slate-400">{new Date(d.submittedAt).toLocaleDateString()}</span>
                                </div>
                              </div>
                            </div>
                            <div className="flex flex-wrap items-center gap-3">
                                {/* NOVO: badge de status visual enriquecido */}
                                <StatusBadge status={d.status} internalStatus={d.internal_status} />
                                <button onClick={() => handleViewSubmissionData(d)} className="bg-white border border-slate-200 text-slate-500 px-4 py-1.5 rounded-full font-bold text-[9px] uppercase tracking-widest hover:border-[#137789] hover:text-[#137789] transition-colors flex items-center gap-2">Ver Detalhes</button>
                                {d.internal_status === 'completed' && (
                                    <button onClick={() => handleViewResult(d)} className="bg-[#137789] text-white px-5 py-1.5 rounded-full font-bold text-[9px] uppercase tracking-widest hover:bg-[#05121b] transition-colors flex items-center gap-1.5 shadow-sm">Ver Resultado <ChevronRight size={12} /></button>
                                )}
                            </div>
                          </div>
                        ))
                      ) : (
                        <div className="py-16 text-center bg-white rounded-3xl border border-slate-100 shadow-sm w-full">
                          <div className="w-12 h-12 bg-slate-50 rounded-2xl mx-auto mb-4 flex items-center justify-center text-slate-300"><Info size={24}/></div>
                          <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Nenhum diagnóstico solicitado ainda.</p>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* ── NOVO: TELA DE CONFIRMAÇÃO PÓS-ENVIO ─────────────────── */}
                {view === 'success' && (
                    <div className="max-w-2xl mx-auto w-full flex flex-col items-center justify-center min-h-[70vh] text-center px-4">
                        <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mb-6 mx-auto">
                            <CheckCircle size={40} className="text-emerald-500" />
                        </div>
                        <h1 className="text-2xl md:text-3xl font-black text-[#05121b] italic mb-3">Diagnóstico Recebido!</h1>
                        <p className="text-slate-500 text-sm font-medium mb-2 max-w-md leading-relaxed">Recebemos todas as informações da sua empresa com sucesso. Nossa equipe já está analisando os dados.</p>
                        <p className="text-[#137789] font-black text-[10px] uppercase tracking-widest mb-8">⏱ Prazo de retorno: até 2 dias úteis</p>

                        {/* O que acontece agora */}
                        <div className="w-full bg-white border border-slate-100 rounded-3xl p-6 shadow-sm mb-8 text-left">
                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-5">O que acontece agora?</h3>
                            <div className="space-y-4">
                                {[
                                    { n: '1', title: 'Nossa equipe analisa seus dados', desc: 'Um especialista OLUAP revisa todas as informações financeiras que você enviou.', color: 'bg-blue-50 text-blue-600' },
                                    { n: '2', title: 'Diagnóstico preparado', desc: 'Elaboramos um relatório completo com os pontos fortes, riscos e recomendações para sua empresa.', color: 'bg-amber-50 text-amber-600' },
                                    { n: '3', title: 'Você recebe o resultado aqui', desc: 'Você verá o botão "Ver Resultado" disponível no dashboard. Também pode verificar por aqui periodicamente.', color: 'bg-emerald-50 text-emerald-600' },
                                ].map(step => (
                                    <div key={step.n} className="flex items-start gap-4">
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-black shrink-0 ${step.color}`}>{step.n}</div>
                                        <div>
                                            <p className="font-black text-[#05121b] text-xs mb-0.5">{step.title}</p>
                                            <p className="text-[10px] text-slate-400 leading-relaxed">{step.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="flex flex-col sm:flex-row gap-3 w-full max-w-sm">
                            <button onClick={() => handleContactExpert()} className="flex-1 flex items-center justify-center gap-2 bg-[#25D366] hover:bg-[#1da851] text-white py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-sm transition-colors">
                                <MessageCircle size={14}/> Falar no WhatsApp
                            </button>
                            <button onClick={() => setView('dashboard')} className="flex-1 flex items-center justify-center gap-2 bg-[#05121b] hover:bg-slate-800 text-white py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-sm transition-colors">
                                <LayoutDashboard size={14}/> Ir ao Dashboard
                            </button>
                        </div>
                    </div>
                )}

                {/* ── PERFIL ───────────────────────────────────────────────── */}
                {view === 'profile' && (
                  <div className="max-w-4xl mx-auto w-full">
                     <header className="mb-10">
                         <h1 className="text-2xl font-black text-[#05121b] italic mb-1">Meu Perfil</h1>
                         <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Gerencie suas informações pessoais e da empresa</p>
                     </header>
                     {/* NOVO: explicação de que o perfil preenche o formulário */}
                     <div className="mb-6 bg-blue-50 border border-blue-100 rounded-2xl p-4 flex items-start gap-3">
                         <Lightbulb size={16} className="text-blue-500 shrink-0 mt-0.5" />
                         <p className="text-[11px] text-blue-700 font-medium leading-relaxed">
                             <strong>Dica:</strong> Mantendo seu perfil atualizado com CNPJ e Razão Social, esses campos serão preenchidos automaticamente sempre que você iniciar um novo formulário de diagnóstico — economizando seu tempo.
                         </p>
                     </div>
                     <div className="bg-white p-8 md:p-10 rounded-3xl border border-slate-100 shadow-sm">
                        <form onSubmit={handleUpdateProfile} className="space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <InputField label="Nome Completo" value={profileData.full_name} onChange={v => setProfileData({...profileData, full_name: v})} icon={User} />
                                <InputField label="E-mail (Acesso)" value={profileData.email} readOnly={true} icon={Mail} subLabel="Seu e-mail de login não pode ser alterado por aqui." />

                                <span className="text-xs font-bold text-emerald-600">{profileSuccess}</span>
                                <button type="submit" disabled={isUpdatingProfile} className="w-full md:w-auto bg-[#137789] text-white px-10 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-md hover:bg-[#05121b] hover:scale-[1.02] transition-all flex items-center justify-center gap-2">
                                    {isUpdatingProfile ? <Loader2 size={16} className="animate-spin" /> : "Salvar Alterações"}

                            </div>

                {/* ── VER DADOS ENVIADOS ────────────────────────────────────── */}
                {view === 'view_data' && selectedSubmission && (
