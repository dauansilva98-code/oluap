                            <div className="flex items-start justify-between"><div><h2 className="text-2xl font-black text-[#05121b] tracking-tighter italic uppercase mb-2 break-all">{selectedSubmission.client_name}</h2><p className="text-[#137789] font-bold uppercase text-[10px] tracking-[0.2em]">{selectedSubmission.form_type} • Enviado em {new Date(selectedSubmission.submittedAt).toLocaleDateString()}</p></div></div>
                         </header>
                         {isV1 ? <FormStepV1 step={0} formData={formData} setFormData={setFormData} fieldErrors={{}} readOnly={true}/> : <FormStepG step={0} formData={formData} setFormData={setFormData} fieldErrors={{}} readOnly={true}/>}
                         {isV1 ? <FormStepV1 step={1} formData={formData} setFormData={setFormData} fieldErrors={{}} readOnly={true}/> : <FormStepG step={1} formData={formData} setFormData={setFormData} fieldErrors={{}} readOnly={true}/>}
                         {isV1 ? <FormStepV1 step={2} formData={formData} setFormData={setFormData} fieldErrors={{}} readOnly={true}/> : <FormStepG step={2} formData={formData} setFormData={setFormData} fieldErrors={{}} readOnly={true}/>}
                         {isV1 ? <FormStepV1 step={3} formData={formData} setFormData={setFormData} fieldErrors={{}} readOnly={true}/> : <FormStepG step={3} formData={formData} setFormData={setFormData} fieldErrors={{}} readOnly={true}/>}
                         {isV1 ? <FormStepV1 step={4} formData={formData} setFormData={setFormData} fieldErrors={{}} readOnly={true}/> : <FormStepG step={4} formData={formData} setFormData={setFormData} fieldErrors={{}} readOnly={true}/>}
                      </div>
                   </div>
                )}

                {/* ── FORMULÁRIO ────────────────────────────────────────────── */}
                {view === 'form' && (
                  <div className="max-w-5xl mx-auto w-full">
                    {!formMode ? (
                      <div className="text-center space-y-10 py-10">
                        <header>
                          <h2 className="text-2xl font-black text-[#05121b] tracking-tighter italic mb-3">Qual o seu perfil de dados?</h2>
                          <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em]">Selecione a opção que melhor descreve sua empresa agora</p>
                        </header>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <button onClick={() => { setFormMode('standard'); setFormStep(0); setFormError(""); setFieldErrors({}); }} className="bg-white p-8 rounded-3xl border border-slate-100 hover:border-[#ff7b00]/30 transition-all text-left shadow-lg shadow-slate-200/20 group w-full">
                            <div className="w-12 h-12 bg-[#05121b] text-white rounded-xl flex items-center justify-center mb-6 group-hover:bg-[#ff7b00] transition-colors"><Landmark size={20} /></div>
                            <h3 className="text-lg font-black text-[#05121b] mb-2 uppercase tracking-tight">Tenho os números</h3>
                            <p className="text-slate-400 font-medium text-xs leading-relaxed">Para empresas que já têm as informações financeiras e controle organizado.</p>
                          </button>
                          <button onClick={() => { setFormMode('guided'); setFormStep(0); setFormError(""); setFieldErrors({}); }} className="bg-white p-8 rounded-3xl border border-slate-100 hover:border-[#137789]/30 transition-all text-left shadow-lg shadow-slate-200/20 group w-full">
                            <div className="w-12 h-12 bg-[#137789] text-white rounded-xl flex items-center justify-center mb-6"><Sparkles size={20} /></div>
                            <h3 className="text-lg font-black text-[#05121b] mb-2 uppercase tracking-tight">Não tenho meus números</h3>
                            <p className="text-slate-400 font-medium text-xs leading-relaxed">Para empresas que não sabem seus números e precisam de uma ajuda simplificada.</p>
                          </button>
                        </div>
                      </div>
                    ) : (
                      <div className="bg-white p-6 md:p-10 rounded-3xl border border-slate-100 shadow-xl mb-12 w-full">
                        <button onClick={() => { setFormMode(null); setFormStep(0); setFormError(""); setFieldErrors({}); }} className="text-slate-300 font-bold flex items-center gap-2 mb-8 text-[9px] uppercase tracking-widest hover:text-[#ff7b00] transition-all">← Voltar e trocar perfil</button>
                        <header className="mb-6">
                          <h2 className="text-2xl font-black text-[#05121b] tracking-tight italic uppercase mb-2">{formMode === 'standard' ? '📊 Diagnóstico Estruturado' : '📋 Diagnóstico Guiado'}</h2>
                          <p className="text-[#137789] font-bold uppercase text-[9px] tracking-[0.2em]">{formMode === 'standard' ? 'Preencha com dados reais para um diagnóstico preciso' : 'Responda com valores aproximados para clareza inicial'}</p>
                        </header>

                        {/* NOVO: banner de prazo estimado de resposta */}
                        <div className="mb-6 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 flex items-center gap-3">
                            <Clock size={14} className="text-slate-400 shrink-0" />
                            <p className="text-[10px] text-slate-500 font-medium">Após o envio, seu diagnóstico estará pronto em <strong className="text-[#05121b]">até 2 dias úteis</strong>. Seu progresso é salvo automaticamente — pode continuar depois se precisar.</p>
                        </div>

                        {/* NOVO: banner de dados pré-preenchidos do perfil (só no passo 0) */}
                        {formStep === 0 && profileFilledForm && (
                            <div className="mb-6 bg-blue-50 border border-blue-100 rounded-xl px-4 py-3 flex items-center gap-3">
                                <User size={14} className="text-blue-400 shrink-0" />
                                <p className="text-[10px] text-blue-600 font-medium">Os campos de identificação foram preenchidos automaticamente com os dados do seu perfil. Verifique e ajuste se necessário.</p>
                            </div>
                        )}

                        <StepBar steps={currentSteps} currentStep={formStep} isV1={isV1} />

                        {/* NOVO: erro com contagem e scroll automático */}
                        {formError && (
                            <div className={`mb-6 p-4 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 border ${formError === 'Salvando formulário no banco de dados...' ? 'bg-blue-50 text-blue-600 border-blue-100' : 'bg-red-50 text-red-600 border-red-100'}`}>
                                <AlertTriangle size={14} className="shrink-0"/> <span>{formError}</span>
                            </div>
                        )}

                        <div className="min-h-[300px]">
                            {isV1 ? <FormStepV1 step={formStep} formData={formData} setFormData={setFormData} fieldErrors={fieldErrors} /> : <FormStepG step={formStep} formData={formData} setFormData={setFormData} fieldErrors={fieldErrors} />}
                        </div>
                        <div className="flex justify-between items-center pt-8 mt-8 border-t border-slate-100">
                            <button onClick={handlePrevStep} disabled={formStep === 0} className="flex items-center gap-2 text-slate-400 font-black text-[10px] uppercase tracking-widest disabled:opacity-30 hover:text-[#05121b] transition-colors"><ArrowLeft size={16} /> Anterior</button>
                            {isLastStep ? (
                                <button disabled={isSubmitting} onClick={validateAndSubmit} style={{ background: isV1 ? '#137789' : '#ff7b00' }} className="text-white px-10 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-md hover:scale-[1.02] transition-all flex items-center gap-2 disabled:opacity-50">
                                    {isSubmitting ? <><Loader2 size={16} className="animate-spin"/> Enviando...</> : <>Solicitar Diagnóstico <ChevronRight size={16} /></>}
                                </button>
                            ) : (
                                <button onClick={handleNextStep} style={{ background: isV1 ? '#137789' : '#ff7b00' }} className="text-white px-10 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-md hover:scale-[1.02] transition-all flex items-center gap-2">
                                    Próximo <ChevronRight size={16} />
                                </button>
                            )}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* ── RESULTADO ─────────────────────────────────────────────── */}
                {view === 'result' && selectedSubmission && (
                   <div className="max-w-5xl mx-auto w-full">
                       <button onClick={() => setView('dashboard')} className="flex items-center gap-2 text-slate-400 font-bold text-[10px] uppercase tracking-widest hover:text-[#05121b] transition-colors mb-6"><ArrowLeft size={14} /> Voltar para Dashboard</button>
                       <div className="bg-white rounded-3xl border border-slate-100 shadow-xl overflow-hidden mb-10 w-full">
                           <div className={`p-6 border-b flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 ${selectedSubmission.health_status === 'healthy' ? 'bg-emerald-50 border-emerald-100' : selectedSubmission.health_status === 'warning' ? 'bg-amber-50 border-amber-100' : 'bg-red-50 border-red-100'}`}>
                               <div className="flex items-center gap-4">
                                   <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${selectedSubmission.health_status === 'healthy' ? 'bg-emerald-500 text-white' : selectedSubmission.health_status === 'warning' ? 'bg-amber-500 text-white' : 'bg-red-500 text-white'}`}><CheckCircle size={24} /></div>
                                   <div>
                                       <h2 className={`text-xl font-black uppercase tracking-tight italic ${selectedSubmission.health_status === 'healthy' ? 'text-emerald-800' : selectedSubmission.health_status === 'warning' ? 'text-amber-800' : 'text-red-800'}`}>Diagnóstico Concluído</h2>
                                       <p className={`text-[10px] font-bold uppercase tracking-widest mt-0.5 ${selectedSubmission.health_status === 'healthy' ? 'text-emerald-600' : selectedSubmission.health_status === 'warning' ? 'text-amber-600' : 'text-red-600'}`}>Status: {selectedSubmission.health_status === 'healthy' ? 'Saudável' : selectedSubmission.health_status === 'warning' ? 'Precisa Ajustar' : 'Atenção'}</p>
                                   </div>
                               </div>
                           </div>
                           <div className="p-6 md:p-10 pt-4">
                               <h3 className="text-lg font-black text-[#05121b] uppercase tracking-tight mb-6 flex items-center gap-2"><FileText size={18} className="text-[#ff7b00]"/> Análise do Especialista</h3>
                               <div className="prose prose-sm max-w-none text-slate-600 leading-relaxed whitespace-pre-wrap bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-10">{selectedSubmission.analysis || "A análise detalhada ainda está sendo processada."}</div>

                               {hasCharts && (
                                   <div className="mt-12 mb-10">
                                       <h3 className="text-lg font-black text-[#05121b] uppercase tracking-tight mb-8 flex items-center gap-2"><BarChart2 size={18} className="text-[#137789]"/> Visão Gráfica</h3>
                                       <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                            {parsedCharts.estruturaResultado.length > 0 && (
                                                <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
                                                    <h4 className="text-xs font-black uppercase text-[#05121b] mb-6 text-center">Estrutura de Resultado</h4>
                                                    <div className="h-64 w-full">
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <BarChart data={parsedCharts.estruturaResultado} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                                                                <XAxis dataKey="name" tick={{fontSize: 10, fill: '#94a3b8'}} axisLine={false} tickLine={false} />
                                                                <YAxis tickFormatter={(v) => `R$${v/1000}k`} tick={{fontSize: 10, fill: '#94a3b8'}} axisLine={false} tickLine={false}/>
                                                                <RechartsTooltip formatter={(value) => formatBRL(value)} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '12px', fontWeight: 'bold'}}/>
                                                                <Bar dataKey="value" fill="#137789" radius={[4, 4, 0, 0]}>{parsedCharts.estruturaResultado.map((entry, index) => (<Cell key={`cell-${index}`} fill={CHART_COLORS[index % CHART_COLORS.length]} />))}</Bar>
                                                            </BarChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                            )}
                                            {parsedCharts.despesasOperacionais.length > 0 && (
                                                <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm flex flex-col items-center">
                                                    <h4 className="text-xs font-black uppercase text-[#05121b] mb-2 text-center w-full">Composição das Despesas</h4>
                                                    <div className="h-64 w-full">
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <PieChart>
                                                                <Pie data={parsedCharts.despesasOperacionais} cx="50%" cy="50%" innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value">{parsedCharts.despesasOperacionais.map((entry, index) => (<Cell key={`cell-${index}`} fill={CHART_COLORS[index % CHART_COLORS.length]} />))}</Pie>
                                                                <RechartsTooltip formatter={(value) => formatBRL(value)} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '12px', fontWeight: 'bold'}}/>
                                                                <Legend wrapperStyle={{fontSize: '10px'}}/>
                                                            </PieChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                            )}
                                            {parsedCharts.estruturaFinanceira.length > 0 && (
                                                <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
                                                    <h4 className="text-xs font-black uppercase text-[#05121b] mb-6 text-center">Estrutura Financeira</h4>
                                                    <div className="h-64 w-full">
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <BarChart data={parsedCharts.estruturaFinanceira} layout="vertical" margin={{ top: 0, right: 10, left: 30, bottom: 0 }}>
                                                                <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#f1f5f9"/>
                                                                <XAxis type="number" tickFormatter={(v) => `R$${v/1000}k`} tick={{fontSize: 10, fill: '#94a3b8'}} axisLine={false} tickLine={false} />
                                                                <YAxis dataKey="name" type="category" tick={{fontSize: 10, fill: '#05121b', fontWeight: 'bold'}} axisLine={false} tickLine={false}/>
                                                                <RechartsTooltip formatter={(value) => formatBRL(value)} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '12px', fontWeight: 'bold'}}/>
                                                                <Bar dataKey="value" fill="#ff7b00" radius={[0, 4, 4, 0]} barSize={24} />
                                                            </BarChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                            )}
                                            {parsedCharts.indicadores.length > 0 && (
                                                <div className="bg-[#05121b] border border-slate-800 rounded-2xl p-6 shadow-sm">
                                                    <h4 className="text-xs font-black uppercase text-white mb-6 text-center">Indicadores (%)</h4>
                                                    <div className="h-64 w-full">
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <BarChart data={parsedCharts.indicadores} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#1f2937"/>
                                                                <XAxis dataKey="name" tick={{fontSize: 9, fill: '#94a3b8'}} axisLine={false} tickLine={false} />
                                                                <YAxis tickFormatter={(v) => `${v}%`} tick={{fontSize: 10, fill: '#94a3b8'}} axisLine={false} tickLine={false}/>
                                                                <RechartsTooltip formatter={(value) => formatPercent(value)} contentStyle={{borderRadius: '12px', border: 'none', backgroundColor: 'white', color: 'black'}}/>
                                                                <Bar dataKey="value" fill="#34d399" radius={[4, 4, 0, 0]}>{parsedCharts.indicadores.map((entry, index) => (<Cell key={`cell-${index}`} fill={entry.value < 0 ? '#f87171' : CHART_COLORS[index % CHART_COLORS.length]} />))}</Bar>
                                                            </BarChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                            )}
                                       </div>
                                   </div>
                               )}

                               <div className="mt-10 pt-8 border-t border-slate-50">
                                   <h4 className="text-[10px] font-black uppercase text-[#05121b] mb-4">Dados Enviados</h4>
                                   <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                       <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                           <div><span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Empresa</span><span className="text-xs font-bold text-[#05121b]">{selectedSubmission.client_name}</span></div>
                                           <div><span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1">CNPJ</span><span className="text-xs font-bold text-[#05121b]">{selectedSubmission.cnpj}</span></div>
                                       </div>
                                   </div>
                               </div>

                               {/* NOVO: bloco de próximo passo claro antes dos botões */}
                               <div className="mt-10 bg-[#05121b] rounded-2xl p-6 text-white">
                                   <div className="flex items-center gap-2 mb-3">
                                       <Lightbulb size={16} className="text-[#ff7b00] shrink-0" />
                                       <h4 className="font-black text-sm uppercase tracking-wide">Qual é o próximo passo?</h4>
                                   </div>
                                   <p className="text-slate-300 text-[11px] leading-relaxed mb-4">
                                       Com o diagnóstico em mãos, o caminho natural é conversar com nosso especialista para entender as recomendações em detalhe e montar um plano de ação personalizado para sua empresa.
                                   </p>
                                   <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-[10px]">
                                       {[
                                           { n: '1', label: 'Leia a análise completa', desc: 'Entenda os pontos levantados pelo especialista.' },
                                           { n: '2', label: 'Fale conosco', desc: 'Tire dúvidas e receba orientação personalizada.' },
                                           { n: '3', label: 'Monte seu plano de ação', desc: 'Defina prioridades e comece a implementar mudanças.' },
                                       ].map(s => (
                                           <div key={s.n} className="bg-white/10 rounded-xl p-3">
                                               <span className="text-[#ff7b00] font-black text-xs">{s.n}.</span>
                                               <p className="font-black text-white mt-1 mb-0.5">{s.label}</p>
                                               <p className="text-slate-400 text-[9px] leading-relaxed">{s.desc}</p>
                                           </div>
                                       ))}
                                   </div>
                               </div>

                               <div className="mt-6 flex flex-col md:flex-row gap-4 print:hidden">
                                   <button onClick={handleContactExpert} className="flex-1 bg-green-500 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-green-600 transition-colors flex items-center justify-center gap-2 shadow-md"><MessageCircle size={16}/> Falar com Especialista</button>
                                   <button onClick={handleDownloadAdminPDF} className="flex-1 bg-[#05121b] text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-slate-800 transition-colors flex items-center justify-center gap-2 shadow-md"><Printer size={16}/> Baixar em PDF</button>
                               </div>
                           </div>
                       </div>
                   </div>
                )}
              </main>
            </div>
          );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
