<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLUAP - Meu Ecossistema</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #05121b;
        }
        /* Suavizando a barra de rolagem */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background-color: #137789; border-radius: 10px; }
    </style>
</head>
<body class="text-white relative overflow-x-hidden min-h-screen flex flex-col">
    
    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-emerald-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <div id="root" class="relative z-10 flex-1 flex flex-col"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        // AJUSTE: O ícone 'User' agora está importado corretamente
        import { 
          Activity, Database, Briefcase, CreditCard, Lock, ArrowRight, LogOut, Loader2, ShieldCheck, Sparkles, CheckCircle, User
        } from 'lucide-react';

        // --- CONEXÃO SUPABASE OLUAP ---
        const SUPABASE_URL = 'https://haxonnnbycypirigxsvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheG9ubm5ieWN5cGlyaWd4c3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTYwMzEsImV4cCI6MjA4OTYzMjAzMX0.keYNqjbu7DxBYV9f4_HW1MTaP1_TJZ_bNDTRIvSeSYw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [userName, setUserName] = useState('');
            
            // Estado de Acesso aos Produtos
            const [access, setAccess] = useState({
                diagnostico: false,
                erp: false,
                consultoria: false,
                credito: false
            });

            // Controle do Modal de Upsell
            const [upsellModal, setUpsellModal] = useState(null);

            useEffect(() => {
                checkAuthAndAccess();
            }, []);

            const checkAuthAndAccess = async () => {
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }

                setUser(session.user);
                
                // Extrai o primeiro nome do usuário
                const fullName = session.user.user_metadata?.full_name || 'Cliente';
                setUserName(fullName.split(' ')[0]);

                try {
                    // Busca o perfil do usuário para ver quais produtos ele comprou
                    const { data: profile, error: profileError } = await supabase
                        .from('profiles')
                        .select('has_diagnostico, has_erp, has_consultoria, has_credito')
                        .eq('id', session.user.id)
                        .single();

                    if (profile) {
                        setAccess({
                            diagnostico: profile.has_diagnostico === true,
                            erp: profile.has_erp === true,
                            consultoria: profile.has_consultoria === true,
                            credito: profile.has_credito === true
                        });
                    } else {
                        // Fallback para teste: Libera o diagnóstico por padrão
                        setAccess(prev => ({ ...prev, diagnostico: true }));
                    }
                } catch (err) {
                    console.error("Erro ao buscar acesso no banco:", err);
                    setAccess(prev => ({ ...prev, diagnostico: true })); // Previne a tela de travar caso a coluna ainda não exista
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = async () => {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            };

            const handleProductClick = (produtoInfo) => {
                if (access[produtoInfo.id]) {
                    // Produto Ativo -> Redireciona para a URL do produto
                    window.location.href = produtoInfo.url;
                } else {
                    // Produto Bloqueado -> Abre o modal de Upsell
                    setUpsellModal(produtoInfo);
                }
            };

            // Informações dos 4 Produtos da Empresa
            const productsInfo = [
                {
                    id: 'diagnostico',
                    title: 'Diagnóstico Financeiro',
                    desc: 'Raio-X completo da saúde financeira da sua empresa com IA.',
                    icon: Activity,
                    color: 'text-[#ff7b00]',
                    bgLight: 'bg-[#ff7b00]/10',
                    bgBtn: 'bg-[#ff7b00] hover:bg-[#e66e00]',
                    url: 'painel.html', // A URL da plataforma do diagnóstico
                    price: 'R$ 97,00',
                    benefits: ['Análise de Dívidas', 'Visão de Lucratividade', 'Plano de Ação']
                },
                {
                    id: 'erp',
                    title: 'ERP Financeiro',
                    desc: 'Sistema completo para gestão de caixa, notas e orçamentos.',
                    icon: Database,
                    color: 'text-[#137789]',
                    bgLight: 'bg-[#137789]/10',
                    bgBtn: 'bg-[#137789] hover:bg-[#0f5c6b]',
                    url: 'erp.html', // A URL do ERP (quando for criado)
                    price: 'R$ 147,00/mês',
                    benefits: ['Fluxo de Caixa', 'Contas a Pagar/Receber', 'Relatórios Automáticos']
                },
                {
                    id: 'consultoria',
                    title: 'Consultoria Empresarial',
                    desc: 'Acompanhamento direto com nossos especialistas para escalar seu negócio.',
                    icon: Briefcase,
                    color: 'text-blue-500',
                    bgLight: 'bg-blue-500/10',
                    bgBtn: 'bg-blue-600 hover:bg-blue-700',
                    url: 'consultoria.html', // URL da área de consultoria
                    price: 'Sob Consulta',
                    benefits: ['Reuniões Mensais', 'Planejamento Estratégico', 'Mentoria Exclusiva']
                },
                {
                    id: 'credito',
                    title: 'Crédito Inteligente',
                    desc: 'Acesso a linhas de crédito com as melhores taxas do mercado.',
                    icon: CreditCard,
                    color: 'text-emerald-500',
                    bgLight: 'bg-emerald-500/10',
                    bgBtn: 'bg-emerald-600 hover:bg-emerald-700',
                    url: 'credito.html', // URL da área de crédito
                    price: 'Taxas a partir de 1.2% a.m',
                    benefits: ['Capital de Giro', 'Sem burocracia excessiva', 'Análise Rápida']
                }
            ];

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <Loader2 className="animate-spin text-[#ff7b00]" size={40} />
                    </div>
                );
            }

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header Pessoal */}
                    <header className="px-6 py-8 md:px-12 md:py-10 max-w-7xl mx-auto w-full flex flex-col md:flex-row items-center justify-between gap-6 border-b border-white/5">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center border border-white/20">
                                <User className="text-white" size={24} />
                            </div>
                            <div>
                                <p className="text-slate-400 text-xs md:text-sm font-bold uppercase tracking-widest mb-0.5">Bem-vindo(a) de volta,</p>
                                <h1 className="text-2xl md:text-3xl font-black text-white italic tracking-tighter">{userName}</h1>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <img src="logo2.png" alt="OLUAP" className="h-8 object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}/>
                            <div className="hidden items-center">
                                <ShieldCheck className="text-[#ff7b00]" size={24} />
                                <span className="font-black italic text-xl tracking-tighter ml-2">OLUAP</span>
                            </div>
                            <button onClick={handleLogout} className="text-slate-400 hover:text-rose-500 transition-colors" title="Sair da Conta">
                                <LogOut size={20} />
                            </button>
                        </div>
                    </header>

                    {/* Área Central: Cards dos Produtos */}
                    <main className="flex-1 max-w-7xl mx-auto w-full px-6 py-12 flex flex-col justify-center">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-black text-white tracking-tight mb-3">Seu Ecossistema <span className="text-[#137789] italic">OLUAP</span></h2>
                            <p className="text-slate-400 font-medium text-sm md:text-base max-w-xl mx-auto">Selecione a plataforma que deseja acessar. Soluções inativas podem ser ativadas a qualquer momento para impulsionar seu negócio.</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {productsInfo.map((prod) => {
                                const isActive = access[prod.id];
                                const IconComp = prod.icon;

                                return (
                                    <div 
                                        key={prod.id} 
                                        onClick={() => handleProductClick(prod)}
                                        className={`relative rounded-3xl p-6 flex flex-col cursor-pointer transition-all duration-300 border h-full min-h-[280px]
                                            ${isActive 
                                                ? 'bg-white/10 hover:bg-white/15 border-white/20 shadow-lg hover:-translate-y-1' 
                                                : 'bg-[#05121b] hover:bg-white/5 border-slate-800/80 opacity-80 hover:opacity-100'
                                            }`}
                                    >
                                        {/* Status Tag */}
                                        <div className="absolute top-6 right-6">
                                            {isActive ? (
                                                <div className="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest flex items-center gap-1">
                                                    <CheckCircle size={10} /> Ativo
                                                </div>
                                            ) : (
                                                <div className="bg-slate-800 text-slate-400 border border-slate-700 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest flex items-center gap-1 shadow-sm">
                                                    <Lock size={10} /> Bloqueado
                                                </div>
                                            )}
                                        </div>

                                        {/* Ícone e Título */}
                                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center mb-5 ${isActive ? prod.bgLight : 'bg-slate-800'}`}>
                                            <IconComp size={24} className={isActive ? prod.color : 'text-slate-500'} />
                                        </div>
                                        
                                        <h3 className={`text-lg font-black tracking-tight mb-2 ${isActive ? 'text-white' : 'text-slate-300'}`}>
                                            {prod.title}
                                        </h3>
                                        <p className="text-xs text-slate-400 font-medium leading-relaxed flex-1 mb-8">
                                            {prod.desc}
                                        </p>

                                        {/* Botão Inferior */}
                                        <div className={`w-full py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 transition-colors
                                            ${isActive ? `${prod.bgBtn} text-white shadow-md` : 'bg-slate-800 text-slate-300 group-hover:bg-slate-700'}
                                        `}>
                                            {isActive ? 'Acessar Plataforma' : 'Conhecer Solução'} {isActive ? <ArrowRight size={14} /> : <Lock size={12} />}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* MODAL DE UPSELL */}
                    {upsellModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-[#05121b]/80 backdrop-blur-md px-4">
                            <div className="bg-white rounded-3xl max-w-lg w-full shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
                                {/* Header do Modal Colorido */}
                                <div className={`${upsellModal.bgBtn} p-8 text-center relative overflow-hidden`}>
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                                    <upsellModal.icon size={48} className="text-white mx-auto mb-4 relative z-10 opacity-90" />
                                    <h3 className="text-2xl font-black text-white tracking-tight relative z-10">{upsellModal.title}</h3>
                                </div>
                                
                                {/* Corpo do Modal */}
                                <div className="p-8 text-[#05121b]">
                                    <p className="text-slate-600 font-medium text-center mb-6">{upsellModal.desc}</p>
                                    
                                    <div className="space-y-3 mb-8">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center mb-2">O que está incluso:</p>
                                        {upsellModal.benefits.map((ben, i) => (
                                            <div key={i} className="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                <CheckCircle size={16} className={upsellModal.color} />
                                                <span className="text-sm font-bold text-slate-700">{ben}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 flex justify-between items-center mb-6">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Investimento a partir de</span>
                                        <span className={`text-lg font-black ${upsellModal.color}`}>{upsellModal.price}</span>
                                    </div>

                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <button onClick={() => setUpsellModal(null)} className="flex-1 py-4 rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-100 transition-colors">
                                            Agora não
                                        </button>
                                        <button onClick={() => {
                                            alert(`Redirecionando para o checkout de ${upsellModal.title}...`);
                                        }} className={`flex-1 py-4 rounded-xl text-xs font-black text-white uppercase tracking-widest transition-transform hover:scale-[1.02] shadow-md ${upsellModal.bgBtn}`}>
                                            Assinar Agora
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
