<body class="bg-[#05121b]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, LogOut, ShieldCheck, AlertTriangle, Plus, 
          FileText, Sparkles, Clock, Building2, Landmark, Wallet, Target, ChevronRight, 
          Upload, Info, ArrowLeft, CheckCircle, Printer, MessageCircle, Mail, Phone, 
          FileSearch, User, ChevronLeft, Menu, Loader2, BarChart2
        } from 'lucide-react';
        
        import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } from 'recharts';

        // --- CONEXÃO COM SEU NOVO SUPABASE ---
        const SUPABASE_URL = 'https://haxonnnbycypirigxsvj.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheG9ubm5ieWN5cGlyaWd4c3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTYwMzEsImV4cCI6MjA4OTYzMjAzMX0.keYNqjbu7DxBYV9f4_HW1MTaP1_TJZ_bNDTRIvSeSYw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const CHART_COLORS = ['#137789', '#ff7b00', '#05121b', '#fbbf24', '#34d399', '#f87171', '#a78bfa', '#60a5fa'];
        const formatBRL = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
        const formatPercent = (val) => `${val}%`;

        const parseChartData = (text) => {
            if (!text) return null;
            const lines = text.split('\n').map(l => l.trim());
            const data = { estruturaResultado: [], despesasOperacionais: [], estruturaFinanceira: [], indicadores: [] };
            let currentSection = "";

            lines.forEach(line => {
                if (line.includes("Estrutura de Resultado")) currentSection = "estruturaResultado";
                else if (line.includes("Despesas Operacionais")) currentSection = "despesasOperacionais";
                else if (line.includes("Estrutura Financeira")) currentSection = "estruturaFinanceira";
                else if (line.includes("Indicadores")) currentSection = "indicadores";
                else if (line.includes(":") && currentSection) {
                    const [key, valStr] = line.split(":");
                    if (key && valStr) {
                        let rawNum = valStr.replace(/R\$/g, '').replace(/%/g, '').trim();
                        let cleanNum = rawNum.replace(/\./g, '').replace(',', '.');
                        const value = parseFloat(cleanNum);
                        if (!isNaN(value)) {
                            data[currentSection].push({ name: key.trim(), value: value });
                        }
                    }
                }
            });
            return data;
        };

        const formatCurrency = (value) => {
          if (!value) return "";
          const numericValue = value.replace(/\D/g, "");
          if (numericValue === "") return "";
          const options = { minimumFractionDigits: 2 };
          const result = new Intl.NumberFormat('pt-BR', options).format(parseFloat(numericValue) / 100);
          return `R$ ${result}`;
        };

        const maskCNPJ = (value) => {
          if (!value) return "";
          return value.replace(/\D/g, '').replace(/^(\d{2})(\d)/, '$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3').replace(/\.(\d{3})(\d)/, '.$1/$2').replace(/(\d{4})(\d)/, '$1-$2').replace(/(-\d{2})\d+?$/, '$1');
        };

        const maskPhone = (value) => {
          if (!value) return "";
          return value.replace(/\D/g, '').replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d)(\d{4})$/, '$1-$2').substring(0, 15);
        };

        const isValidEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        const isValidCNPJ = (cnpj) => cnpj.replace(/\D/g, '').length === 14;

        // --- COMPONENTES DE FORMULÁRIO ---
        const InputField = ({ label, value, onChange, placeholder, maskType = "text", error, optional = false, subLabel, readOnly = false, type = "text", icon: Icon }) => {
          const handleChange = (e) => {
            let rawValue = e.target.value;
            if (maskType === 'currency') onChange(formatCurrency(rawValue));
            else if (maskType === 'cnpj') onChange(maskCNPJ(rawValue));
            else if (maskType === 'phone') onChange(maskPhone(rawValue));
            else onChange(rawValue);
          };

          return (
            <div className="space-y-1.5 w-full text-left relative min-w-0">
              <div className="flex justify-between items-baseline px-1">
                <label className={`text-[10px] font-bold uppercase tracking-wider ${error ? 'text-red-500' : 'text-[#05121b]/50'}`}>
                  {label} {optional && <span className="lowercase font-normal italic opacity-60">(opcional)</span>}
                </label>
              </div>
              {subLabel && <p className="text-[10px] text-slate-400 px-1 mb-1 leading-relaxed">{subLabel}</p>}
              <div className="relative">
                {Icon && <Icon size={16} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-300" />}
                <input 
                    type={type} value={value || ""} onChange={handleChange} readOnly={readOnly}
                    placeholder={placeholder || (maskType === 'currency' ? "R$ 0,00" : maskType === 'cnpj' ? "00.000.000/0000-00" : maskType === 'phone' ? "(00) 00000-0000" : "")}
                    maxLength={maskType === 'cnpj' ? 18 : maskType === 'phone' ? 15 : undefined}
                    className={`w-full bg-white border ${Icon ? 'pl-10' : 'px-4'} pr-4 py-2.5 rounded-xl font-medium text-[#05121b] transition-all outline-none text-xs min-w-0 ${error ? 'border-red-500 ring-1 ring-red-500/20' : readOnly ? 'border-slate-100 bg-slate-50 text-slate-500 cursor-not-allowed' : 'border-slate-200 focus:ring-1 focus:ring-[#ff7b00] focus:border-[#ff7b00]'}`} 
                />
              </div>
            </div>
          );
        };

        const RadioGroup = ({ label, value, options, onChange, error, subLabel, readOnly = false }) => (
          <div className="space-y-2 text-left">
            <label className={`text-[10px] font-bold uppercase tracking-wider px-1 ${error ? 'text-red-500' : 'text-[#05121b]/50'}`}>{label}</label>
            {subLabel && <p className="text-[10px] text-slate-400 px-1 leading-relaxed">{subLabel}</p>}
            <div className="flex flex-wrap gap-2">
              {options.map(opt => (
                <button key={opt} onClick={() => !readOnly && onChange(opt)} disabled={readOnly} className={`px-4 py-2 rounded-xl font-bold text-[10px] border transition-all ${value === opt ? 'bg-[#ff7b00] text-white border-[#ff7b00] shadow-md shadow-[#ff7b00]/20' : readOnly ? 'bg-slate-50 text-slate-400 border-slate-100' : 'bg-white text-[#05121b]/60 border-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}>
                  {opt}
                </button>
              ))}
            </div>
          </div>
        );

        const TextAreaField = ({ label, value, onChange, placeholder, error, subLabel, readOnly = false, optional = false }) => (
          <div className="space-y-1.5 w-full text-left">
            <div className="flex justify-between items-baseline px-1">
                <label className={`text-[10px] font-bold uppercase tracking-wider ${error ? 'text-red-500' : 'text-[#05121b]/50'}`}>
                    {label} {optional && <span className="lowercase font-normal italic opacity-60">(opcional)</span>}
                </label>
            </div>
            {subLabel && <p className="text-[10px] text-slate-400 px-1 leading-relaxed">{subLabel}</p>}
            <textarea value={value || ""} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} readOnly={readOnly} className={`w-full bg-white border px-4 py-3 rounded-xl font-medium text-[#05121b] transition-all outline-none resize-none text-xs h-24 ${error ? 'border-red-500 ring-1 ring-red-500/20' : readOnly ? 'border-slate-100 bg-slate-50 text-slate-500 cursor-not-allowed' : 'border-slate-200 focus:ring-1 focus:ring-[#ff7b00] focus:border-[#ff7b00]'}`}></textarea>
          </div>
        );

        // --- COMPONENTE DE UPLOAD DE ARQUIVO VISUAL ---
        const FileUploadField = ({ onFilesSelected, readOnly }) => {
            const [selectedFiles, setSelectedFiles] = useState([]);
            
            const handleFileChange = (e) => {
                const newFiles = Array.from(e.target.files).map(f => f.name);
                setSelectedFiles([...selectedFiles, ...newFiles]);
                if(onFilesSelected) onFilesSelected([...selectedFiles, ...newFiles].join(', '));
            };

            if (readOnly) return null; // Oculta na visão de resultado (o admin vai ver os nomes salvos na string)

            return (
                <div className="space-y-2 w-full">
                    <label className="text-[10px] font-bold uppercase tracking-wider text-[#05121b]/50 px-1">Anexar Arquivos do Computador (Opcional)</label>
                    <label className="border-2 border-dashed border-slate-200 rounded-2xl p-6 flex flex-col items-center justify-center hover:bg-slate-50 transition-colors cursor-pointer group relative overflow-hidden">
                        <input type="file" multiple onChange={handleFileChange} disabled={readOnly} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                        <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                            <Upload size={18} className="text-slate-400 group-hover:text-[#137789]" />
                        </div>
                        <p className="text-xs font-bold text-[#05121b] mb-1 uppercase tracking-wide">Clique para selecionar arquivos</p>
                        <p className="text-[10px] text-slate-400">PDF, Excel, Word, Imagens</p>
                    </label>
                    {selectedFiles.length > 0 && (
                        <div className="mt-3 space-y-2">
                            {selectedFiles.map((file, idx) => (
                                <div key={idx} className="flex items-center gap-3 bg-emerald-50 border border-emerald-100 p-3 rounded-xl text-emerald-700">
                                    <CheckCircle size={14} className="shrink-0" />
                                    <span className="text-[10px] font-bold truncate">{file}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const SectionHeading = ({ icon: Icon, title, color = "text-[#137789]" }) => (
          <div className="flex items-center gap-2 pt-8 pb-3 border-b border-slate-100 mb-6 mt-8 first:mt-0 break-inside-avoid">
            <Icon size={18} className={color} />
            <h3 className="text-xs font-black uppercase tracking-[0.15em] text-[#05121b]">{title}</h3>
          </div>
        );

        const App = () => {
          const [view, setView] = useState('landing'); 
          const [isSidebarOpen, setIsSidebarOpen] = useState(true);
          const [formMode, setFormMode] = useState(null); 
          
          const [user, setUser] = useState(null);
          const [authChecking, setAuthChecking] = useState(true);

          // Estado para o Perfil do Usuário
          const [profileData, setProfileData] = useState({
            full_name: '', email: '', phone: '', cnpj: '', razao_social: ''
          });
          const [isUpdatingProfile, setIsUpdatingProfile] = useState(false);
          const [profileSuccess, setProfileSuccess] = useState("");

          const [diagnostics, setDiagnostics] = useState([]);
          
          const [formError, setFormError] = useState("");
          const [fieldErrors, setFieldErrors] = useState({});
          const [selectedSubmission, setSelectedSubmission] = useState(null);
          
          const [isSubmitting, setIsSubmitting] = useState(false);

          const [formData, setFormData] = useState({
            v1_razao: "", v1_cnpj: "", v1_responsavel: "", v1_email: "", v1_phone: "", v1_segmento: "",
            v1_tempoOperacao: "", v1_numFuncionarios: "", v1_controleFinanceiro: "",
            v1_fatMedio: "", v1_fat12: "", v1_mixFaturamento: "", v1_numVendas: "", v1_meios: "", v1_impostos: "", v1_inadimplencia: "",
            v1_lucra: "", v1_lucroMensal: "", v1_custosDiretos: "", v1_taxaRecebimento: "", v1_comissoes: "",
            v1_folha: "", v1_prolabore: "", v1_mkt: "", v1_estrutura: "", v1_outrasFixas: "",
            v1_descricaoDividas: "", v1_pesoDivida: "", v1_valorTotalDividas: "", v1_prazoRec: "", v1_prazoPag: "",
            v1_saldo: "", v1_reserva: "", v1_estoque: "", v1_detalhesCredito: "", v1_desafio: "", v1_objetivo: "",
            v1_linksAnexos: "", v1_nomesArquivos: "", // Novos campos de anexos
            
            g_razao: "", g_cnpj: "", g_responsavel: "", g_email: "", g_phone: "", g_oqueVende: "", g_tempoExistencia: "", g_pessoas: "",
            g_faturamento: "", g_mixFaturamento: "", g_meioVenda: "", g_frequencia: "", g_sobrePreco: "", g_produtoLucrativo: "",
            g_aluguel: "", g_gastoFunc: "", g_prolabore: "", g_custosDiretos: "", g_taxaMaquininha: "", g_outrosFixos: "", g_raloDinheiro: "",
            g_descricaoDividas: "", g_valorTotalDivida: "", g_contasEmDia: "", g_misturaContas: "",
            g_folegoCaixa: "", g_estoque: "", g_querEmprestimo: "", g_finalidadeEmprestimo: "", g_prazoPagamento: "",
            g_desafio: "", g_futuro: "",
            g_linksAnexos: "", g_nomesArquivos: "" // Novos campos de anexos
          });

          useEffect(() => {
            const checkSession = async () => {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session) {
                    const currentUser = session.user;
                    setUser(currentUser);
                    fetchDiagnostics(currentUser.id);
                    
                    if (currentUser.user_metadata) {
                        const meta = currentUser.user_metadata;
                        
                        setProfileData({
                            full_name: meta.full_name || '',
                            email: currentUser.email || '',
                            phone: meta.phone || '',
                            cnpj: meta.cnpj || '',
                            razao_social: meta.razao_social || ''
                        });

                        setFormData(prev => ({
                            ...prev,
                            v1_responsavel: meta.full_name || prev.v1_responsavel,
                            v1_email: currentUser.email || prev.v1_email,
                            v1_phone: meta.phone || prev.v1_phone,
                            v1_cnpj: meta.cnpj || prev.v1_cnpj,
                            v1_razao: meta.razao_social || prev.v1_razao,
                            
                            g_responsavel: meta.full_name || prev.g_responsavel,
                            g_email: currentUser.email || prev.g_email,
                            g_phone: meta.phone || prev.g_phone,
                            g_cnpj: meta.cnpj || prev.g_cnpj,
                            g_razao: meta.razao_social || prev.g_razao,
                        }));
                    }
                } else {
                    const { data, error } = await supabase.auth.signInAnonymously();
                    if (data?.user) {
                        setUser(data.user);
                        fetchDiagnostics(data.user.id);
                    }
                }
                setAuthChecking(false);
            };
            checkSession();
          }, []);

          const fetchDiagnostics = async (userId) => {
              const { data, error } = await supabase
                  .from('diagnosticos')
                  .select('*')
                  .eq('user_id', userId)
                  .order('created_at', { ascending: false });
                  
              if (data) {
                  const formatted = data.map(d => ({...d, submittedAt: d.created_at}));
                  setDiagnostics(formatted);
              }
          };

          const handleUpdateProfile = async (e) => {
              e.preventDefault();
              setIsUpdatingProfile(true);
              setProfileSuccess("");

              const { data, error } = await supabase.auth.updateUser({
                  data: { 
                      full_name: profileData.full_name,
                      phone: profileData.phone,
                      cnpj: profileData.cnpj,
                      razao_social: profileData.razao_social
                  }
              });

              setIsUpdatingProfile(false);
              
              if (!error) {
                  setProfileSuccess("Perfil atualizado com sucesso!");
                  setFormData(prev => ({
                      ...prev,
                      v1_responsavel: profileData.full_name, v1_phone: profileData.phone, v1_cnpj: profileData.cnpj, v1_razao: profileData.razao_social,
                      g_responsavel: profileData.full_name, g_phone: profileData.phone, g_cnpj: profileData.cnpj, g_razao: profileData.razao_social,
                  }));
                  setTimeout(() => setProfileSuccess(""), 3000);
              }
          };

          const handleClientPortalAccess = () => { setView('dashboard'); };
          const handleLogout = async () => { 
              await supabase.auth.signOut();
              window.location.href = 'login.html'; 
          };

          const validateAndSubmit = async () => {
            setIsSubmitting(true);
            setFormError(""); 

            try {
                let currentUser = user;

                if (!currentUser) {
                    const { data, error } = await supabase.auth.signInAnonymously();
                    if (error) throw new Error("Erro de Segurança (Supabase): " + error.message);
                    if (data?.user) {
                        currentUser = data.user;
                        setUser(currentUser);
                    } else {
                        throw new Error("O Supabase bloqueou a criação do usuário anônimo.");
                    }
                }

                const isV1 = formMode === 'standard';
                const req = isV1 
                  ? ["v1_razao", "v1_cnpj", "v1_responsavel", "v1_email", "v1_phone", "v1_segmento", "v1_tempoOperacao", "v1_numFuncionarios", "v1_controleFinanceiro", "v1_fatMedio", "v1_fat12", "v1_mixFaturamento", "v1_numVendas", "v1_lucra", "v1_custosDiretos", "v1_taxaRecebimento", "v1_folha", "v1_prolabore", "v1_mkt", "v1_estrutura", "v1_saldo", "v1_reserva", "v1_descricaoDividas", "v1_desafio", "v1_objetivo"]
                  : ["g_razao", "g_cnpj", "g_responsavel", "g_email", "g_phone", "g_oqueVende", "g_tempoExistencia", "g_pessoas", "g_faturamento", "g_mixFaturamento", "g_meioVenda", "g_frequencia", "g_sobrePreco", "g_produtoLucrativo", "g_aluguel", "g_gastoFunc", "g_prolabore", "g_custosDiretos", "g_taxaMaquininha", "g_outrosFixos", "g_raloDinheiro", "g_descricaoDividas", "g_contasEmDia", "g_misturaContas", "g_folegoCaixa", "g_desafio", "g_futuro"];

                const errs = {};
                let hasErr = false;
                let errorMessage = "Existem campos obrigatórios não preenchidos.";

                req.forEach(f => {
                  if (!formData[f] || formData[f].toString().trim() === "") { errs[f] = true; hasErr = true; }
                });

                const email = isV1 ? formData.v1_email : formData.g_email;
                const cnpj = isV1 ? formData.v1_cnpj : formData.g_cnpj;

                if (email && !isValidEmail(email)) {
                    errs[isV1 ? 'v1_email' : 'g_email'] = true;
                    hasErr = true;
                    errorMessage = "O e-mail informado é inválido. Inclua @ e um domínio válido.";
                }

                if (cnpj && !isValidCNPJ(cnpj)) {
                    errs[isV1 ? 'v1_cnpj' : 'g_cnpj'] = true;
                    hasErr = true;
                    errorMessage = "O CNPJ deve conter 14 dígitos válidos.";
                }

                if (hasErr) {
                  setFieldErrors(errs);
                  setFormError(errorMessage);
                  window.scrollTo({ top: 0, behavior: 'smooth' });
                  throw new Error("Validação falhou.");
                }

                setFormError("Salvando formulário no banco de dados...");
                setFieldErrors({});

                const payload = {
                    user_id: currentUser.id,
                    client_name: isV1 ? formData.v1_responsavel : formData.g_responsavel,
                    razao_social: isV1 ? formData.v1_razao : formData.g_razao,
                    cnpj: maskCNPJ(isV1 ? formData.v1_cnpj : formData.g_cnpj),
                    email: isV1 ? formData.v1_email : formData.g_email,
                    telefone: isV1 ? formData.v1_phone : formData.g_phone,
                    status: "⏳ Em análise",
                    internal_status: "pending",
                    form_type: isV1 ? 'Estruturado' : 'Guiado',
                    data: formData
                };

                const { error } = await supabase.from('diagnosticos').insert([payload]);
                
                if (error) {
                    throw new Error("Erro no Supabase: " + error.message); 
                }

                const reset = Object.keys(formData).reduce((a, k) => ({...a, [k]: ""}), {});
                setFormData(reset); 
                
                await fetchDiagnostics(currentUser.id);
                setFormMode(null);
                setView('dashboard');
                
            } catch (err) {
                console.error("Erro no envio:", err);
                if (err.message !== "Validação falhou.") {
                    setFormError("ERRO AO SALVAR: " + err.message);
                }
            } finally {
                setIsSubmitting(false); 
            }
          };

          const handleViewResult = (submission) => {
            setFormData(submission.data);
            setFormMode(submission.form_type === 'Estruturado' ? 'standard' : 'guided');
            setSelectedSubmission(submission);
            setView('result');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleViewSubmissionData = (submission) => {
              setFormData(submission.data);
              setFormMode(submission.form_type === 'Estruturado' ? 'standard' : 'guided');
              setSelectedSubmission(submission);
              setView('view_data');
              window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          // --- NOVA LÓGICA DO BOTÃO PDF PARA O CLIENTE ---
          const handleDownloadAdminPDF = () => {
              // Verifica se o admin anexou o PDF final na submissão
              if (selectedSubmission && selectedSubmission.admin_result_pdf) {
                  // Se houver, abre o link do arquivo em uma nova aba
                  window.open(selectedSubmission.admin_result_pdf, '_blank');
              } else {
                  // Se não houver, mostra um alerta para o usuário
                  alert("O arquivo PDF do seu diagnóstico ainda não está disponível para download. Por favor, tente novamente mais tarde ou contate nosso suporte.");
              }
          };

          const handleContactExpert = () => { window.open("https://wa.me/5511999999999?text=Olá, gostaria de falar com um especialista sobre meu diagnóstico OLUAP.", "_blank"); };

          const getStatusLabel = (status) => {
              switch(status) {
                  case 'healthy': return 'Saudável';
                  case 'warning': return 'Ajustar';
                  case 'critical': return 'Atenção';
                  default: return 'Em Análise';

                                                <div className="bg-[#05121b] border border-slate-800 rounded-2xl p-6 shadow-sm">
                                                    <h4 className="text-xs font-black uppercase text-white mb-6 text-center">Indicadores (%)</h4>
                                                    <div className="h-64 w-full">
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <BarChart data={parsedCharts.indicadores} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#1f2937"/>
                                                                <XAxis dataKey="name" tick={{fontSize: 9, fill: '#94a3b8'}} axisLine={false} tickLine={false} />
                                                                <YAxis tickFormatter={(v) => `${v}%`} tick={{fontSize: 10, fill: '#94a3b8'}} axisLine={false} tickLine={false}/>
                                                                <RechartsTooltip formatter={(value) => formatPercent(value)} contentStyle={{borderRadius: '12px', border: 'none', backgroundColor: 'white', color: 'black'}}/>
                                                                <Bar dataKey="value" fill="#34d399" radius={[4, 4, 0, 0]}>
                                                                    {parsedCharts.indicadores.map((entry, index) => (
                                                                        <Cell key={`cell-${index}`} fill={entry.value < 0 ? '#f87171' : CHART_COLORS[index % CHART_COLORS.length]} />
                                                                    ))}
                                                                </Bar>
                                                            </BarChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                            )}
                                       </div>
                                   </div>
                               )}
                               
                               <div className="mt-10 pt-8 border-t border-slate-50">
                                   <h4 className="text-[10px] font-black uppercase text-[#05121b] mb-4">Dados Enviados</h4>
                                   <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                       <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                           <div>
                                               <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Empresa</span>
                                               <span className="text-xs font-bold text-[#05121b]">{selectedSubmission.client_name}</span>
                                           </div>
                                           <div>
                                               <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1">CNPJ</span>
                                               <span className="text-xs font-bold text-[#05121b]">{selectedSubmission.cnpj}</span>
                                           </div>
                                       </div>
                                   </div>
                               </div>

                               <div className="mt-10 flex flex-col md:flex-row gap-4 print:hidden">
                                   <button onClick={handleContactExpert} className="flex-1 bg-green-500 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-green-600 transition-colors flex items-center justify-center gap-2 shadow-md">
                                       <MessageCircle size={16}/> Falar com Especialista
                                   </button>
                                   <button onClick={handleDownloadAdminPDF} className="flex-1 bg-[#05121b] text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-slate-800 transition-colors flex items-center justify-center gap-2 shadow-md">
                                       <Printer size={16}/> Baixar em PDF
                                   </button>
                               </div>
                           </div>
                       </div>
                   </div>
                )}
              </main>
            </div>
          );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
