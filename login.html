<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLUAP - Acesso</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Checkbox laranja personalizado */
        input[type="checkbox"]:checked {
            background-color: #f15a00;
            border-color: #f15a00;
        }
        /* Ajuste do botão com gradiente exato do print */
        .btn-gradient {
            background: linear-gradient(90deg, #155d64 0%, #f15a00 100%);
        }
    </style>
</head>
<body class="bg-[#f5f6f8] m-0 p-0 overflow-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Loader2, AlertTriangle } from 'lucide-react';

        // --- CONEXÃO SUPABASE (JÁ PREENCHIDA COM SEUS DADOS OFICIAIS) ---
        const SUPABASE_URL = 'https://haxonnbycypirigxsvjq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheG9ubm5ieWN5cGlyaWd4c3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTYwMzEsImV4cCI6MjA4OTYzMjAzMX0.keYNqjbu7DxBYV9f4_HW1MTaP1_TJZ_bNDTRIvSeSYw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Login = () => {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError("");

                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    setError("E-mail ou senha incorretos.");
                    setLoading(false);
                } else {
                    window.location.href = 'admin.html'; 
                }
            };

            return (
                <div className="h-screen w-full flex bg-[#f5f6f8]">
                    
                    {/* LADO ESQUERDO: Degradê Laranja -> Azul Petróleo */}
                    <div className="hidden md:flex w-[45%] h-full bg-gradient-to-b from-[#f35d00] to-[#164e58] rounded-r-[80px] p-12 lg:p-16 flex-col shadow-2xl relative">
                        
                        {/* Logo Superior Esquerda */}
                        <div className="mb-10">
                            <img src="logo.png" alt="Oluap" className="h-10 object-contain" onError={(e) => {
                                e.target.style.display = 'none';
                                e.target.nextSibling.style.display = 'block';
                            }}/>
                            <div className="hidden text-white font-black text-3xl tracking-tighter flex items-center gap-1">
                                olua<span className="text-[#137789] rotate-45 ml-[-4px]">P</span>
                            </div>
                        </div>

                        {/* Texto Centralizado Verticalmente */}
                        <div className="flex-1 flex items-center">
                            <h1 className="text-4xl lg:text-5xl xl:text-6xl font-bold leading-[1.1] tracking-tight">
                                <span className="text-white block mb-1">A plataforma</span>
                                <span className="text-white">que </span>
                                <span className="text-[#1a1a1a] font-black">simplifica</span>
                                <br />
                                <span className="text-[#1a1a1a] font-black">o complicado!</span>
                            </h1>
                        </div>
                        
                    </div>

                    {/* LADO DIREITO: Formulário */}
                    <div className="w-full md:w-[55%] h-full flex items-center justify-center p-8">
                        <div className="w-full max-w-sm">
                            
                            <h2 className="text-3xl font-normal text-[#1a1a1a] mb-10 text-center md:text-left">Acesse sua conta</h2>

                            {error && (
                                <div className="mb-6 p-4 bg-red-50 border border-red-100 rounded-lg flex items-center gap-3 text-red-600 shadow-sm">
                                    <AlertTriangle size={16} className="shrink-0" />
                                    <span className="text-xs font-bold">{error}</span>
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-4">
                                {/* Input Email */}
                                <div>
                                    <input 
                                        type="email" 
                                        required 
                                        value={email} 
                                        onChange={(e) => setEmail(e.target.value)} 
                                        placeholder="E-mail ou CNPJ" 
                                        className="w-full bg-[#e5e7eb] text-gray-800 px-5 py-3.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-[#f15a00] placeholder-gray-500 transition-shadow" 
                                    />
                                </div>

                                {/* Input Senha */}
                                <div>
                                    <input 
                                        type="password" 
                                        required 
                                        value={password} 
                                        onChange={(e) => setPassword(e.target.value)} 
                                        placeholder="Senha" 
                                        className="w-full bg-[#e5e7eb] text-gray-800 px-5 py-3.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-[#f15a00] placeholder-gray-500 transition-shadow" 
                                    />
                                </div>

                                {/* Lembrar de Mim e Esqueceu a Senha */}
                                <div className="flex flex-col gap-3 pt-2">
                                    <div className="flex items-center gap-3">
                                        <input 
                                            type="checkbox" 
                                            id="remember" 
                                            className="w-4 h-4 rounded border-gray-300 text-[#f15a00] focus:ring-[#f15a00] cursor-pointer" 
                                        />
                                        <label htmlFor="remember" className="text-sm text-gray-500 cursor-pointer">Lembrar de mim</label>
                                    </div>
                                    
                                    <a href="#" className="text-xs font-bold text-[#f15a00] hover:text-[#d44e00] transition-colors self-start mt-1">
                                        Esqueceu a senha?
                                    </a>
                                </div>

                                {/* Botão Login */}
                                <div className="flex justify-end pt-6">
                                    <button 
                                        type="submit" 
                                        disabled={loading} 
                                        className="btn-gradient text-white px-10 py-3 rounded-full font-bold text-sm shadow-md hover:shadow-lg hover:scale-[1.02] transition-all flex items-center justify-center min-w-[120px] disabled:opacity-70"
                                    >
                                        {loading ? <Loader2 size={16} className="animate-spin" /> : "Login"}
                                    </button>
                                </div>
                            </form>

                        </div>
                    </div>
                    
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<Login />);
    </script>
</body>
</html>
