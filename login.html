<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLUAP - Login</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b1117; /* Fundo escuro */
            /* FUNDO QUADRICULADO IDÊNTICO AO CADASTRO */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            color: white;
        }
        
        .glow-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(255, 123, 0, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background-color: #1f2937; border-radius: 10px; }
    </style>
</head>
<body class="m-0 p-0 min-h-screen relative flex flex-col items-center justify-center overflow-x-hidden">
    
    <div class="glow-bg"></div>

    <div id="root" class="w-full relative z-10 px-4 py-10 md:py-16"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Loader2, AlertTriangle, Eye, EyeOff, LogIn } from 'lucide-react';

        // --- CONEXÃO SUPABASE OLUAP ---
        const SUPABASE_URL = 'https://haxonnnbycypirigxsvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheG9ubm5ieWN5cGlyaWd4c3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTYwMzEsImV4cCI6MjA4OTYzMjAzMX0.keYNqjbu7DxBYV9f4_HW1MTaP1_TJZ_bNDTRIvSeSYw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Login = () => {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [showPassword, setShowPassword] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError("");

                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    setError("E-mail ou senha incorretos. Verifique e tente novamente.");
                } else {
                    // Direciona para o painel do cliente
                    window.location.href = 'index.html';
                }
                setLoading(false);
            };

            return (
                <div className="w-full max-w-md mx-auto flex flex-col items-center mt-[-5vh]">
                    
                    {/* LOGO (Estilo Site OLUAP) */}
                    <div className="mb-10 flex items-center justify-center gap-3">
                        <div className="w-8 h-8 bg-[#ff7b00] rounded-full flex items-center justify-center font-black text-[#0b1117] text-sm">O</div>
                        <span className="text-white font-black text-2xl tracking-tighter">OLUAP</span>
                    </div>

                    {/* CARTÃO ESCURO CENTRAL */}
                    <div className="w-full bg-[#0d161f]/80 backdrop-blur-md border border-slate-800/60 rounded-[2rem] shadow-2xl p-8 md:p-10 relative">
                        
                        <div className="text-center mb-10">
                            <h2 className="text-3xl font-black text-white tracking-tighter mb-2">Acessar Painel</h2>
                            <p className="text-slate-400 text-sm font-medium">Faça login para acompanhar seus diagnósticos.</p>
                        </div>

                        {error && (
                            <div className="mb-8 p-4 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center gap-3 text-red-400 shadow-sm">
                                <AlertTriangle size={16} className="shrink-0" />
                                <span className="text-xs font-bold uppercase tracking-wider leading-tight">{error}</span>
                            </div>
                        )}

                        <form onSubmit={handleLogin} className="space-y-6">
                            <div className="w-full">
                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2 mb-2 block">Seu E-mail</label>
                                <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} placeholder="contato@empresa.com.br" 
                                    className="w-full bg-[#050b14] border border-slate-800 text-white px-5 py-4 rounded-xl text-sm outline-none focus:ring-1 focus:ring-[#ff7b00] focus:border-[#ff7b00] placeholder-slate-600 transition-all font-medium" />
                            </div>

                            <div className="w-full">
                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2 mb-2 block">Sua Senha</label>
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} required value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" 
                                        className="w-full bg-[#050b14] border border-slate-800 text-white pl-5 pr-12 py-4 rounded-xl text-sm outline-none focus:ring-1 focus:ring-[#ff7b00] focus:border-[#ff7b00] placeholder-slate-600 transition-all font-medium" />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-[#ff7b00] transition-colors">
                                        {showPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                                    </button>
                                </div>
                            </div>

                            <div className="pt-6 w-full">
                                <button type="submit" disabled={loading} className="bg-[#ff7b00] text-white w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg shadow-orange-500/20 hover:bg-[#e66a00] hover:scale-[1.01] transition-all flex items-center justify-center gap-2 disabled:opacity-70 border border-orange-500/50">
                                    {loading ? <Loader2 size={18} className="animate-spin" /> : <><LogIn size={18} /> Entrar</>}
                                </button>
                            </div>
                        </form>

                        <div className="mt-8 text-center border-t border-slate-800/60 pt-6 w-full flex flex-col gap-2">
                            <p className="text-xs font-bold text-slate-400">
                                Esqueceu a senha? <button className="text-white hover:text-[#ff7b00] transition-colors uppercase tracking-wider ml-1" onClick={() => alert('Para redefinir a senha, entre em contato com o suporte OLUAP.')}>Recuperar</button>
                            </p>
                            <p className="text-xs font-bold text-slate-400 mt-2">
                                Ainda não tem conta? <a href="cadastro.html" className="text-[#ff7b00] hover:text-white transition-colors uppercase tracking-wider ml-1">Criar conta</a>
                            </p>
                        </div>

                    </div>
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<Login />);
    </script>
</body>
</html>
