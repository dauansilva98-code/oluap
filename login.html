<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLUAP - Acesso</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Personalização do checkbox */
        input[type="checkbox"]:checked {
            background-color: #f15a00;
            border-color: #f15a00;
        }
        /* Botão com o gradiente da marca */
        .btn-gradient {
            background: linear-gradient(90deg, #137789 0%, #f15a00 100%);
        }
        /* Removemos a barra de rolagem no desktop, mas mantemos no mobile para o teclado */
        @media (min-width: 768px) {
            body { overflow: hidden; }
        }
    </style>
</head>
<body class="m-0 p-0 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Loader2, AlertTriangle, Eye, EyeOff } from 'lucide-react';

        // --- CONEXÃO SUPABASE OLUAP (OFICIAL) ---
        const SUPABASE_URL = 'https://haxonnbycypirigxsvjq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheG9ubm5ieWN5cGlyaWd4c3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTYwMzEsImV4cCI6MjA4OTYzMjAzMX0.keYNqjbu7DxBYV9f4_HW1MTaP1_TJZ_bNDTRIvSeSYw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Login = () => {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [showPassword, setShowPassword] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            // Auto-redirecionamento Lumis: Se já tem sessão, pula o login!
            useEffect(() => {
                const checkSession = async () => {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session && session.user.role !== 'anon') {
                        window.location.href = 'admin.html';
                    }
                };
                checkSession();
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError("");

                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    setError("E-mail ou senha incorretos.");
                    setLoading(false);
                } else {
                    window.location.href = 'admin.html'; 
                }
            };

            return (
                /* No Mobile: Fundo com Gradiente total (Laranja -> Azul)
                 No Desktop: Fundo Cinza claro, o gradiente fica só na div da esquerda 
                */
                <div className="min-h-screen md:h-screen w-full flex flex-col md:flex-row bg-gradient-to-b from-[#f15a00] to-[#137789] md:bg-none md:bg-[#e8ecef]">
                    
                    {/* ----- LADO ESQUERDO (DESKTOP) / CABEÇALHO (MOBILE) ----- */}
                    <div className="flex md:w-[45%] md:h-full md:bg-gradient-to-b md:from-[#f15a00] md:to-[#137789] md:rounded-r-[60px] lg:rounded-r-[80px] p-8 md:p-12 relative md:shadow-2xl md:z-10 flex-col">
                        
                        {/* Logo Topo Esquerda */}
                        <div className="flex items-center gap-1 md:absolute md:top-12 md:left-12 justify-center md:justify-start w-full md:w-auto mt-4 md:mt-0">
                            <img src="logo.png" alt="Oluap" className="h-10 object-contain hidden" onError={(e) => {
                                e.target.style.display = 'none';
                                e.target.nextSibling.style.display = 'flex';
                            }}/>
                            <div className="text-white font-black text-3xl tracking-tighter flex items-center">
                                olua<span className="text-[#05121b] rotate-45 ml-[-4px]">P</span>
                            </div>
                        </div>

                        {/* Texto de Impacto - Centralizado Vertical e Horizontalmente */}
                        <div className="flex-1 flex items-center justify-center mt-10 md:mt-0 text-center md:text-left">
                            <h1 className="text-4xl md:text-5xl lg:text-6xl font-bold leading-[1.1] tracking-tight drop-shadow-sm">
                                <span className="text-white block mb-1">A plataforma</span>
                                <span className="text-white">que </span>
                                <span className="text-[#05121b] font-black">simplifica</span>
                                <br />
                                <span className="text-[#05121b] font-black">o complicado!</span>
                            </h1>
                        </div>
                    </div>

                    {/* ----- LADO DIREITO: FORMULÁRIO DE LOGIN ----- */}
                    <div className="w-full md:w-[55%] flex-1 flex items-center justify-center p-6 md:p-8 relative z-20">
                        
                        {/* No Mobile: Card Branco flutuando com sombra forte
                         No Desktop: Fundo transparente mesclando com o cinza claro da tela 
                        */}
                        <div className="w-full max-w-sm bg-white md:bg-transparent p-8 md:p-0 rounded-[2rem] shadow-2xl md:shadow-none">
                            
                            <h2 className="text-2xl md:text-3xl font-medium text-gray-800 mb-8 text-center md:text-left">Acesse sua conta</h2>

                            {error && (
                                <div className="mb-6 p-4 bg-red-50 border border-red-100 rounded-xl flex items-center gap-3 text-red-600 shadow-sm">
                                    <AlertTriangle size={16} className="shrink-0" />
                                    <span className="text-[11px] font-bold uppercase tracking-wider leading-tight">{error}</span>
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-4">
                                {/* Input Email */}
                                <div>
                                    <input 
                                        type="email" 
                                        required 
                                        value={email} 
                                        onChange={(e) => setEmail(e.target.value)} 
                                        placeholder="E-mail ou CNPJ" 
                                        className="w-full bg-[#f3f4f6] md:bg-[#dcdfe3] text-gray-800 px-5 py-4 rounded-xl text-sm outline-none focus:ring-2 focus:ring-[#f15a00] placeholder-gray-500 transition-all font-medium" 
                                    />
                                </div>

                                {/* Input Senha com Olhinho da Lumis */}
                                <div className="relative">
                                    <input 
                                        type={showPassword ? "text" : "password"} 
                                        required 
                                        value={password} 
                                        onChange={(e) => setPassword(e.target.value)} 
                                        placeholder="Senha" 
                                        className="w-full bg-[#f3f4f6] md:bg-[#dcdfe3] text-gray-800 pl-5 pr-12 py-4 rounded-xl text-sm outline-none focus:ring-2 focus:ring-[#f15a00] placeholder-gray-500 transition-all font-medium" 
                                    />
                                    <button 
                                        type="button" 
                                        onClick={() => setShowPassword(!showPassword)}
                                        className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#f15a00] transition-colors"
                                    >
                                        {showPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                                    </button>
                                </div>

                                {/* Lembrar Senha & Esqueceu Senha */}
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pt-2">
                                    <div className="flex items-center gap-2">
                                        <input 
                                            type="checkbox" 
                                            id="remember" 
                                            className="w-4 h-4 rounded border-gray-300 text-[#f15a00] focus:ring-[#f15a00] cursor-pointer" 
                                        />
                                        <label htmlFor="remember" className="text-xs text-gray-500 cursor-pointer font-bold select-none">Lembrar de mim</label>
                                    </div>
                                    
                                    <a href="#" className="text-xs font-bold text-[#f15a00] hover:text-[#137789] transition-colors">
                                        Esqueceu a senha?
                                    </a>
                                </div>

                                {/* Botão Login */}
                                <div className="flex justify-center md:justify-end pt-6">
                                    <button 
                                        type="submit" 
                                        disabled={loading} 
                                        className="btn-gradient w-full md:w-auto text-white px-10 py-3.5 rounded-full font-black text-sm shadow-md hover:shadow-lg hover:scale-[1.02] transition-all flex items-center justify-center min-w-[140px] disabled:opacity-70"
                                    >
                                        {loading ? <Loader2 size={18} className="animate-spin" /> : "Login"}
                                    </button>
                                </div>
                            </form>

                            {/* Link de Cadastro Embutido */}
                            <div className="mt-8 text-center md:text-left border-t border-slate-100 md:border-slate-300 pt-6">
                                <p className="text-xs font-bold text-slate-500">
                                    Não tem uma conta? <a href="cadastro.html" className="text-[#f15a00] hover:text-[#137789] transition-colors uppercase tracking-wider ml-1">Criar conta</a>
                                </p>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<Login />);
    </script>
</body>
</html>
